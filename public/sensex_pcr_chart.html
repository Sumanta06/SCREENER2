<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEX PCR vs Spot Analysis</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50%25' y='55%25' font-family='Arial' font-weight='bold' font-size='70' fill='%23ffffff' text-anchor='middle' dominant-baseline='central'>P</text></svg>">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --body-bg: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: #334155;
            --bullish: #10b981;
            --bearish: #ef4444;
            --pcr-color: #fbbf24;
            --spot-color: #3b82f6;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            max-width: 1500px;
            margin: 0 auto;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border);
        }

        .title-group h1 { margin: 0; font-size: 1.3rem; font-weight: 700; color: #f8fafc; }
        .title-group p { margin: 4px 0 0; font-size: 0.8rem; color: var(--text-muted); }

        .status { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; font-weight:600;}
        .status-dot { width: 8px; height: 8px; background-color: var(--bullish); border-radius: 50%; box-shadow: 0 0 8px var(--bullish); animation: blink 2s infinite; }
        .status-dot.err { background-color: var(--bearish); box-shadow: 0 0 8px var(--bearish); animation: none; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        /* ── ANALYSIS PANEL ── */
        .analysis-panel {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            gap: 16px;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .analysis-panel::-webkit-scrollbar { height: 6px; }
        .analysis-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .a-item { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; position:relative; overflow:hidden; flex: 1; min-width: 240px; }
        .a-item::before { content:''; position:absolute; left:0; top:0; height:100%; width:4px; }
        .a-item.bullish::before { background: var(--bullish); }
        .a-item.bearish::before { background: var(--bearish); }
        .a-item.warning::before { background: #f59e0b; }
        .a-item.neutral::before { background: var(--border); }

        .a-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight:700; margin-bottom: 6px; }
        .a-value { font-size: 1.3rem; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        .a-value.green { color: var(--bullish); }
        .a-value.red { color: var(--bearish); }
        .a-value.yellow { color: #fbbf24; }
        .a-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; font-weight:600; line-height: 1.4; }

        /* ── CHART ── */
        #chart-container { flex: 1; position: relative; width: 100%; min-height: 0; }
        
        .legend {
            position: absolute; top: 16px; left: 16px; z-index: 10;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
            font-size: 0.85rem; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-color { width: 12px; height: 3px; border-radius: 2px; }
        .spot-val { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--spot-color); font-size:1.05rem;}
        .pcr-val  { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--pcr-color); font-size:1.05rem;}

        /* OVERLAY */
        #overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #ov-msg { font-size: 1.1rem; font-weight: 600; }
        #ov-prog { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; font-family: 'JetBrains Mono';}

        /* ── SCANNER PANEL ── */
        .scanner-panel {
            position: absolute; right: 20px; bottom: 20px; width: 280px;
            background: rgba(15, 23, 42, 0.95); border: 1px solid #334155; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100;
            display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px);
        }
        .scanner-header {
            background: #1e293b; padding: 10px 14px; font-weight: 700; font-size: 0.85rem;
            color: #fbbf24; border-bottom: 1px solid #334155; display: flex;
            justify-content: space-between; align-items: center; user-select: none;
        }
        .scanner-list {
            max-height: 250px; overflow-y: auto; display: flex; flex-direction: column;
        }
        .scanner-list::-webkit-scrollbar { width: 6px; }
        .scanner-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .scanner-item {
            padding: 10px 14px; border-bottom: 1px solid rgba(51,65,85,0.5); font-size: 0.75rem;
            line-height: 1.4; transition: background 0.2s;
        }
        .scanner-item:hover { background: rgba(51,65,85,0.3); }
        .scanner-item.buy { border-left: 4px solid #10b981; }
        .scanner-item.sell { border-left: 4px solid #ef4444; }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            html, body {
                height: auto !important;
                overflow-y: auto !important;
            }

            .header {
                padding: 10px 14px;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .title-group h1 { font-size: 1rem; }
            .title-group p  { font-size: 0.72rem; }

            .status { font-size: 0.72rem; }

            #chart-container { min-height: 50vh !important; }

            .legend {
                top: 8px;
                left: 8px;
                padding: 8px 10px;
                font-size: 0.75rem;
            }

            .analysis-panel {
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 12px;
                gap: 10px;
                justify-content: flex-start !important;
            }
            
            .analysis-panel .a-item {
                flex: 0 0 250px !important;
                min-width: 250px !important;
            }
        }

        @media (max-width: 380px) {
            .title-group h1 { font-size: 0.9rem; }
            .legend { font-size: 0.7rem; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            html, body {
                height: auto !important;
                overflow-y: auto !important;
            }
            .header {
                flex-direction: row !important;
                padding: 5px 10px !important;
            }
            .title-group p { display: none; }
            #chart-container { min-height: 70vh !important; }
            .analysis-panel { 
                padding: 8px 10px !important; 
                margin-bottom: 5px; 
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch;
                justify-content: flex-start !important;
            }
            .analysis-panel .a-item { 
                padding: 6px 10px !important; 
                flex: 0 0 200px !important;
                min-width: 200px !important;
            }
            .a-sub { display: none; }
            .legend { padding: 4px 6px !important; font-size: 0.65rem !important; }
        }
    </style>
</head>

    <script>
        const R2 = 'https://pub-beab7a6397a7478c853251902952970e.r2.dev';
        
        let chart, spotSeries, pcrSeries, smaSeries;
        let loadBusy = false;
        let alertHistory = 0; // Stores last marker time seen for Sensex
        let allNewMarkers = [];
        let isFirstScan = true;

        function toggleScanner(e) {
            e.stopPropagation();
            const listEl = document.getElementById('scanner-list');
            const toggleIcon = document.getElementById('scanner-toggle');
            if (listEl.style.display === 'none') {
                listEl.style.display = 'flex';
                toggleIcon.innerText = '−';
            } else {
                listEl.style.display = 'none';
                toggleIcon.innerText = '+';
            }
        }

        // --- Dragging Logic for Scanner Panel ---
        setTimeout(() => {
            const scannerPanelEl = document.getElementById('scanner-panel');
            const scannerHeaderEl = document.getElementById('scanner-header');
            let isDragging = false;
            let dragOffsetX = 0;
            let dragOffsetY = 0;

            scannerHeaderEl.addEventListener('mousedown', (e) => {
                if (e.target.id === 'scanner-toggle' || e.target.id === 'scan-count') return;
                isDragging = true;
                const rect = scannerPanelEl.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
                
                scannerPanelEl.style.position = 'fixed';
                scannerPanelEl.style.right = 'auto';
                scannerPanelEl.style.bottom = 'auto';
                scannerPanelEl.style.left = rect.left + 'px';
                scannerPanelEl.style.top = rect.top + 'px';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let newX = e.clientX - dragOffsetX;
                let newY = e.clientY - dragOffsetY;
                newX = Math.max(0, Math.min(newX, window.innerWidth - scannerPanelEl.offsetWidth));
                newY = Math.max(0, Math.min(newY, window.innerHeight - scannerPanelEl.offsetHeight));
                scannerPanelEl.style.left = newX + 'px';
                scannerPanelEl.style.top = newY + 'px';
            });

            document.addEventListener('mouseup', () => { isDragging = false; });

            scannerHeaderEl.addEventListener('touchstart', (e) => {
                if (e.target.id === 'scanner-toggle' || e.target.id === 'scan-count') return;
                isDragging = true;
                const rect = scannerPanelEl.getBoundingClientRect();
                dragOffsetX = e.touches[0].clientX - rect.left;
                dragOffsetY = e.touches[0].clientY - rect.top;
                
                scannerPanelEl.style.position = 'fixed';
                scannerPanelEl.style.right = 'auto';
                scannerPanelEl.style.bottom = 'auto';
                scannerPanelEl.style.left = rect.left + 'px';
                scannerPanelEl.style.top = rect.top + 'px';
            });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                let newX = e.touches[0].clientX - dragOffsetX;
                let newY = e.touches[0].clientY - dragOffsetY;
                newX = Math.max(0, Math.min(newX, window.innerWidth - scannerPanelEl.offsetWidth));
                newY = Math.max(0, Math.min(newY, window.innerHeight - scannerPanelEl.offsetHeight));
                scannerPanelEl.style.left = newX + 'px';
                scannerPanelEl.style.top = newY + 'px';
            });

            document.addEventListener('touchend', () => { isDragging = false; });
        }, 500);

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1' },
                grid: { vertLines: { color: 'rgba(51, 65, 85, 0.4)' }, horzLines: { color: 'rgba(51, 65, 85, 0.4)' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { visible: true, borderColor: '#334155' },
                leftPriceScale: { visible: true, borderColor: '#334155' },
                timeScale: { borderColor: '#334155', timeVisible: true, secondsVisible: false },
                handleScroll: false,
                handleScale: false
            });

            spotSeries = chart.addLineSeries({
                color: '#3b82f6', lineWidth: 2, priceScaleId: 'right',
                crosshairMarkerBorderColor: '#fff', crosshairMarkerRadius: 4
            });

            pcrSeries = chart.addLineSeries({
                color: '#fbbf24', lineWidth: 2, priceScaleId: 'left',
                crosshairMarkerBorderColor: '#fff', crosshairMarkerRadius: 4
            });

            smaSeries = chart.addLineSeries({
                color: '#a855f7', lineWidth: 1, priceScaleId: 'right', lineStyle: LightweightCharts.LineStyle.Dashed,
                crosshairMarkerBorderColor: '#fff', crosshairMarkerRadius: 4
            });

            // Adjust window resize
            window.addEventListener('resize', () => {
                chart.resize(document.getElementById('chart-container').clientWidth, document.getElementById('chart-container').clientHeight);
            });

            // Update legend on hover
            chart.subscribeCrosshairMove(param => {
                if (param.time) {
                    const sp = param.seriesData.get(spotSeries);
                    const pc = param.seriesData.get(pcrSeries);
                    const sm = param.seriesData.get(smaSeries);
                    if (sp !== undefined) document.getElementById('leg-spot').innerText = sp.value.toFixed(2);
                    if (pc !== undefined) document.getElementById('leg-pcr').innerText = pc.value.toFixed(2);
                    if (sm !== undefined) document.getElementById('leg-sma').innerText = sm.value.toFixed(2);
                }
            });
        }

        function toTs(dateStr, timeStr) {
            const [y, m, d] = dateStr.split('-');
            const [hh, mm] = timeStr.split('-');
            // Lightweight Charts displays in UTC by default. 
            // We pass the local time as if it were UTC so it displays exactly the local numbers.
            return Math.floor(Date.UTC(y, m - 1, d, hh, mm, 0) / 1000);
        }

        function istDate(daysAgo = 0) {
            let d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            d.setDate(d.getDate() - daysAgo);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function showOverlay(show, msg="") {
            document.getElementById('overlay').style.display = show ? 'flex' : 'none';
            if(msg) document.getElementById('ov-msg').innerText = msg;
        }

        function setOverlayMsg(msg) {
            document.getElementById('ov-msg').innerText = msg;
        }

        function setOverlayProg(prog) {
            document.getElementById('ov-prog').innerText = prog;
        }

        function setStatus(isLive) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if(isLive) { dot.className = 'status-dot'; txt.innerText = 'Live Feed Connected'; }
            else { dot.className = 'status-dot err'; txt.innerText = 'Offline / Stagnant'; }
        }

        function updateCard(id, theme, valueHtml, subText) {
            const card = document.getElementById(`c-${id}`);
            card.className = `a-item ${theme}`;
            if(valueHtml) document.getElementById(`a-${id}-val`).innerHTML = valueHtml;
            if(subText) document.getElementById(`a-${id}-sub`).innerHTML = subText;
        }

        const PCR_LOOK = 10;   // PCR trend lookback periods
        const MIN_CANDLE = 20; // Skip first 20 candles
        const MIN_GAP = 0.05;  // Spot must be ≥ 0.05% from SMA
        const MIN_PCR_CHG = 0.01; // Minimum PCR change to confirm trend
        const SMA_PERIOD = 10;

        function buildMarkers(dataPoints) {
            const markers = [];
            const sma = [];
            let sum = 0;
            for(let i=0; i<dataPoints.length; i++) {
                sum += dataPoints[i].spot;
                if(i >= SMA_PERIOD) sum -= dataPoints[i - SMA_PERIOD].spot;
                sma.push(i >= SMA_PERIOD - 1 ? sum / SMA_PERIOD : dataPoints[i].spot);
            }

            let signalState = 0; 
            let trapState = 0;

            for (let i = 1; i < dataPoints.length; i++) {
                if (i < MIN_CANDLE) continue;

                const spotNow  = dataPoints[i].spot;
                const smaNow   = sma[i];
                const gapPct   = (spotNow - smaNow) / smaNow * 100;

                if (spotNow <= smaNow) {
                    if (trapState === 1) trapState = 0;
                }
                if (spotNow >= smaNow) {
                    if (trapState === -1) trapState = 0;
                }

                const pcrLook = Math.max(0, i - PCR_LOOK);
                const pcrChg  = dataPoints[i].pcr - dataPoints[pcrLook].pcr;

                if (gapPct >= MIN_GAP) {
                    if (pcrChg >= MIN_PCR_CHG && signalState !== 1) {
                        markers.push({ time: dataPoints[i].time, position: 'belowBar',
                            color: '#10b981', shape: 'arrowUp', text: '🟢 Buy', size: 1.8 });
                        signalState = 1; 
                        trapState = 0;   
                    } else if (pcrChg <= -MIN_PCR_CHG && signalState !== 1 && trapState !== 1) {
                        markers.push({ time: dataPoints[i].time, position: 'belowBar',
                            color: '#f59e0b', shape: 'circle', text: '', size: 0.8 });
                        trapState = 1; 
                    }
                } else if (gapPct <= -MIN_GAP) {
                    if (pcrChg <= -MIN_PCR_CHG && signalState !== -1) {
                        markers.push({ time: dataPoints[i].time, position: 'aboveBar',
                            color: '#ef4444', shape: 'arrowDown', text: '🔴 Sell', size: 1.8 });
                        signalState = -1; 
                        trapState = 0;
                    } else if (pcrChg >= MIN_PCR_CHG && signalState !== -1 && trapState !== -1) {
                        markers.push({ time: dataPoints[i].time, position: 'aboveBar',
                            color: '#3b82f6', shape: 'circle', text: '', size: 0.8 });
                        trapState = -1;
                    }
                }
            }
            return markers;
        }

        function buildSma(dataPoints) {
            const sma = [];
            let sum = 0;
            for(let i=0; i<dataPoints.length; i++) {
                sum += dataPoints[i].spot;
                if(i >= SMA_PERIOD) sum -= dataPoints[i - SMA_PERIOD].spot;
                sma.push({ time: dataPoints[i].time, value: i >= SMA_PERIOD - 1 ? sum / SMA_PERIOD : dataPoints[i].spot });
            }
            return sma;
        }

        async function fetchJson(url) {
            try {
                const r = await fetch(url + `?_=${Date.now()}`);
                if (!r.ok) return null;
                return await r.json();
            } catch { return null; }
        }

        async function loadData() {
            if (loadBusy) return;
            loadBusy = true;

            showOverlay(true, "Searching for latest SENSEX data...");

            let targetDate = null;
            let indexList = null;

            // Find latest date in last 7 days
            for (let i = 0; i <= 7; i++) {
                const d = istDate(i);
                const list = await fetchJson(`${R2}/snapshots/${d}/index.json`);
                if (list && list.length > 0) {
                    targetDate = d;
                    indexList = list;
                    break;
                }
            }

            if (!targetDate) {
                showOverlay(true, "No data found in R2 for the last 7 days.");
                setOverlayProg("Make sure Python script is running.");
                setTimeout(() => showOverlay(false), 3000);
                loadBusy = false;
                return; // Stop here
            }

            const isToday = targetDate === istDate(0);
            const [yr, mo, dy] = targetDate.split('-');
            const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            document.getElementById('chartDate').innerText = `${dy} ${MON[+mo - 1]} ${yr}${isToday ? ' (Today)' : ' (Last Trading Day)'}`;

            setOverlayMsg("Downloading chart history...");
            let dataPoints = [];

            // 1. Try fetching pcr_today.json (Optimized single file - if python script is updated)
            const pcrOpt = await fetchJson(`${R2}/snapshots/${targetDate}/pcr_today.json`);
            
            if (pcrOpt && pcrOpt.length > 0) {
                setOverlayProg("Loaded optimized history file instantly.");
                dataPoints = pcrOpt.map(p => ({
                    time: toTs(targetDate, p.time),
                    spot: p.spot,
                    pcr: p.pcr
                }));
            } else {
                // 2. Fallback: Batch download individual JSONs (Slow but works immediately without python changes)
                setOverlayMsg("No optimized history found. Falling back to batch download...");
                
                const BATCH = 30;
                for (let i = 0; i < indexList.length; i += BATCH) {
                    const batch = indexList.slice(i, i + BATCH);
                    const done = Math.min(i + BATCH, indexList.length);
                    setOverlayMsg(`Downloading snapshots... ${done} / ${indexList.length}`);
                    setOverlayProg(`Batch ${Math.ceil((i+1)/BATCH)} of ${Math.ceil(indexList.length/BATCH)}`);

                    const results = await Promise.all(batch.map(async ts => {
                        const snap = await fetchJson(`${R2}/snapshots/${targetDate}/${ts}.json`);
                        if (snap && snap.spot_price && snap.analytics && snap.analytics.pcr_oi) {
                            return {
                                time: toTs(targetDate, ts),
                                spot: snap.spot_price,
                                pcr: snap.analytics.pcr_oi
                            };
                        }
                        return null;
                    }));

                    results.forEach(r => { if(r) dataPoints.push(r); });
                }
            }

            // Sort and remove duplicates
            const uniquePoints = {};
            dataPoints.forEach(d => { uniquePoints[d.time] = d; });
            dataPoints = Object.values(uniquePoints).sort((a, b) => a.time - b.time);
            
            // Plot on chart
            spotSeries.setData(dataPoints.map(d => ({ time: d.time, value: d.spot })));
            pcrSeries.setData(dataPoints.map(d => ({ time: d.time, value: d.pcr })));
            
            smaSeries.setData(buildSma(dataPoints));
            
            const markers = buildMarkers(dataPoints);
            spotSeries.setMarkers(markers);

            // Scanner processing
            const listEl = document.getElementById('scanner-list');
            
            markers.forEach(marker => {
                if (marker.time > alertHistory) {
                    alertHistory = marker.time;
                    
                    // Find the original HH:MM time using getUTCHours
                    const d = new Date(marker.time * 1000);
                    let hr = d.getUTCHours(); let min = d.getUTCMinutes();
                    hr = hr < 10 ? '0'+hr : hr; min = min < 10 ? '0'+min : min;
                    
                    allNewMarkers.push({
                        symbol: 'SENSEX',
                        time: marker.time,
                        label: `${hr}:${min}`,
                        shape: marker.shape,
                        text: marker.text
                    });
                }
            });
            
            if (allNewMarkers.length > 0) {
                allNewMarkers.sort((a, b) => a.time - b.time);
                if(listEl.innerHTML.includes("Waiting")) listEl.innerHTML = "";
                
                allNewMarkers.forEach(markerObj => {
                    const item = document.createElement('div');
                    const isBuy = markerObj.shape === 'arrowUp';
                    item.className = `scanner-item ${isBuy ? 'buy' : 'sell'}`;
                    item.innerHTML = `<b>${markerObj.label}</b> | ${markerObj.symbol}<br><span style="color:${isBuy?'#10b981':'#ef4444'}">${markerObj.text}</span>`;
                    
                    // Prepending oldest to newest ensures the absolute newest ends up at the very top
                    listEl.prepend(item);
                    
                    const countEl = document.getElementById('scan-count');
                    countEl.innerText = parseInt(countEl.innerText) + 1;
                });
                
                // Clear the array so we don't duplicate on next tick
                allNewMarkers = [];
            }

            if(dataPoints.length > 0) {
                const last = dataPoints[dataPoints.length - 1];
                document.getElementById('leg-spot').innerText = last.spot.toFixed(2);
                document.getElementById('leg-pcr').innerText = last.pcr.toFixed(2);
                analyzeData(dataPoints);
                chart.timeScale().fitContent();
            }

            showOverlay(false);
            
            let isLiveFeed = false;
            if (isToday && dataPoints.length > 0) {
                const last = dataPoints[dataPoints.length - 1];
                const now = new Date();
                const currentFakeUtc = Math.floor(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), 0) / 1000);
                
                // If last data point is within 6 minutes (360 seconds)
                if (currentFakeUtc - last.time <= 360) {
                    isLiveFeed = true;
                }
            }
            setStatus(isLiveFeed);
            loadBusy = false;
        }

        function analyzeData(data) {
            const n = data.length;
            if(n < 2) return;
            
            const spotNow = data[n - 1].spot;
            const spotOp  = data[0].spot;
            const pcrNow  = data[n - 1].pcr;
            const pcrOp   = data[Math.max(0, Math.floor(n * 0.1))].pcr; // First 10% of day average

            const spotUp = spotNow >= spotOp;
            const pcrUp  = pcrNow >= pcrOp;
            const chg    = ((spotNow - spotOp) / spotOp * 100).toFixed(2);

            // PCR Card
            let pc, pl, ps;
            if (pcrNow >= 1.2) { pc='bullish'; pl='🟢 Bullish Zone'; ps='Heavy Put Writing (Support strong)'; }
            else if (pcrNow >= 0.8) { pc='neutral'; pl='⚪ Neutral Zone'; ps='Sideways to Volatile Market'; }
            else if (pcrNow >= 0.7) { pc='warning'; pl='🟡 Caution Zone'; ps='Weakness spotted, bounce possible'; }
            else { pc='bearish'; pl='🔴 Bearish Zone'; ps='Heavy Call Writing (Resistance strong)'; }
            updateCard('pcr', pc, `<span class="${pc==='bullish'?'green':pc==='bearish'?'red':'yellow'}">${pcrNow.toFixed(2)}</span>`, `${pl} — ${ps}`);

            // Spot Card
            const sc = spotUp ? 'bullish' : 'bearish';
            const schg = spotUp ? `▲ ${chg}%` : `▼ ${Math.abs(chg)}%`;
            const sval = `<span class="${spotUp?'green':'red'}">${schg}</span>`;
            const ssub = `${spotUp?'Up':'Down'} from open | ${spotOp.toFixed(0)} → ${spotNow.toFixed(0)}`;
            updateCard('spot', sc, sval, ssub);

            // Signal & Advice
            let sigTheme, sigTitle, sigSub, advice;
            if (spotUp && pcrUp && pcrNow >= 1.0) {
                sigTheme = 'bullish'; sigTitle = '✅ Bullish Trend Confirmed'; sigSub = 'Spot & PCR both rising.';
                advice = 'Follow the trend. Buy on dips. Keep stop-loss at near support.';
            } else if (!spotUp && !pcrUp && pcrNow < 0.9) {
                sigTheme = 'bearish'; sigTitle = '✅ Bearish Trend Confirmed'; sigSub = 'Spot & PCR both falling.';
                advice = 'Follow the trend. Sell on bounce. Keep strict stop-loss.';
            } else if (!spotUp && pcrUp && pcrNow >= 1.0) {
                sigTheme = 'warning'; sigTitle = '⚠️ Bullish Divergence (Trap)'; sigSub = 'Spot falling but PCR rising.';
                advice = '<span style="color:#fbbf24">Do NOT short. Smart money might be accumulating. Wait for reversal.</span>';
            } else if (spotUp && !pcrUp && pcrNow < 1.0) {
                sigTheme = 'warning'; sigTitle = '⚠️ Bearish Divergence (Trap)'; sigSub = 'Spot rising but PCR falling.';
                advice = '<span style="color:#fbbf24">Do NOT buy blindly. Fake breakout possible. Book partial profits.</span>';
            } else {
                sigTheme = 'neutral'; sigTitle = 'Sideways / Indecisive'; sigSub = 'No clear divergence.';
                advice = 'Wait for a clearer setup. Avoid forced trades.';
            }

            updateCard('sig', sigTheme, sigTitle, sigSub);
            document.getElementById('a-adv-val').innerHTML = advice;
        }

        initChart();
        loadData();
        setInterval(loadData, 60000); // Check every minute
    </script>
