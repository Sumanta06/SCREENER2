<!DOCTYPE html>
<html lang="en" data-theme="teal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Market Terminal · Live Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ════════════════════════════════════════════════════════════
   THEME 1: NEON TEAL (Premium Version)
════════════════════════════════════════════════════════════ */
[data-theme="teal"] {
  --bg: #033f37;
  --surface: #055C51;
  --card: #066b5f;
  --card-hover: #087d6f;
  --border: rgba(255, 255, 255, 0.15);
  --border-hover: rgba(64, 196, 255, 0.5);
  --ink: #ffffff;
  --ink2: #e0f2f1;
  --ink3: #b2dfdb;
  --shadow: rgba(0, 0, 0, 0.4);
  --accent: #40C4FF;
  
  --tag-stock: rgba(64,196,255,0.15); --tag-stock-c: #80D8FF;
  --tag-index: rgba(224,64,251,0.15); --tag-index-c: #EA80FC;
  --tag-result: rgba(0,255,157,0.15); --tag-result-c: #00FF9D;
  --tag-global: rgba(255,82,82,0.15); --tag-global-c: #FF8A80;
  --tag-ipo: rgba(156,39,176,0.25);   --tag-ipo-c: #E1BEE7;
  --tag-bse: rgba(255,215,64,0.15);   --tag-bse-c: #FFE57F;
}

/* ════════════════════════════════════════════════════════════
   THEME 2: MIDNIGHT PRO (Deep Dark)
════════════════════════════════════════════════════════════ */
[data-theme="midnight"] {
  --bg: #0a0a0a;
  --surface: #121212;
  --card: #1a1a1a;
  --card-hover: #242424;
  --border: #2a2a2a;
  --border-hover: #2979ff;
  --ink: #f5f5f5;
  --ink2: #cccccc;
  --ink3: #888888;
  --shadow: rgba(0, 0, 0, 0.8);
  --accent: #2979ff;

  --tag-stock: rgba(41,121,255,0.15); --tag-stock-c: #82b1ff;
  --tag-index: rgba(170,0,255,0.15);  --tag-index-c: #e040fb;
  --tag-result: rgba(0,200,83,0.15);  --tag-result-c: #69f0ae;
  --tag-global: rgba(213,0,0,0.15);   --tag-global-c: #ff5252;
  --tag-ipo: rgba(255,0,255,0.15);    --tag-ipo-c: #ff80ab;
  --tag-bse: rgba(255,109,0,0.15);    --tag-bse-c: #ffd180;
}

/* ════════════════════════════════════════════════════════════
   THEME 3: INSTITUTIONAL LIGHT (Crisp White)
════════════════════════════════════════════════════════════ */
[data-theme="light"] {
  --bg: #e5e7eb;
  --surface: #ffffff;
  --card: #ffffff;
  --card-hover: #f8f9fa;
  --border: #d1d5db;
  --border-hover: #1d55d0;
  --ink: #111827;
  --ink2: #374151;
  --ink3: #6b7280;
  --shadow: rgba(0, 0, 0, 0.08);
  --accent: #1d55d0;

  --tag-stock: rgba(29,85,208,0.1);   --tag-stock-c: #1d55d0;
  --tag-index: rgba(123,31,162,0.1);  --tag-index-c: #7b1fa2;
  --tag-result: rgba(10,145,96,0.1);  --tag-result-c: #0a9160;
  --tag-global: rgba(212,32,53,0.1);  --tag-global-c: #d42035;
  --tag-ipo: rgba(194,24,91,0.1);     --tag-ipo-c: #c2185b;
  --tag-bse: rgba(230,81,0,0.1);      --tag-bse-c: #e65100;
}

/* ════════════════════════════════════
   BASE & TYPOGRAPHY
════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 15px; line-height: 1.6;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.3s, color 0.3s;
  padding: 20px 10px;
}

/* ════════════════════════════════════
   UNIFIED LAYOUT (NO MORE WIDTH MISMATCH)
════════════════════════════════════ */
.layout-container {
  max-width: 1550px; /* Lock for both Ticker and News */
  margin: 0 auto;
}

/* ════════════════════════════════════
   TICKER BAR (TOP)
════════════════════════════════════ */
#ticker-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-top-left-radius: 12px;
  border-top-right-radius: 12px;
  height: 54px; display: flex; align-items: center; padding: 0 24px;
  position: sticky; top: 0; z-index: 300;
}
.ticker-label {
  font-size: 0.75rem; font-weight: 800; letter-spacing: 1.5px;
  color: var(--ink3); margin-right: 24px; text-transform: uppercase;
}
/* Ticker now gets 100% of the space because buttons moved down! */
.ticker-scroll { flex: 1; overflow: hidden; display: flex; align-items: center; }
.ticker-inner { display: flex; align-items: center; gap: 30px; overflow-x: auto; scrollbar-width: none; }
.ticker-inner::-webkit-scrollbar { display: none; }
.t-item { display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
.t-val.up { color: #00e676; } .t-val.dn { color: #ff1744; }

/* ════════════════════════════════════
   WRAPPER (BOTTOM)
════════════════════════════════════ */
.wrapper {
  background: var(--surface);
  min-height: calc(100vh - 120px);
  border: 1px solid var(--border);
  border-bottom-left-radius: 12px;
  border-bottom-right-radius: 12px;
  box-shadow: 0 10px 40px var(--shadow);
}

/* ════════════════════════════════════
   TABS & ACTIONS WRAPPER (THE CIRCLE FIX)
════════════════════════════════════ */
#tab-actions-wrapper {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 54px; z-index: 200;
}

/* Tabs Left Side */
#tab-bar {
  display: flex; align-items: center; gap: 5px; padding: 0 20px;
  overflow-x: auto; scrollbar-width: none; flex: 1;
}
#tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 18px 16px; font-size: 0.95rem; font-weight: 600; color: var(--ink3);
  border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap;
  transition: all 0.2s ease;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700;
  padding: 2px 8px; border-radius: 12px; background: var(--border);
  color: var(--ink); margin-left: 6px; transition: 0.2s;
}
.tab.active .tab-badge { background: var(--accent); color: #fff; }

/* Actions Right Side (Moved from Ticker) */
.tab-actions {
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px 0 16px; border-left: 1px solid var(--border);
}

/* ════════════════════════════════════
   BUTTONS & LIVE SYNC DOT
════════════════════════════════════ */
.update-container {
  display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: var(--ink3); background: var(--bg);
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); white-space: nowrap;
}
.tbtn {
  height: 36px; padding: 0 16px; border-radius: 8px; background: var(--card);
  border: 1px solid var(--border); color: var(--ink); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
  white-space: nowrap;
}
.tbtn:hover { background: var(--card-hover); border-color: var(--accent); }

.live-dot {
  width: 8px; height: 8px; background-color: #00e676; border-radius: 50%;
  display: inline-block; animation: blink 1.5s infinite ease-in-out;
}
@keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 8px #00e676; } 100% { opacity: 0.3; } }

/* ════════════════════════════════════
   PREMIUM NEWS CARDS
════════════════════════════════════ */
#news-container { padding: 24px; background: var(--bg); min-height: 80vh; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }

.news-item {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 22px 28px; margin-bottom: 16px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  animation: fadeSlideUp 0.3s ease forwards;
}
.news-item:hover {
  background: var(--card-hover); border-color: var(--border-hover);
  transform: translateY(-3px); box-shadow: 0 8px 20px var(--shadow);
}
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.tag {
  font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 1px; display: inline-block; border: 1px solid transparent;
}
.tag-STOCKS { background: var(--tag-stock); color: var(--tag-stock-c); border-color: var(--tag-stock); }
.tag-INDEX  { background: var(--tag-index); color: var(--tag-index-c); border-color: var(--tag-index); }
.tag-RESULTS{ background: var(--tag-result); color: var(--tag-result-c); border-color: var(--tag-result); }
.tag-GLOBAL { background: var(--tag-global); color: var(--tag-global-c); border-color: var(--tag-global); }
.tag-IPO    { background: var(--tag-ipo); color: var(--tag-ipo-c); border-color: var(--tag-ipo); }
.tag-BSE    { background: var(--tag-bse); color: var(--tag-bse-c); border-color: var(--tag-bse); }

.headline {
  font-size: 1.25rem; font-weight: 700; color: var(--ink); text-decoration: none;
  display: block; margin: 12px 0; line-height: 1.4; transition: color 0.2s;
}
.headline:hover { color: var(--accent); }

.source-chip {
  font-size: 0.7rem; font-weight: 600; color: var(--ink2); background: transparent;
  padding: 2px 8px; border-radius: 4px; margin-left: 10px; border: 1px solid var(--border);
}

.news-time {
  font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
  color: var(--ink3); display: flex; align-items: center; gap: 10px; font-weight: 500;
}

.list-header {
  padding: 10px 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
  color: var(--ink2); margin: 24px 0 12px 0; border-bottom: 2px solid var(--border); letter-spacing: 1px;
}

.spin {
  display: inline-block; width: 20px; height: 20px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: ro 0.8s linear infinite;
}
@keyframes ro { to { transform: rotate(360deg); } }

/* ════════════════════════════════════
   📱 MOBILE RESPONSIVE
════════════════════════════════════ */
@media (max-width: 950px) {
  #tab-actions-wrapper { flex-direction: column; align-items: stretch; }
  .tab-actions { border-left: none; border-top: 1px solid var(--border); padding: 12px 20px; justify-content: space-between; }
}

@media (max-width: 768px) {
  body { padding: 0; }
  .layout-container { border-radius: 0; }
  #ticker-bar { border-radius: 0; border-left: none; border-right: none; padding: 0 12px; height: 50px; }
  .wrapper { border-radius: 0; border-left: none; border-right: none; box-shadow: none; border-bottom: none; }
  
  .ticker-label { display: none; }
  .tbtn span { display: none; }
  .tbtn { padding: 0 14px; font-size: 1rem; }
  .update-container { font-size: 0.65rem; padding: 4px 10px; }
  
  #tab-bar { padding: 0 10px; }
  .tab { padding: 14px 12px; font-size: 0.85rem; }
  
  #news-container { padding: 16px 12px; }
  .news-item { padding: 16px; border-radius: 8px; margin-bottom: 12px; }
  .headline { font-size: 1.1rem; margin: 8px 0; }
  .tag { font-size: 0.6rem; padding: 3px 8px; }
}
</style>
</head>
<body>

<div class="layout-container">
  <div id="ticker-bar">
    <div class="ticker-label">MARKETS</div>
    <div class="ticker-scroll">
      <div class="ticker-inner" id="indices-container">
        <span style="color:var(--ink3); font-size:0.85rem;">Loading Live Indices...</span>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <div id="tab-actions-wrapper">
      <div id="tab-bar">
        <div class="tab active" onclick="switchTab(this,'ALL')">All Feed <span class="tab-badge" id="cnt-ALL">0</span></div>
        <div class="tab" onclick="switchTab(this,'STOCKS')">Stocks <span class="tab-badge" id="cnt-STOCKS">0</span></div>
        <div class="tab" onclick="switchTab(this,'INDEX')">Index <span class="tab-badge" id="cnt-INDEX">0</span></div>
        <div class="tab" onclick="switchTab(this,'RESULTS')">Results <span class="tab-badge" id="cnt-RESULTS">0</span></div>
        <div class="tab" onclick="switchTab(this,'GLOBAL')">Global <span class="tab-badge" id="cnt-GLOBAL">0</span></div>
        <div class="tab" onclick="switchTab(this,'IPO')">IPO <span class="tab-badge" id="cnt-IPO">0</span></div>
        <div class="tab" onclick="switchTab(this,'BSE')">BSE Filings <span class="tab-badge" id="cnt-BSE">0</span></div>
      </div>
      
      <div class="tab-actions">
        <div class="update-container">
          <span class="live-dot"></span>
          <span id="update-time">Connecting...</span>
        </div>
        <button class="tbtn" onclick="toggleTheme()" id="theme-btn">
          <i class="fas fa-moon"></i><span>Theme</span>
        </button>
        <button class="tbtn" onclick="refreshData(true)" id="refresh-btn">
          <i class="fas fa-sync-alt" id="refresh-icon"></i><span>Sync</span>
        </button>
      </div>
    </div>

    <div id="news-container">
      <div style="padding: 120px 20px; text-align: center; color: var(--ink3);">
        <span class="spin"></span><br><br>
        <h3 style="color: var(--ink); margin-bottom: 8px;">Initializing Connection</h3>
        <p>Fetching latest market data...</p>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
const WORKER_URL = 'https://news-fetcher.21aoips3531a1zi.workers.dev/';
let allNews = [], bseNews = [], curTab = 'ALL';
let isInitialLoad = true;

/* ── Theme Switcher ── */
(function(){
  const t = localStorage.getItem('pro_theme_v1') || 'teal';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeBtn(t);
})();

function toggleTheme(){
  const curr = document.documentElement.getAttribute('data-theme');
  let next = curr === 'teal' ? 'midnight' : curr === 'midnight' ? 'light' : 'teal';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pro_theme_v1', next);
  updateThemeBtn(next);
}

function updateThemeBtn(theme) {
  const btn = document.getElementById('theme-btn');
  if(theme === 'teal') btn.innerHTML = '<i class="fas fa-sparkles"></i><span>Neon</span>';
  else if(theme === 'midnight') btn.innerHTML = '<i class="fas fa-moon"></i><span>Dark</span>';
  else btn.innerHTML = '<i class="fas fa-sun"></i><span>Light</span>';
}

/* ── Aggressive Date Killer (No more 'Invalid Date') ── */
function isValidDate(d) {
  return d instanceof Date && !isNaN(d.getTime());
}

function timeAgo(dateStr){
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (!isValidDate(d)) return ''; 
  const diff = Math.floor((new Date() - d) / 60000);
  if (diff < 1) return 'JUST NOW';
  if (diff < 60) return diff + ' MIN AGO';
  return Math.floor(diff / 60) + ' HRS AGO';
}

function fmtTime(iso){
  if (!iso) return '';
  const d = new Date(iso);
  if (!isValidDate(d)) return ''; 
  return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' }) + ' IST';
}

/* ── UI Updaters ── */
function updateCounts(){
  ['STOCKS','INDEX','RESULTS','GLOBAL','IPO'].forEach(c => {
    document.getElementById('cnt-' + c).textContent = allNews.filter(x => x.category === c).length;
  });
  document.getElementById('cnt-ALL').textContent = allNews.length;
  document.getElementById('cnt-BSE').textContent = bseNews.length;
}

function switchTab(el, tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); curTab = tab; renderNews();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderIndices(idx){
  const c = document.getElementById('indices-container');
  if (!idx?.length) return;
  c.innerHTML = idx.map(i => {
    const isUp = parseFloat(i.change) > 0;
    return `<div class="t-item">
      <span style="color:var(--ink2)">${i.symbol}</span>
      <span class="${isUp ? 'up' : 'dn'}">${i.price} <span style="opacity:0.8">(${isUp ? '+' : ''}${i.change}%)</span></span>
    </div>`;
  }).join('');
}

/* ── Card Renderer ── */
function renderNews(){
  const container = document.getElementById('news-container');
  if (curTab === 'BSE') { renderBSE(container); return; }
  
  const list = curTab === 'ALL' ? allNews : allNews.filter(n => n.category === curTab);
  
  if (!list.length && isInitialLoad) return;
  if (!list.length) {
    container.innerHTML = '<div style="padding:100px; text-align:center; color:var(--ink3)"><h3>No Activity</h3><p>Market is quiet in this category right now.</p></div>';
    return;
  }
  
  let html = list.map((item, index) => {
    let tStr = fmtTime(item.pubDate);
    let aStr = timeAgo(item.pubDate);
    
    // Fallback logic if date is corrupted
    let timeHtml = (tStr && aStr) 
      ? `<i class="far fa-clock"></i> ${tStr} <span style="color:var(--border-hover)">•</span> <span style="color:var(--ink2)">${aStr}</span>`
      : `<i class="fas fa-bolt"></i> <span style="color:var(--ink2)">LIVE UPDATE</span>`;

    return `
    <div class="news-item" style="animation-delay: ${Math.min(index * 0.03, 0.5)}s">
      <div style="margin-bottom:12px; display:flex; align-items:center;">
        <span class="tag tag-${item.category}">${item.category}</span>
        <span class="source-chip"><i class="fas fa-bolt" style="font-size:0.6rem; margin-right:4px;"></i>${item.source}</span>
      </div>
      <a href="${item.link}" target="_blank" class="headline">${item.title}</a>
      <div class="news-time">
        ${timeHtml}
      </div>
    </div>`;
  }).join('');
  
  container.innerHTML = html;
}

function renderBSE(container){
  if (!bseNews.length) {
    container.innerHTML = '<div style="padding:100px; text-align:center; color:var(--ink3)"><h3>No Filings</h3><p>Awaiting data from BSE servers.</p></div>';
    return;
  }

  const groups = {};
  bseNews.forEach(x => { const c = x.bseCat || 'FILING'; if(!groups[c]) groups[c]=[]; groups[c].push(x); });
  
  let html = '';
  ['DIVIDEND','RESULTS','BOARD','CORPORATE','BUYBACK','BONUS/SPLIT','CAPITAL','FILING'].forEach(grp => {
    if(!groups[grp]) return;
    html += `<div class="list-header">${grp} Announcements <span style="float:right; opacity:0.6;">${groups[grp].length} Updates</span></div>`;
    html += groups[grp].map((item, index) => {
      let tStr = fmtTime(item.pubDate);
      let aStr = timeAgo(item.pubDate);
      let timeHtml = (tStr && aStr) 
        ? `<span style="color:var(--border-hover)">•</span> ${tStr} <span style="color:var(--border-hover)">•</span> ${aStr}`
        : `<span style="color:var(--border-hover)">•</span> LIVE UPDATE`;

      return `
      <div class="news-item" style="animation-delay: ${Math.min(index * 0.03, 0.5)}s; padding:18px 24px;">
        <div style="margin-bottom:8px;"><span class="tag tag-BSE">BSE FILING</span></div>
        <a href="${item.link}" target="_blank" class="headline" style="font-size:1.1rem; margin:8px 0;">${item.title}</a>
        <div class="news-time">
          <i class="fas fa-file-signature"></i> Exchange Upload 
          ${timeHtml}
        </div>
      </div>`;
    }).join('');
  });
  
  container.innerHTML = html;
}

/* ── Auto-Sync ── */
async function refreshData(isManual = false){
  const icon = document.getElementById('refresh-icon');
  if(isManual && icon) icon.style.animation = 'ro 0.8s linear infinite';
  
  try {
    const res = await fetch(WORKER_URL + '?t=' + Date.now());
    const data = await res.json();
    
    allNews = data.news || [];
    bseNews = data.bse || [];
    
    updateCounts();
    renderNews();
    renderIndices(data.indices || []);
    
    let updatedTime = data.updatedAt ? fmtTime(data.updatedAt) : fmtTime(new Date().toISOString());
    document.getElementById('update-time').textContent = 'Live Sync: ' + (updatedTime || 'LIVE');
    isInitialLoad = false;
  } catch(e) { console.error("Sync Interrupted", e); }
  
  if(isManual && icon) icon.style.animation = '';
}

refreshData(true);
setInterval(() => refreshData(false), 120000);
</script>
</body>
</html>
