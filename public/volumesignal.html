<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scalping Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0b0f19;
            --border: #1e293b;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-sub: #94a3b8;
            --text-bright: #f8fafc;
            --header-grad: linear-gradient(90deg, #111827 0%, #172554 100%);
            --row-bg: #1e293b;
            --row-hover: #334155;
            --pill-bg: #0f172a;
            --pill-border: #334155;
            --title-color: #60a5fa;
            --bull: #10b981;
            --bear: #ef4444;
            --bull-bg: rgba(16, 185, 129, 0.15);
            --bull-text: #34d399;
            --bear-bg: rgba(239, 68, 68, 0.15);
            --bear-text: #f87171;
            --flash-bull: #065f46;
            --flash-bear: #7f1d1d;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            --blaze-glow: 0 0 15px rgba(96, 165, 250, 0.4);
        }

        :root[data-theme="light"] {
            --bg: #f0f4f8;
            --border: #cbd5e1;
            --text: #1e293b;
            --text-muted: #94a3b8;
            --text-sub: #64748b;
            --text-bright: #0f172a;
            --header-grad: linear-gradient(90deg, #1e40af 0%, #1d4ed8 100%);
            --row-bg: #ffffff;
            --row-hover: #f1f5f9;
            --pill-bg: #f1f5f9;
            --pill-border: #cbd5e1;
            --title-color: #ffffff;
            --bull: #059669;
            --bear: #dc2626;
            --bull-bg: rgba(5, 150, 105, 0.1);
            --bull-text: #059669;
            --bear-bg: rgba(220, 38, 38, 0.1);
            --bear-text: #dc2626;
            --flash-bull: #d1fae5;
            --flash-bear: #fee2e2;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --blaze-glow: 0 0 15px rgba(30, 64, 175, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: var(--header-grad);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            gap: 10px;
        }

        .title h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--title-color);
            text-transform: uppercase;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .status {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bull);
            box-shadow: 0 0 10px var(--bull);
            animation: pulse 1.5s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(0.9);
                opacity: .8
            }

            50% {
                transform: scale(1.1);
                opacity: 1
            }
        }

        .time-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 13px;
            color: #fff;
            font-weight: 600;
            font-family: monospace;
            white-space: nowrap;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-btn:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .control-btn.active {
            background: #3b82f6;
            border-color: #60a5fa;
        }

        main {
            padding: 12px 20px;
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── BLAZE ANIMATION ── */
        @keyframes blaze-effect {
            0% {
                box-shadow: 0 0 0 var(--blaze-glow);
            }

            50% {
                box-shadow: 0 0 20px var(--blaze-glow);
                border-color: #60a5fa;
            }

            100% {
                box-shadow: 0 0 0 var(--blaze-glow);
            }
        }

        .blaze {
            animation: blaze-effect 2s infinite ease-in-out;
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.05) !important;
        }

        .new-tag {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 800;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        /* ── DESKTOP COLUMN HEADERS ── */
        .list-header {
            display: flex;
            padding: 10px 20px;
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .list-header div {
            cursor: pointer;
            user-select: none;
            transition: color 0.1s;
        }

        .list-header div:hover {
            color: var(--text-bright);
            background: rgba(128, 128, 128, 0.08);
            border-radius: 4px;
        }

        .sort-icon {
            display: inline-block;
            margin-left: 4px;
            margin-top: -2px;
        }

        .col-time {
            width: 90px;
            flex-shrink: 0;
        }

        .col-symbol {
            width: 160px;
            flex-shrink: 0;
        }

        .col-type {
            width: 140px;
            flex-shrink: 0;
        }

        .col-price {
            width: 110px;
            text-align: right;
            flex-shrink: 0;
        }

        .col-vwap {
            width: 110px;
            text-align: right;
            flex-shrink: 0;
            color: #60a5fa;
        }

        .col-vol {
            width: 130px;
            text-align: right;
            flex-shrink: 0;
        }

        .col-avgvol {
            width: 130px;
            text-align: right;
            flex-shrink: 0;
        }

        .col-spike {
            flex: 1;
            text-align: right;
            display: flex;
            justify-content: flex-end;
        }

        /* ── ROWS ── */
        .signal-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .row {
            display: flex;
            align-items: center;
            background: var(--row-bg);
            padding: 14px 20px;
            border-radius: 6px;
            border-left: 4px solid transparent;
            border: 1px solid transparent;
            /* for blaze */
            transition: background 0.2s;
            box-shadow: var(--shadow);
        }

        .row:hover {
            background: var(--row-hover);
        }

        .BULLISH,
        .SUPER.BULLISH {
            border-left-color: var(--bull);
        }

        .BEARISH,
        .SUPER.BEARISH {
            border-left-color: var(--bear);
        }

        .row .col-time {
            color: #94a3b8;
            font-family: monospace;
            font-size: 13px;
        }

        .row .col-symbol {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-bright);
        }

        .row .col-price {
            font-family: monospace;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        .row .col-vwap {
            font-family: monospace;
            font-size: 14px;
            font-weight: 600;
        }

        .row .col-vol {
            font-family: monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-bright);
        }

        .row .col-avgvol {
            font-family: monospace;
            font-size: 13px;
            color: #64748b;
        }

        .BULLISH-text {
            color: var(--bull);
        }

        .BEARISH-text {
            color: var(--bear);
        }

        .type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
        }

        .BULLISH .type-badge {
            background: var(--bull-bg);
            color: var(--bull-text);
        }

        .BEARISH .type-badge {
            background: var(--bear-bg);
            color: var(--bear-text);
        }

        .spike-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--pill-bg);
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            border: 1px solid var(--pill-border);
        }

        .BULLISH .spike-pill {
            color: var(--bull);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .BEARISH .spike-pill {
            color: var(--bear);
            border-color: rgba(239, 68, 68, 0.3);
        }

        #empty-state {
            text-align: center;
            color: #64748b;
            margin-top: 50px;
            font-style: italic;
        }

        @keyframes flashNewBullish {
            0% {
                background: var(--flash-bull);
                transform: translateX(-5px)
            }

            100% {
                background: var(--row-bg);
                transform: translateX(0)
            }
        }

        @keyframes flashNewBearish {
            0% {
                background: var(--flash-bear);
                transform: translateX(-5px)
            }

            100% {
                background: var(--row-bg);
                transform: translateX(0)
            }
        }

        .BULLISH.new-row {
            animation: flashNewBullish 0.8s ease-out forwards;
        }

        .BEARISH.new-row {
            animation: flashNewBearish 0.8s ease-out forwards;
        }

        /* ══════════════════════════════════════
           MOBILE  ≤ 640px  —  pure CSS only
        ══════════════════════════════════════ */
        @media (max-width: 640px) {
            main {
                padding: 8px 8px;
            }

            /* Hide column-header bar */
            .list-header {
                display: none;
            }

            /* Card: wrap all cols */
            .row {
                flex-wrap: wrap;
                padding: 11px 12px;
                gap: 0;
                row-gap: 7px;
                align-items: flex-start;
            }

            /* ── Line 1: Symbol | Badge | Spike pill ── */
            .row .col-symbol {
                order: 1;
                flex: 1;
                width: auto;
                font-size: 16px;
                font-weight: 800;
                align-self: center;
            }

            .row .col-type {
                order: 2;
                width: auto;
                flex-shrink: 0;
                align-self: center;
                text-align: left;
            }

            .row .col-spike {
                order: 3;
                width: auto;
                flex: none;
                justify-content: flex-end;
                align-self: center;
            }

            /* ── Line 2: LTP (left) | Volume (right) ── */
            .row .col-price {
                order: 4;
                width: 40%;
                text-align: left;
                font-size: 15px;
                font-weight: 700;
            }

            .row .col-vwap {
                order: 5;
                width: 30%;
                text-align: center;
                color: #60a5fa;
                font-size: 13px;
            }

            .row .col-vol {
                order: 6;
                width: 30%;
                text-align: right;
                font-size: 13px;
            }

            /* ── Line 3: Time (left) | AvgVol (right) ── */
            .row .col-time {
                order: 7;
                width: 50%;
                font-size: 11px;
                color: var(--text-sub);
                padding-top: 5px;
                border-top: 1px solid var(--border);
            }

            .row .col-avgvol {
                order: 8;
                width: 50%;
                text-align: right;
                font-size: 11px;
                padding-top: 5px;
                border-top: 1px solid var(--border);
                color: var(--text-muted);
            }

            .row .col-avgvol::before {
                content: "30D Avg: ";
            }

            .spike-pill {
                font-size: 11px;
                padding: 3px 8px;
            }

            .type-badge {
                font-size: 9px;
                padding: 3px 7px;
            }

            .title h1 {
                font-size: 15px;
            }

            .time-box {
                font-size: 11px;
                padding: 4px 7px;
            }

            .control-btn {
                font-size: 11px;
                padding: 4px 9px;
            }

            .signal-list {
                gap: 5px;
            }

            .row .col-vwap::before {
                content: "V: ";
                color: #94a3b8;
                font-size: 9px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <div class="title">
                <h1>📡 Price Vol Radar</h1>
            </div>
            <div class="status">
                <div class="pulse" id="live-indicator"></div>
                <div class="time-box" id="clock">--:--:--</div>
                <button class="control-btn" onclick="toggleSound()" id="sound-btn">🔇 Mute</button>
                <button class="control-btn" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
            </div>
        </div>
    </header>

    <main>
        <div class="list-header" title="Click any header to Sort data!">
            <div class="col-time" onclick="setSort('timestamp')" data-sort="timestamp">Time <span
                    class="sort-icon">↓</span></div>
            <div class="col-symbol" onclick="setSort('symbol')" data-sort="symbol">Symbol <span
                    class="sort-icon"></span></div>
            <div class="col-type" onclick="setSort('type')" data-sort="type">Signal <span class="sort-icon"></span>
            </div>
            <div class="col-price" onclick="setSort('ltp')" data-sort="ltp">LTP <span class="sort-icon"></span></div>
            <div class="col-vwap" onclick="setSort('vwap')" data-sort="vwap">VWAP <span class="sort-icon"></span></div>
            <div class="col-vol" onclick="setSort('volume')" data-sort="volume">Vol Today <span
                    class="sort-icon"></span></div>
            <div class="col-avgvol" onclick="setSort('avg_vol')" data-sort="avg_vol">30D Avg <span
                    class="sort-icon"></span></div>
            <div class="col-spike" onclick="setSort('vol_ratio')" data-sort="vol_ratio" style="padding-right:15px;">
                Power <span class="sort-icon"></span></div>
        </div>
        <div id="empty-state">Connecting to Serverless Feed...</div>
        <div class="signal-list" id="list"></div>
    </main>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <script>
        const PUBLIC_R2_URL = "https://pub-ced41a0bcdfc4c8da30ae906c5f3a3f7.r2.dev/signals/live_alerts.json";

        let currentSort = 'timestamp';
        let sortDesc = true;
        let latestSignals = [];
        let soundEnabled = false;
        let lastSignalDate = 0;

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-btn');
            btn.textContent = soundEnabled ? '🔊 Sound' : '🔇 Mute';
            btn.classList.toggle('active', soundEnabled);
        }

        function setSort(key) {
            if (currentSort === key) {
                sortDesc = !sortDesc;
            } else {
                currentSort = key;
                sortDesc = true;
            }
            updateHeaders();
            if (latestSignals.length > 0) {
                renderList(latestSignals);
            }
        }

        function updateHeaders() {
            document.querySelectorAll('.list-header div').forEach(el => {
                const icon = el.querySelector('.sort-icon');
                if (!icon) return;
                if (el.getAttribute('data-sort') === currentSort) {
                    icon.innerText = sortDesc ? '↓' : '↑';
                } else {
                    icon.innerText = '';
                }
            });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-btn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        async function fetchData() {
            try {
                const res = await fetch(PUBLIC_R2_URL + '?t=' + Date.now());
                if (!res.ok) throw new Error("Fetch failed");
                const json = await res.json();

                // Play sound if new signal added
                const updatedTime = new Date(json.last_updated).getTime();
                if (soundEnabled && lastSignalDate > 0 && updatedTime > lastSignalDate) {
                    if (json.signals.length > latestSignals.length) {
                        document.getElementById('alert-sound').play().catch(e => { });
                    }
                }
                lastSignalDate = updatedTime;

                latestSignals = json.signals || [];
                renderList(latestSignals);
                document.getElementById('live-indicator').style.backgroundColor = '#10b981';
                document.getElementById('live-indicator').style.boxShadow = '0 0 10px #10b981';
            } catch (err) {
                document.getElementById('live-indicator').style.backgroundColor = '#ef4444';
                document.getElementById('live-indicator').style.boxShadow = '0 0 10px #ef4444';
            }
        }

        function isRecentlyCreated(timestampStr) {
            if (!timestampStr) return false;
            try {
                const now = new Date();
                const [h, m, s] = timestampStr.split(':').map(Number);
                const signalTime = new Date();
                signalTime.setHours(h, m, s, 0);

                const diffMs = now - signalTime;
                const diffMins = diffMs / (1000 * 60);

                // If the signal is from today and less than 10 mins old
                return diffMins >= 0 && diffMins <= 10;
            } catch (e) { return false; }
        }

        function renderList(signals) {
            const list = document.getElementById('list');
            
            // If new signals are empty but we already have data, keep the old data!
            if (signals.length === 0 && list.children.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('empty-state').innerText = 'Listening for live Volume + VWAP breakouts...';
                list.innerHTML = '';
                return;
            }
            if (signals.length === 0) return;

            document.getElementById('empty-state').style.display = 'none';

            const uniqueMap = new Map();
            signals.forEach(s => {
                if (!uniqueMap.has(s.symbol)) uniqueMap.set(s.symbol, s);
            });
            let uniqueSignals = Array.from(uniqueMap.values());

            let sortedSignals = uniqueSignals.sort((a,b) => {
                let valA = a[currentSort];
                let valB = b[currentSort];
                if (['ltp', 'vwap', 'volume', 'avg_vol', 'vol_ratio'].includes(currentSort)) {
                    valA = parseFloat(valA) || 0;
                    valB = parseFloat(valB) || 0;
                }
                if (valA < valB) return sortDesc ? 1 : -1;
                if (valA > valB) return sortDesc ? -1 : 1;
                return String(a.symbol).localeCompare(String(b.symbol));
            });

            const currentSymbols = new Set(sortedSignals.map(s => s.symbol));
            Array.from(list.children).forEach(row => {
                if (!currentSymbols.has(row.getAttribute('data-symbol'))) list.removeChild(row);
            });

            sortedSignals.forEach((s, index) => {
                const isBull = (s.type || '').includes('BULLISH');
                const typeClass = isBull ? 'BULLISH' : 'BEARISH';
                const colorClass = isBull ? 'BULLISH-text' : 'BEARISH-text';
                const isRecentlyNew = isRecentlyCreated(s.timestamp);
                const blazeGlow = '#3b82f6';
        const newTagColor = '#ef4444';
                const blazeClass = isRecentlyNew ? 'blaze new-row' : '';
                const newTagHtml = isRecentlyNew ? ' <span class="new-tag">NEW</span>' : '';
                
                const avgVolVal = s.avg_vol ? new Intl.NumberFormat('en-IN').format(s.avg_vol) : '--';
                const vwapVal = s.vwap ? `₹${parseFloat(s.vwap).toFixed(2)}` : '--';
                const priceVal = `₹${parseFloat(s.ltp).toFixed(2)}`;
                const volVal = new Intl.NumberFormat('en-IN').format(s.volume);
                const spikeVal = `${s.vol_ratio}x Vol`;

                let row = list.querySelector(`[data-symbol="${s.symbol}"]`);
                if (!row) {
                    row = document.createElement('div');
                    row.setAttribute('data-symbol', s.symbol);
                    row.className = `row ${typeClass} ${blazeClass}`;
                    row.innerHTML = `
                        <div class="col-time">${s.timestamp}</div>
                        <div class="col-symbol">${s.symbol}${newTagHtml}</div>
                        <div class="col-type"><span class="type-badge">${s.type}</span></div>
                        <div class="col-price ${colorClass}">${priceVal}</div>
                        <div class="col-vwap">${vwapVal}</div>
                        <div class="col-vol">${volVal}</div>
                        <div class="col-avgvol">${avgVolVal}</div>
                        <div class="col-spike"><span class="spike-pill">${spikeVal}</span></div>
                    `;
                    list.appendChild(row);
                } else {
                    if (row.className !== `row ${typeClass} ${blazeClass}`) row.className = `row ${typeClass} ${blazeClass}`;
                    const timeEl = row.querySelector('.col-time');
                    if (timeEl.innerText !== s.timestamp) timeEl.innerText = s.timestamp;
                    
                    const symbolEl = row.querySelector('.col-symbol');
                    const expectedSymbolHtml = `${s.symbol}${newTagHtml}`;
                    if (symbolEl.innerHTML !== expectedSymbolHtml) symbolEl.innerHTML = expectedSymbolHtml;

                    const typeEl = row.querySelector('.type-badge');
                    if (typeEl.innerText !== s.type) typeEl.innerText = s.type;
                    const priceEl = row.querySelector('.col-price');
                    if (priceEl.innerText !== priceVal) priceEl.innerText = priceVal;
                    if (!priceEl.classList.contains(colorClass)) {
                        priceEl.classList.remove('BULLISH-text', 'BEARISH-text');
                        priceEl.classList.add(colorClass);
                    }
                    const vwapEl = row.querySelector('.col-vwap');
                    if (vwapEl.innerText !== vwapVal) vwapEl.innerText = vwapVal;
                    const volEl = row.querySelector('.col-vol');
                    if (volEl.innerText !== volVal) volEl.innerText = volVal;
                    const avgVolEl = row.querySelector('.col-avgvol');
                    if (avgVolEl.innerText !== avgVolVal) avgVolEl.innerText = avgVolVal;
                    const spikeEl = row.querySelector('.spike-pill');
                    if (spikeEl.innerText !== spikeVal) spikeEl.innerText = spikeVal;
                }
                if (list.children[index] !== row) list.insertBefore(row, list.children[index]);
            });
        }

        setInterval(fetchData, 120000);
        fetchData();
        updateHeaders();
    </script>
