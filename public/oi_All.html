<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<script>
(function(){
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const x = c.getContext('2d');
  x.fillStyle = '#b71c1c';
  x.beginPath();
  x.roundRect(0, 0, 64, 64, 12);
  x.fill();
  x.font = 'bold 30px Arial';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillStyle = '#ffffff';
  x.fillText('O', 20, 34);
  x.fillStyle = '#ffffff';
  x.fillText('I', 44, 34);
  const l = document.createElement('link');
  l.rel = 'icon'; l.type = 'image/png';
  l.href = c.toDataURL('image/png');
  document.head.appendChild(l);
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   THEMES
═══════════════════════════════════════ */
[data-theme="dark"] {
  --bg:         #0a0a0d;
  --bg2:        #101014;
  --bg3:        #17171e;
  --bg4:        #1d1d27;
  --bg5:        #232330;
  --border:     #2a2a3e;
  --border2:    #32324e;
  --text:       #e8e8f8;
  --text2:      #8888bb;
  --text3:      #44446a;
  --strike:     #d0d0ee;
  --ce:         #00f07c;
  --ce-bar:     rgba(0,240,124,.48);
  --ce-edge:    #00f07c;
  --ce-dim:     rgba(0,240,124,.18);
  --ce-txt:     #00f07c;
  --pe:         #ff2a52;
  --pe-bar:     rgba(255,42,82,.48);
  --pe-edge:    #ff2a52;
  --pe-dim:     rgba(255,42,82,.18);
  --pe-txt:     #ff4466;
  --atm-bg:     rgba(255,180,0,.14);
  --atm-line:   rgba(255,180,0,.75);
  --atm-txt:    #ffbe00;
  --acc:        #5a9aff;
  --cline:      #32324e;
}
[data-theme="darkblue"] {
  --bg:         #080f1c;
  --bg2:        #0d1828;
  --bg3:        #122034;
  --bg4:        #172840;
  --bg5:        #1c304c;
  --border:     #1e3350;
  --border2:    #254062;
  --text:       #deeeff;
  --text2:      #7ab4d8;
  --text3:      #3a6080;
  --strike:     #c0dcf0;
  --ce:         #00ee7a;
  --ce-bar:     rgba(0,220,110,.50);
  --ce-edge:    #00ee7a;
  --ce-dim:     rgba(0,220,110,.18);
  --ce-txt:     #00f082;
  --pe:         #ff3558;
  --pe-bar:     rgba(255,50,80,.48);
  --pe-edge:    #ff3558;
  --pe-dim:     rgba(255,50,80,.18);
  --pe-txt:     #ff4d6a;
  --atm-bg:     rgba(255,195,0,.13);
  --atm-line:   rgba(255,195,0,.70);
  --atm-txt:    #ffc800;
  --acc:        #4db8ff;
  --cline:      #254062;
}
[data-theme="light"] {
  --bg:         #eef1f8;
  --bg2:        #ffffff;
  --bg3:        #e4e8f4;
  --bg4:        #d8ddf0;
  --bg5:        #ccd3ea;
  --border:     #bcc4de;
  --border2:    #9aa6cc;
  --text:       #0e0e22;
  --text2:      #3a3a70;
  --text3:      #7878a8;
  --strike:     #111130;
  --ce:         #007a38;
  --ce-bar:     rgba(0,150,60,.55);
  --ce-edge:    #007a38;
  --ce-dim:     rgba(0,150,60,.22);
  --ce-txt:     #006830;
  --pe:         #cc0022;
  --pe-bar:     rgba(200,0,30,.55);
  --pe-edge:    #cc0022;
  --pe-dim:     rgba(200,0,30,.22);
  --pe-txt:     #bb0020;
  --atm-bg:     rgba(180,100,0,.12);
  --atm-line:   rgba(160,80,0,.70);
  --atm-txt:    #7a3d00;
  --acc:        #1a55d4;
  --cline:      #9aa6cc;
}

/* ═══════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════ */
#oi-tooltip {
  display: none;
  position: fixed;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 10px 14px;
  box-shadow: 0 6px 28px rgba(0,0,0,.55);
  pointer-events: none;
  min-width: 190px;
  font-family: 'JetBrains Mono', monospace;
}
#oi-tooltip .tt-strike {
  font-size: 12px; font-weight: 600;
  color: var(--atm-txt);
  margin-bottom: 8px;
  letter-spacing: .03em;
}
#oi-tooltip .tt-row {
  display: flex; align-items: baseline;
  gap: 6px; margin-bottom: 4px;
  font-size: 11.5px;
}
#oi-tooltip .tt-label { color: var(--text2); font-size: 10px; width: 28px; }
#oi-tooltip .tt-oi { color: var(--text); font-weight: 600; }
#oi-tooltip .tt-chg { font-size: 10.5px; }
#oi-tooltip .tt-chg.pos { color: var(--ce-txt); }
#oi-tooltip .tt-chg.neg { color: var(--pe-txt); }
#oi-tooltip .tt-chg.zer { color: var(--text3); }

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
select, button, input { outline: none; font-family: inherit; }

/* ═══════════════════════════════════════
   LOADING
═══════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity .3s;
}
#loading.gone { opacity: 0; pointer-events: none; }
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text2);
}

/* ═══════════════════════════════════════
   TOPBAR  (matches screenshots exactly)
═══════════════════════════════════════ */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  gap: 6px; padding: 0 12px; height: 49px;
  flex-wrap: nowrap; overflow-x: auto;
}
#topbar::-webkit-scrollbar { height: 0; }

.nav-btn {
  width: 24px; height: 24px;
  background: var(--bg3); color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer;
  font-size: 14px; display: flex;
  align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.nav-btn:hover { color: var(--text); border-color: var(--acc); }

#sym-select {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; min-width: 110px;
  padding: 2px 6px;
}
#sym-select option {
  background: var(--bg3);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  padding: 4px 8px;
}

.exp-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text2);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 6px;
  white-space: nowrap; flex-shrink: 0;
}

.tb-div { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.flex1 { flex: 0 0 auto; }

/* ── SIGNAL TICKER ── */
#sig-ticker {
  flex: 1;
  min-width: 0;
  height: 26px;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
}
#sig-track {
  display: flex;
  align-items: center;
  gap: 14px;
  white-space: nowrap;
  position: absolute;
  left: 0;
}
#sig-track.scrolling {
  animation: ticker-scroll linear infinite;
}
#sig-track.scrolling:hover { animation-play-state: paused; }
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.sig-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color .15s, background .15s;
  font-family: 'JetBrains Mono', monospace;
}
.sig-chip:hover { background: var(--bg4); }
.sig-chip.bull { border-color: rgba(0,238,122,.4); color: var(--ce-txt); }
.sig-chip.bear { border-color: rgba(255,37,80,.4); color: var(--pe-txt); }
.sig-chip .sig-val { font-size: 10px; opacity: .7; }

/* Button groups */
.bg {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  background: var(--bg3);
  flex-shrink: 0;
}
.bg button {
  background: transparent;
  color: var(--text2);
  border: none;
  padding: 3px 9px;
  font-size: 11.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
}
.bg button:hover { color: var(--text); }
.bg button.on { background: var(--bg5); color: var(--text); }
.bg.ce button.on { color: var(--ce-txt); }
.bg.acc button.on { color: var(--acc); }

.tv-btn {
  background: var(--bg3); color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 7px;
  height: 26px; cursor: pointer;
  font-size: 13px; display: flex;
  align-items: center; flex-shrink: 0;
  transition: all .12s;
}
.tv-btn:hover { color: var(--text); border-color: var(--acc); }

/* ═══════════════════════════════════════
   INFOBAR
═══════════════════════════════════════ */
#infobar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  gap: 0; padding: 0 12px; height: 42px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; overflow-x: auto;
  white-space: nowrap;
  overflow: visible;
}
#infobar::-webkit-scrollbar { height: 0; }
.ii { display: flex; align-items: center; gap: 5px; padding: 0 10px; border-right: 1px solid var(--border); height: 100%; }
.ii:first-child { padding-left: 0; }
.ii-right {
  margin-left: auto;
  display: flex; align-items: center;
  border-left: 1px solid var(--border);
  flex-shrink: 0;
}
.ii-right .ii { border-right: none; border-left: 1px solid var(--border); }
.ii-right .ii:first-child { border-left: none; }
.iv-scantime { color: var(--acc) !important; font-size: 11.5px; animation: scanGlow 2s ease-in-out infinite; }
@keyframes scanGlow {
  0%,100% { text-shadow: 0 0 4px var(--acc); opacity: 1; }
  50%      { text-shadow: 0 0 10px var(--acc), 0 0 18px var(--acc); opacity: .8; }
}
#scan-sel option.latest { color: var(--acc); font-weight: 700; font-size: 12px; }
#scan-ii {
  background: linear-gradient(90deg, var(--bg4), var(--bg3));
  border-right: 2px solid var(--acc) !important;
  padding-right: 14px;
}
.il { color: var(--text2); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; }
.iv { color: var(--text); font-weight: 600; }
.iv.ce { color: var(--ce-txt); }
.iv.pe { color: var(--pe-txt); }
.iv.sp { color: var(--atm-txt); }
.iv.bull { color: var(--ce-txt); }
.iv.bear { color: var(--pe-txt); }
#scan-sel {
  background: transparent;
  color: var(--text);
  border: none;
  font-size: 11px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  letter-spacing: .03em;
  min-width: 279px;
}
#scan-sel.is-latest {
  color: var(--acc);
}
#scan-sel option {
  background: var(--bg3);
  color: var(--text);
  font-weight: 500;
}

/* ── SYMBOL SEARCH ── */
#sym-search-wrap {
  position: relative;
  display: flex; align-items: center;
  gap: 5px;
  padding: 0 10px;
  border-right: 1px solid var(--border);
  border-left: 1px solid var(--border);
  height: 100%;
  background: var(--bg3);
}
#sym-search-icon {
  font-size: 11px;
  color: var(--acc);
  opacity: .8;
  pointer-events: none;
  flex-shrink: 0;
}
#sym-search {
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--acc);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  width: 160px;
  padding: 1px 2px;
  text-transform: uppercase;
  outline: none;
  letter-spacing: .04em;
  transition: border-color .15s, width .2s, box-shadow .15s;
}
#sym-search:focus {
  border-color: var(--acc);
  width: 200px;
  box-shadow: 0 2px 0 var(--acc);
}
#sym-search::placeholder { color: var(--text3); text-transform: none; font-weight: 400; font-size: 10px; letter-spacing: 0; }
#sym-dropdown {
  display: none;
  position: absolute;
  top: 42px; left: 0;
  min-width: 200px;
  background: var(--bg2);
  border: 1px solid var(--acc);
  border-top: 2px solid var(--acc);
  border-radius: 0 0 7px 7px;
  z-index: 300;
  box-shadow: 0 8px 28px rgba(0,0,0,.55), 0 0 0 1px rgba(90,154,255,.08);
  max-height: 260px;
  overflow-y: auto;
}
#sym-dropdown .sd-header {
  padding: 4px 10px;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--acc);
  opacity: .6;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
#sym-dropdown .sd-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  transition: background .08s;
}
#sym-dropdown .sd-item:last-child { border-bottom: none; }
#sym-dropdown .sd-item::before {
  content: '▸';
  font-size: 9px;
  color: var(--text3);
  flex-shrink: 0;
}
#sym-dropdown .sd-item:hover,
#sym-dropdown .sd-item.active {
  background: var(--bg4);
  color: var(--acc);
}
#sym-dropdown .sd-item:hover::before,
#sym-dropdown .sd-item.active::before { color: var(--acc); }
#sym-dropdown .sd-item .sd-match {
  color: var(--acc);
  font-weight: 800;
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ═══════════════════════════════════════
   CHAIN HEADER
═══════════════════════════════════════ */
#chain-hdr {
  display: grid;
  grid-template-columns: 50px 1fr 72px 1fr 56px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  position: sticky; top: 91px; z-index: 50;
  height: 36px;
}
#chain-hdr > div {
  display: flex; align-items: center;
  padding: 0 8px;
  font-size: 9px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
}
.hce { color: var(--ce-txt); justify-content: flex-end; opacity: .9; }
.hst { color: var(--text); justify-content: center; border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); font-weight: 700; }
.hpe { color: var(--pe-txt); opacity: .9; }
.hoi { color: var(--ce-txt); justify-content: flex-end; opacity: .85; padding-right: 12px; }
.hchg { color: var(--pe-txt); opacity: .85; padding-left: 12px; }

/* ═══════════════════════════════════════
   STRIKE GROUPS
   Each group = 2 rows (CE top, PE bottom)
   Cols: [OI-val | OI-bar | Strike | CHG-bar | CHG-val]
═══════════════════════════════════════ */
#chain-body { width: 100%; margin-top: 60px; }

/* ── PC Fixed Info Boxes ── */
#info-box-oi, #info-box-chg {
  display: block;
  visibility: hidden;
  position: fixed;
  top: 128px;
  z-index: 200;
  background: var(--tt-bg, var(--bg4));
  border: 1px solid var(--border2);
  border-left: 2px solid var(--acc);
  border-radius: 5px;
  padding: 7px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  white-space: nowrap;
}
[data-theme="dark"]    { --tt-bg: #1a1a2e; }
[data-theme="darkblue"]{ --tt-bg: #0d1f3c; }
[data-theme="light"]   { --tt-bg: #dde3f5; }

.ib-strike {
  color: var(--atm-txt);
  font-weight: 700;
  font-size: 11px;
  margin-bottom: 3px;
}
.ib-data-row {
  display: flex;
  gap: 20px;
  align-items: center;
}
.ib-cell {
  display: flex;
  align-items: center;
  gap: 5px;
}
.ib-label {
  font-size: 10px;
  color: var(--text2);
  font-weight: 600;
}
.ib-val { color: var(--text); font-weight: 600; font-size: 11px; }
.ib-chg { font-size: 10.5px; }
.ib-chg.pos { color: var(--ce-txt); }
.ib-chg.neg { color: var(--pe-txt); }
.ib-chg.zer { color: var(--text3); }

@media (max-width: 768px) {
  #info-box-oi, #info-box-chg { display: none !important; }
}

.sg {
  display: grid;
  grid-template-columns: 50px 1fr 72px 1fr 56px;
  grid-template-rows: 22px 22px;
  border-bottom: 1px solid var(--border);
  transition: background .08s;
}
.sg:hover { background: rgba(255,255,255,.018); }

/* ATM */
.sg.atm {
  background: var(--atm-bg) !important;
  border-top: 1px dashed var(--atm-line) !important;
  border-bottom: 1px dashed var(--atm-line) !important;
}

/* ── Strike cell: spans 2 rows ── */
.sc {
  grid-column: 3; grid-row: 1 / 3;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600;
  color: var(--strike);
  border-left: 1px solid var(--border2);
  border-right: 1px solid var(--border2);
  letter-spacing: -.3px;
  user-select: none;
  position: relative; z-index: 2;
}
.sg.atm .sc {
  color: var(--atm-txt);
  font-size: 12.5px;
}
.atm-star { font-size: 7px; vertical-align: super; margin-left: 1px; opacity: .8; }

/* ── OI Value (col 1) ── */
.v-oi {
  display: flex; align-items: center;
  justify-content: flex-end;
  padding: 0 6px 0 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 500;
  white-space: nowrap;
  position: relative; z-index: 2;
}
.v-ce { grid-column: 1; grid-row: 1; color: var(--ce-txt); }
.v-pe { grid-column: 1; grid-row: 2; color: var(--pe-txt); }

/* ── OI Bar (col 2): LEFT-anchored 2-part bar ── */
.b-oi {
  grid-column: 2;
  position: relative; overflow: hidden;
  margin-right: 6px;
}
.b-ce { grid-row: 1; }
.b-pe { grid-row: 2; }

/* Base bar = previous OI (light) */
.oi-base {
  position: absolute;
  left: 0; top: 3px; bottom: 3px;
  transition: width .4s ease;
  border-radius: 0 1px 1px 0;
}
.oi-base-ce { background: var(--ce-bar); }
.oi-base-pe { background: var(--pe-bar); }

/* Extension = addition (dark) or unwinding (hatched outline) */
.oi-ext {
  position: absolute;
  top: 3px; bottom: 3px;
  transition: width .4s ease, left .4s ease;
  border-radius: 0 1px 1px 0;
}
/* Addition: dark solid with bright edge */
.oi-add-ce {
  background: var(--ce-edge);
  opacity: .75;
}
.oi-add-pe {
  background: var(--pe-edge);
  opacity: .75;
}
/* Unwinding: outline only, transparent */
.oi-red-ce {
  background: transparent;
  border: 1.5px solid var(--ce-edge);
  border-radius: 0 2px 2px 0;
}
.oi-red-pe {
  background: transparent;
  border: 1.5px solid var(--pe-edge);
  border-radius: 0 2px 2px 0;
}

/* Max OI brightness boost */
.sg.mx-ce .b-ce .oi-bar { filter: brightness(1.25); }
.sg.mx-pe .b-pe .oi-bar { filter: brightness(1.25); }

/* ── CHG Bar (col 4): CENTER-anchored ── */
.b-chg {
  grid-column: 4;
  position: relative; overflow: hidden;
  margin-left: 6px;
}
.bc-ce { grid-row: 1; }
.bc-pe { grid-row: 2; }

/* center divider */
.b-chg::before {
  content: '';
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; background: var(--cline); z-index: 0;
}

.chg-bar {
  position: absolute;
  top: 3px; bottom: 3px;
  transition: width .45s cubic-bezier(.25,.46,.45,.94);
  z-index: 1;
  border-radius: 1px;
}
/* CE always green, PE always red — same color both directions */
/* Positive: right from center */
.chg-p-ce { left: 50%;  background: var(--ce-bar); border-right: 2px solid var(--ce-edge); }
.chg-p-pe { left: 50%;  background: var(--pe-bar); border-right: 2px solid var(--pe-edge); }
/* Negative: left from center (translateX trick) */
.chg-n-ce { left: 50%;  background: var(--ce-bar); border-left: 2px solid var(--ce-edge); transform: translateX(-100%); }
.chg-n-pe { left: 50%;  background: var(--pe-bar); border-left: 2px solid var(--pe-edge); transform: translateX(-100%); }

/* ── CHG Value (col 5) ── */
.v-chg {
  display: flex; align-items: center;
  justify-content: flex-start;
  padding: 0 4px 0 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  white-space: nowrap;
  position: relative; z-index: 2;
}
.vc-ce { grid-column: 5; grid-row: 1; }
.vc-pe { grid-column: 5; grid-row: 2; }
.cp { color: var(--ce-txt); }
.cn { color: var(--pe-txt); }
.cz { color: var(--text3); }

/* ═══════════════════════════════════════
   PCR VIEW
═══════════════════════════════════════ */
.pcr-sg {
  display: grid;
  grid-template-columns: 50px 1fr 72px 1fr 56px;
  grid-template-rows: 22px 22px;
  border-bottom: 1px solid var(--border);
  transition: background .08s;
}
.pcr-sg:hover { background: rgba(255,255,255,.018); }
.pcr-sg.atm { background: var(--atm-bg) !important; border-top: 1px dashed var(--atm-line) !important; border-bottom: 1px dashed var(--atm-line) !important; }
.pcr-track {
  position: relative; overflow: hidden;
}
.pcr-fill { position: absolute; top: 3px; bottom: 3px; border-radius: 1px; transition: width .4s; }

/* ═══════════════════════════════════════
   EMPTY / ERROR
═══════════════════════════════════════ */
.empty-msg {
  padding: 80px 20px; text-align: center;
  color: var(--text3); font-size: 12px; line-height: 2;
}
.err { color: var(--pe-txt) !important; }

/* ═══════════════════════════════════════
   TV MODAL
═══════════════════════════════════════ */
#tv-modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.75);
  align-items: center; justify-content: center;
}
#tv-modal.open { display: flex; }
#tv-inner {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
  width: 94vw; max-width: 1100px; height: 84vh;
  position: relative;
}
#tv-x {
  position: absolute; top: 8px; right: 10px; z-index: 10;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text2); cursor: pointer;
  width: 26px; height: 26px; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
#tv-frame { width: 100%; height: 100%; border: none; }

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media (max-width: 560px) {
  .sg, #chain-hdr, .pcr-sg {
    grid-template-columns: 36px 1fr 60px 1fr 44px;
  }
  .sc, .v-oi { font-size: 10px; }
  .v-chg { font-size: 9px; }
  }
</style>

<script>
'use strict';

const R2 = 'https://pub-0c01bff233cf4a249679f7d8fa4d6296.r2.dev/oi-scanner';
const TV_MAP = {
  NIFTY:       'NSE:NIFTY',
  BANKNIFTY:   'NSE:BANKNIFTY',
  FINNIFTY:    'NSE:CNXFINANCE',
  MIDCPNIFTY:  'NSE:MIDCPNIFTY',
  NIFTYNXT50:  'NSE:NIFTYNXT50',
  SENSEX:      'BSE:SENSEX',
};
const tvSym = s => TV_MAP[s] || `NSE:${s}`;

let indexData = null, scanCache = {}, symList = [], symIdx = 0, curKey = null;
let dispMode = localStorage.getItem('oi_disp') || 'recent';
let sideMode = 'both', viewMode = 'oi';
let theme = localStorage.getItem('oi_theme') || 'light';
const curSym = () => symList[symIdx] || null;

// ── FORMAT ──
function fmtOI(v) {
  v = Math.abs(+v) || 0;
  if (v >= 1e7) return (v/1e7).toFixed(2)+'Cr';
  if (v >= 1e5) return (v/1e5).toFixed(1)+'L';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(Math.round(v));
}
function fmtChg(v) {
  v = +v;
  if (!v) return {t:'—', c:'cz'};
  return {t:(v>0?'+':'-')+fmtOI(Math.abs(v)), c:v>0?'cp':'cn'};
}
function fmtStr(v) {
  v = +v;
  return v >= 1000 ? v.toLocaleString('en-IN') : String(v);
}
function barPct(v, mx) { return mx ? Math.min(100, Math.abs(+v) / mx * 100).toFixed(2) : 0; }

// ── FETCH ──
async function getJSON(u) {
  const r = await fetch(u + '?t=' + Date.now());
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function loadIndex() { indexData = await getJSON(`${R2}/index.json`); }
async function loadScan(d, h) {
  const k = `${d}|${h}`;
  if (!scanCache[k]) scanCache[k] = await getJSON(`${R2}/${d}/scan_${h}.json`);
  return scanCache[k];
}
async function scansInRange(fromDt) {
  if (!indexData) return [];
  const out = [];
  for (const date of [...indexData.dates].reverse())
    for (const h of (indexData.scans[date] || [])) {
      const dt = new Date(`${date}T${h.slice(0,2)}:${h.slice(2)}:00`);
      if (dt >= fromDt) { try { out.push(await loadScan(date, h)); } catch {} }
    }
  return out;
}

// ── SELECTORS ──
function buildScanSel() {
  const el = document.getElementById('scan-sel');
  el.innerHTML = '';
  if (!indexData) return;
  const all = [];
  for (const d of indexData.dates)
    for (const h of (indexData.scans[d] || [])) all.push({d,h});
  // Sort descending — latest date+hour sabse upar
  all.sort((a, b) => {
    const ta = a.d + a.h;
    const tb = b.d + b.h;
    return tb.localeCompare(ta);
  });
  all.forEach(({d,h}, i) => {
    const o = document.createElement('option');
    o.value = `${d}|${h}`;
    o.textContent = i === 0 ? `${d}  ${h.slice(0,2)}:${h.slice(2)}  (Latest)` : `${d}  ${h.slice(0,2)}:${h.slice(2)}`;
    if (i === 0) o.className = 'latest';  // latest option highlight
    el.appendChild(o);
  });
  if (all.length) { curKey = `${all[0].d}|${all[0].h}`; el.value = curKey; }
  // Color update on change
  function updateSelColor() {
    const isLatest = el.selectedIndex === 0;
    el.classList.toggle('is-latest', isLatest);
  }
  el.removeEventListener('change', el._colorHandler);
  el._colorHandler = updateSelColor;
  el.addEventListener('change', updateSelColor);
  updateSelColor();
  // Always show latest scan time in header
  updateLatestScanTime(all[0]);
}

function buildSymSel(scan) {
  const raw = scan ? Object.keys(scan.symbols || {}) : [];
  // Indices first (NIFTY, BANKNIFTY, SENSEX, FINNIFTY, MIDCPNIFTY), then stocks A-Z
  const INDICES = ['NIFTY','BANKNIFTY','SENSEX','FINNIFTY','MIDCPNIFTY','NIFTYNXT50'];
  const indices = raw.filter(s => INDICES.includes(s))
    .sort((a,b) => INDICES.indexOf(a) - INDICES.indexOf(b));
  const stocks  = raw.filter(s => !INDICES.includes(s)).sort();
  symList = [...indices, ...stocks];
  const el = document.getElementById('sym-select');
  el.innerHTML = '';
  symList.forEach((s,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = s; el.appendChild(o);
  });
  const saved = localStorage.getItem('oi_sym');
  const si = symList.indexOf(saved);
  symIdx = si >= 0 ? si : 0;
  el.value = symIdx;
}

// ── COMPUTE ──
async function computeDisplay(sym, base) {
  // LEFT column (OI) = hamesha base (selected scan) ka actual OI — koi change nahi
  // Recent mode: RIGHT column bhi same scan ka chg
  if (dispMode === 'recent') return base.map(s => ({...s}));

  // ── COMPARE mode: selected scan = BASE, latest scan = CURRENT ──
  if (dispMode === 'compare') {
    const sel = document.getElementById('scan-sel');
    const latestKey = sel.options[0]?.value;

    // Point-3: selected = latest hai to Recent jaisa dikhao — koi reaction nahi
    if (!latestKey || latestKey === curKey) return base.map(s => ({...s}));

    let latestScan = null;
    const [ld, lh] = latestKey.split('|');
    try { latestScan = await loadScan(ld, lh); } catch {}

    const latestChg = {};
    if (latestScan?.symbols?.[sym]) {
      latestScan.symbols[sym].strikes.forEach(s => {
        latestChg[s.strike] = { ce_chg: s.ce_chg||0, pe_chg: s.pe_chg||0 };
      });
    }
    return base.map(s => {
      const lc = latestChg[s.strike];
      return {
        ...s,
        // LEFT: selected scan ka OI unchanged
        ce_chg: lc ? Math.round((lc.ce_chg||0) - (s.ce_chg||0)) : 0,
        pe_chg: lc ? Math.round((lc.pe_chg||0) - (s.pe_chg||0)) : 0,
        // raw = original day chg (left tooltip ke liye)
        ce_raw_chg: s.ce_chg||0,
        pe_raw_chg: s.pe_chg||0,
      };
    });
  }

  // ── AVG RANGE mode ──
  const fromEl  = document.getElementById('from-time');
  const fromVal = fromEl ? fromEl.value : '';
  if (!fromVal) return base.map(s => ({...s}));
  const fromDt = new Date(fromVal);

  let scans;
  try { scans = await scansInRange(fromDt); } catch { scans = []; }
  if (!scans.length) return base.map(s => ({...s}));

  // Avg Range: saare scans ka average chg
  const hist = {};
  scans.forEach(scan => {
    const sd = scan.symbols?.[sym]; if (!sd) return;
    sd.strikes.forEach(s => {
      if (!hist[s.strike]) hist[s.strike] = { ce_chg:[], pe_chg:[] };
      hist[s.strike].ce_chg.push(s.ce_chg||0);
      hist[s.strike].pe_chg.push(s.pe_chg||0);
    });
  });
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;

  return base.map(s => {
    const h = hist[s.strike];
    return {
      ...s,
      // LEFT unchanged — OI same
      ce_chg: h ? Math.round(avg(h.ce_chg)) : 0,
      pe_chg: h ? Math.round(avg(h.pe_chg)) : 0,
      // raw = original day chg (left tooltip ke liye)
      ce_raw_chg: s.ce_chg||0,
      pe_raw_chg: s.pe_chg||0,
    };
  });
}

// ── RENDER ──
async function render() {
  if (!curKey || !symList.length) return;
  // Symbol/scan change pe lock reset karo
  if (typeof ttLocked !== 'undefined') {
    // global reset — setupTooltip ke bahar se access ke liye
  }
  window._resetTTLock && window._resetTTLock();
  const [date, hhmm] = curKey.split('|');
  let scan;
  try { scan = await loadScan(date, hhmm); }
  catch(e) { showErr('Failed to load: ' + e.message); return; }

  const sym = curSym();
  const sd = scan?.symbols?.[sym];
  const body = document.getElementById('chain-body');

  if (!sd) {
    body.innerHTML = `<div class="empty-msg">No data for ${sym}</div>`;
    return;
  }

  document.getElementById('exp-tag').textContent = sd.expiry || '—';
  document.getElementById('iv-spot').textContent = sd.spot ? sd.spot.toFixed(2) : '—';
  updateScanTime(scan);

  const disp = await computeDisplay(sym, sd.strikes);

  const totCE = disp.reduce((a,r) => a+(r.ce_oi||0), 0);
  const totPE = disp.reduce((a,r) => a+(r.pe_oi||0), 0);
  const pcr   = totCE > 0 ? totPE/totCE : 0;

  document.getElementById('iv-ce').textContent = fmtOI(totCE);
  document.getElementById('iv-pe').textContent = fmtOI(totPE);
  document.getElementById('iv-pcr').textContent = totCE > 0 ? pcr.toFixed(2) : '—';
  document.getElementById('iv-pcr').className = 'iv ' + (totCE > 0 ? (pcr >= 1 ? 'bull' : 'bear') : '');

  let maxCE = 0, maxPE = 0, maxCES = '—', maxPES = '—';
  disp.forEach(r => {
    if ((r.ce_oi||0) > maxCE) { maxCE = r.ce_oi; maxCES = fmtStr(r.strike); }
    if ((r.pe_oi||0) > maxPE) { maxPE = r.pe_oi; maxPES = fmtStr(r.strike); }
  });
  document.getElementById('iv-mce').textContent = `${maxCES} (${fmtOI(maxCE)})`;
  document.getElementById('iv-mpe').textContent = `${maxPES} (${fmtOI(maxPE)})`;

  // maxOI hamesha original base data (sd.strikes) se — mode se scale kabhi nahi badlega
  const maxOI = Math.max(...sd.strikes.map(r => Math.max(
    (r.ce_oi||0) + Math.abs(r.ce_chg||0),
    (r.pe_oi||0) + Math.abs(r.pe_chg||0)
  )), 1);
  const maxChg = Math.max(...disp.map(r => Math.max(Math.abs(r.ce_chg||0), Math.abs(r.pe_chg||0))), 1);

  const showCE = sideMode !== 'put';
  const showPE = sideMode !== 'call';

  // ── PCR VIEW ──
  if (viewMode === 'pcr') {
    body.innerHTML = disp.slice().reverse().map(row => {
      const ce = row.ce_oi||0, pe = row.pe_oi||0, tot = ce+pe||1;
      const cePct = (ce/tot*100).toFixed(1), pePct = (pe/tot*100).toFixed(1);
      const pcr   = ce > 0 ? pe/ce : Infinity;
      const atm   = row.is_atm ? ' atm' : '';
      return `<div class="pcr-sg${atm}">
        <div class="v-oi v-ce">${showCE ? cePct+'%' : ''}</div>
        <div class="b-oi b-ce pcr-track">
          ${showCE ? `<div class="pcr-fill oi-add-ce" style="left:0;width:${cePct}%"></div>` : ''}
        </div>
        <div class="sc">${fmtStr(row.strike)}${row.is_atm?'<span class="atm-star">★</span>':''}</div>
        <div class="b-oi b-pe pcr-track">
          ${showPE ? `<div class="pcr-fill oi-add-pe" style="left:0;width:${pePct}%"></div>` : ''}
        </div>
        <div class="v-chg vc-pe ${(pcr<1?'cp':'cn')}">${showPE ? (isFinite(pcr)?pcr.toFixed(2):'∞') : ''}</div>
        <div class="b-chg bc-ce"></div><div class="v-chg vc-ce"></div>
        <div class="b-chg bc-pe"></div>
      </div>`;
    }).join('');
    scrollATM(); return;
  }

  // ── OI VIEW ──
  body.innerHTML = disp.slice().reverse().map(row => {
    const ceChgPct = barPct(row.ce_chg, maxChg);
    const peChgPct = barPct(row.pe_chg, maxChg);
    const ceChgCls = (row.ce_chg||0) >= 0 ? 'chg-p-ce' : 'chg-n-ce';
    const peChgCls = (row.pe_chg||0) >= 0 ? 'chg-p-pe' : 'chg-n-pe';

    const cef = fmtChg(row.ce_chg);
    const pef = fmtChg(row.pe_chg);

    const mce = (row.ce_oi||0) === maxCE ? ' mx-ce' : '';
    const mpe = (row.pe_oi||0) === maxPE ? ' mx-pe' : '';
    const atm = row.is_atm ? ' atm' : '';

    // OI bars: base = total OI, ext = |change| always from base end
    const ceBasePct = barPct(row.ce_oi, maxOI);
    const peBasePct = barPct(row.pe_oi, maxOI);
    const ceExtPct  = dispMode === 'recent' ? barPct(Math.abs(row.ce_chg||0), maxOI) : 0;
    const peExtPct  = dispMode === 'recent' ? barPct(Math.abs(row.pe_chg||0), maxOI) : 0;

    const ceExtCls = (row.ce_chg||0) >= 0 ? 'oi-add-ce' : 'oi-red-ce';
    const peExtCls = (row.pe_chg||0) >= 0 ? 'oi-add-pe' : 'oi-red-pe';

    // Label: currentOI (change)
    const ceLbl = showCE ? `${fmtOI(row.ce_oi)}${row.ce_chg ? '('+fmtChg(row.ce_chg).t+')' : ''}` : '';

function fmtNum(v) {

function setupTooltip() {
  const tip     = document.getElementById('oi-tooltip');
  const oiSec   = document.getElementById('tt-oi-section');
  const chgSec  = document.getElementById('tt-chg-section');
  const body    = document.getElementById('chain-body');
  const boxOI   = document.getElementById('info-box-oi');
  const boxChg  = document.getElementById('info-box-chg');
  const isMobile = () => window.innerWidth <= 768;

  function chgHtml(v, el) {
    const n = +v;
    el.textContent = (n>=0?'+':'') + n.toLocaleString('en-IN') + (n<0?' ▼':n>0?' ▲':'');
    el.className   = 'tt-chg ' + (n>0?'pos':n<0?'neg':'zer');
  }
  function ibChg(v, el) {
    const n = +v;
    el.textContent = (n>=0?'+':'') + n.toLocaleString('en-IN') + (n<0?' ▼':n>0?' ▲':'');
    el.className   = 'ib-chg ' + (n>0?'pos':n<0?'neg':'zer');
  }

  // ── LOCK STATE ──
  let ttLocked = false;
  window._resetTTLock = function() {
    ttLocked = false;
    boxOI.style.outline  = 'none';
    boxChg.style.outline = 'none';
    boxOI.style.opacity  = '1';
    boxChg.style.opacity = '1';
  };

  // localStorage se last saved data restore karo
  function restoreTooltip() {
    try {
      const saved = localStorage.getItem('oi_tt_last');
      if (!saved) return;
      const d = JSON.parse(saved);
      applyTooltipData(d);
      boxOI.style.visibility = 'visible';
      boxChg.style.visibility = 'visible';
    } catch(e) {}
  }

  function saveTooltip(d) {
    try { localStorage.setItem('oi_tt_last', JSON.stringify(d)); } catch(e) {}
  }

  function applyTooltipData(d) {
    // LEFT box
    document.getElementById('ib-oi-strike').textContent = d.label;
    document.getElementById('ib-ce-oi').textContent = d.ceOi;
    document.getElementById('ib-pe-oi').textContent = d.peOi;
    ibChg(d.ceRawChg, document.getElementById('ib-ce-chg'));
    ibChg(d.peRawChg, document.getElementById('ib-pe-chg'));
    // RIGHT box
    document.getElementById('ib-chg-strike').textContent = d.label;
    ibChg(d.ceChg, document.getElementById('ib-ce-chg2'));
    ibChg(d.peChg, document.getElementById('ib-pe-chg2'));
  }

  function updateBoxes(sg) {
    const strike = sg.dataset.strike;
    if (!strike) return;
    const label = 'Strike : ' + fmtStr(strike);
    const d = {
      label,
      ceOi:     (+sg.dataset.ceOi||0).toLocaleString('en-IN'),
      peOi:     (+sg.dataset.peOi||0).toLocaleString('en-IN'),
      ceRawChg: sg.dataset.ceRawChg,
      peRawChg: sg.dataset.peRawChg,
      ceChg:    sg.dataset.ceChg,
      peChg:    sg.dataset.peChg,
    };
    applyTooltipData(d);
    saveTooltip(d);
    boxOI.style.visibility = 'visible';
    boxChg.style.visibility = 'visible';
  }

  // ── HOVER: update tooltip (sirf unlock state mein) ──
  body.addEventListener('mouseover', e => {
    if (isMobile()) {
      const sg = e.target.closest('.sg');
      if (!sg) return;
      const strike = sg.dataset.strike;
      if (!strike) return;
      const label = 'Strike : ' + fmtStr(strike);
      boxOI.style.display='none'; boxChg.style.display='none';
      document.getElementById('tt-strike').textContent = label;
      const rect   = sg.getBoundingClientRect();
      const inLeft = e.clientX < rect.left + rect.width / 2;
      if (inLeft) {
        oiSec.style.display = 'block'; chgSec.style.display = 'none';
        document.getElementById('tt-ce-oi').textContent = (+sg.dataset.ceOi||0).toLocaleString('en-IN');
        document.getElementById('tt-pe-oi').textContent = (+sg.dataset.peOi||0).toLocaleString('en-IN');
        chgHtml(sg.dataset.ceRawChg, document.getElementById('tt-ce-chg'));
        chgHtml(sg.dataset.peRawChg, document.getElementById('tt-pe-chg'));
      } else {
        oiSec.style.display = 'none'; chgSec.style.display = 'block';
        chgHtml(sg.dataset.ceChg, document.getElementById('tt-ce-chg2'));
        chgHtml(sg.dataset.peChg, document.getElementById('tt-pe-chg2'));
      }
      tip.style.display = 'block';
      return;
    }
    // Desktop: sirf unlock state mein update
    if (!ttLocked) {
      const sg = e.target.closest('.sg');
      if (sg) { tip.style.display = 'none'; updateBoxes(sg); }
    }
  });

  // ── CLICK on .sc = TOGGLE LOCK ──
  body.addEventListener('click', e => {
    if (isMobile()) return;
    if (!e.target.closest('.sc')) return;
    ttLocked = !ttLocked;
    if (ttLocked) {
      boxOI.style.outline  = '2px solid var(--acc)';
      boxChg.style.outline = '2px solid var(--acc)';
      boxOI.style.opacity  = '0.75';
      boxChg.style.opacity = '0.75';
    } else {
      boxOI.style.outline  = 'none';
      boxChg.style.outline = 'none';
      boxOI.style.opacity  = '1';
      boxChg.style.opacity = '1';
    }
  });

  body.addEventListener('mousemove', e => {
    if (!isMobile()) return;
    const sg = e.target.closest('.sg');
    if (!sg) { tip.style.display='none'; return; }
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = e.clientX + 16, y = e.clientY - th/2;
    if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 16;
    if (y < 10) y = 10;
    if (y + th > window.innerHeight - 10) y = window.innerHeight - th - 10;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });

  body.addEventListener('mouseleave', () => {
    tip.style.display = 'none';
    // ttLocked reset nahi karenge — sirf click se toggle hoga
  });

  // Page load pe restore karo
  setTimeout(restoreTooltip, 200);
}

function wire() {
  const $ = id => document.getElementById(id);

  $('prev-sym').onclick = () => {
    if (!symList.length) return;
    symIdx = (symIdx - 1 + symList.length) % symList.length;
    $('sym-select').value = symIdx;
    localStorage.setItem('oi_sym', curSym()); render();
  };
  $('next-sym').onclick = () => {
    if (!symList.length) return;
    symIdx = (symIdx + 1) % symList.length;
    $('sym-select').value = symIdx;
    localStorage.setItem('oi_sym', curSym()); render();
  };
  $('sym-select').onchange = e => {
    symIdx = +e.target.value;
    localStorage.setItem('oi_sym', curSym()); render();
  };
  $('scan-sel').onchange = e => {
    curKey = e.target.value;
    // Point-5: time change pe Recent mode force karo
    if (dispMode !== 'recent') {
      dispMode = 'recent';
      localStorage.setItem('oi_disp', dispMode);
      document.querySelectorAll('#disp-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === dispMode));
      
    }
    render();
    updateTicker();
  };

  $('side-grp').onclick = e => {
    if (!e.target.dataset.v) return;
    sideMode = e.target.dataset.v;
    document.querySelectorAll('#side-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === sideMode));
    render();
  };
  $('view-grp').onclick = e => {
    if (!e.target.dataset.v) return;
    viewMode = e.target.dataset.v;
    document.querySelectorAll('#view-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === viewMode));
    render();
  };
  $('disp-grp').onclick = e => {
    if (!e.target.dataset.v) return;
    dispMode = e.target.dataset.v;
    localStorage.setItem('oi_disp', dispMode);
    document.querySelectorAll('#disp-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === dispMode));
    
    // Point-1: Recent click pe latest scan pe reset
    if (dispMode === 'recent') {
      const sel = document.getElementById('scan-sel');
      if (sel.options.length) { curKey = sel.options[0].value; sel.value = curKey; }
    }
    render();
  };
  
  $('theme-grp').onclick = e => { if (e.target.dataset.v) applyTheme(e.target.dataset.v); };

  // ── SYMBOL SEARCH ──
  const searchInput = $('sym-search');
  const searchDrop  = $('sym-dropdown');
  let activeIdx = -1;

  function highlightMatch(sym, q) {
    const i = sym.indexOf(q);
    if (i < 0 || !q) return sym;
    return sym.slice(0,i) + '<span class="sd-match">' + sym.slice(i, i+q.length) + '</span>' + sym.slice(i+q.length);
  }

  function showDrop(q) {
    const query = q.toUpperCase().trim();
    if (!query) { searchDrop.style.display = 'none'; return; }
    const filtered = symList.filter(s => s.includes(query));
    if (!filtered.length) { searchDrop.style.display = 'none'; return; }
    activeIdx = -1;
    searchDrop.innerHTML =
      '<div class="sd-header">' + filtered.length + ' result' + (filtered.length>1?'s':'') + '</div>' +
      filtered.map((s,i) =>
        '<div class="sd-item" data-sym="' + s + '">' + highlightMatch(s, query) + '</div>'
      ).join('');
    searchDrop.style.display = 'block';
    searchDrop.querySelectorAll('.sd-item').forEach(item => {
      item.onclick = () => jumpToSym(item.dataset.sym);
    });
  }

  function jumpToSym(sym) {
    const idx = symList.indexOf(sym);
    if (idx < 0) return;
    symIdx = idx;
    $('sym-select').value = symIdx;
    localStorage.setItem('oi_sym', sym);
    searchInput.value = '';
    searchDrop.style.display = 'none';
    render();
  }

  searchInput.addEventListener('input', e => showDrop(e.target.value));

  searchInput.addEventListener('keydown', e => {
    const items = searchDrop.querySelectorAll('.sd-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const target = activeIdx >= 0 ? items[activeIdx] : items[0];
      if (target) jumpToSym(target.dataset.sym);
      return;
    } else if (e.key === 'Escape') {
      searchInput.value = ''; searchDrop.style.display = 'none'; return;
    }
    items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
    if (items[activeIdx]) items[activeIdx].scrollIntoView({block:'nearest'});
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#sym-search-wrap')) searchDrop.style.display = 'none';
  });

  $('tv-btn').onclick = () => {
    const s = curSym(); if (!s) return;
    const url = `https://www.tradingview.com/chart/?symbol=${tvSym(s)}&interval=5`;
    window.open(url, '_blank');
  };

  document.addEventListener('keydown', e => {
    const t = e.target.tagName;
    if (t === 'INPUT' || t === 'SELECT') return;
    if (e.key === 'ArrowLeft'  || e.key === 'a') $('prev-sym').click();
    if (e.key === 'ArrowRight' || e.key === 'd') $('next-sym').click();
    if (e.key === 'Escape') $('tv-modal').classList.remove('open');
  });
}

// ── SIGNAL DETECTION ──────────────────────────────────────────
// ATM±3 strikes ka CE vs PE chg compare karo
// CE buildup > PE buildup → Bearish | PE buildup > CE buildup → Bullish
// Previous scan se compare karke spike detect karo

const SIG_WINDOW   = 3;    // ATM ke upar neeche kitne strikes
const SIG_MIN_CHG  = 50000; // minimum absolute change (50K) to count as signal

async function computeSignals() {
  if (!indexData) return [];

  const sel      = document.getElementById('scan-sel');
  const allOpts  = Array.from(sel.options);
  if (allOpts.length < 2) return [];

  // Latest scan aur usse pehle wala
  const [curD, curH]   = allOpts[0].value.split('|');
  const [prevD, prevH] = allOpts[1].value.split('|');

  let curScan, prevScan;
  try {
    curScan  = await loadScan(curD,  curH);
    prevScan = await loadScan(prevD, prevH);
  } catch { return []; }

  const signals = [];

  for (const sym of Object.keys(curScan.symbols || {})) {
    const curSd  = curScan.symbols[sym];
    const prevSd = prevScan?.symbols?.[sym];
    if (!curSd) continue;

    // ATM index dhundo
    const strikes = curSd.strikes;
    const atmIdx  = strikes.findIndex(s => s.is_atm);
    if (atmIdx < 0) continue;

    const from = Math.max(0, atmIdx - SIG_WINDOW);
    const to   = Math.min(strikes.length - 1, atmIdx + SIG_WINDOW);
    const win  = strikes.slice(from, to + 1);

    // Current scan ka CE/PE total chg in window
    const curCE  = win.reduce((a, s) => a + (s.ce_chg || 0), 0);
    const curPE  = win.reduce((a, s) => a + (s.pe_chg || 0), 0);

    // Previous scan ka CE/PE total chg in window
    let prevCE = 0, prevPE = 0;
    if (prevSd) {
      const prevStrikes = prevSd.strikes;
      const prevAtm     = prevStrikes.findIndex(s => s.is_atm);
      if (prevAtm >= 0) {
        const pFrom = Math.max(0, prevAtm - SIG_WINDOW);
        const pTo   = Math.min(prevStrikes.length - 1, prevAtm + SIG_WINDOW);
        const pWin  = prevStrikes.slice(pFrom, pTo + 1);
        prevCE = pWin.reduce((a, s) => a + (s.ce_chg || 0), 0);
        prevPE = pWin.reduce((a, s) => a + (s.pe_chg || 0), 0);
      }
    }

    // Spike = current - previous
    const spikeCE = curCE - prevCE;
    const spikePE = curPE - prevPE;

    const absCE = Math.abs(spikeCE);
    const absPE = Math.abs(spikePE);

    // Signal condition: ek side mein significant spike aaya
    if (absCE < SIG_MIN_CHG && absPE < SIG_MIN_CHG) continue;

    let type, val;
    if (absCE > absPE) {
      // CE side dominant
      type = spikeCE > 0 ? 'bear' : 'bull';  // CE buildup = bear, CE unwinding = bull
      val  = spikeCE;
    } else {
      // PE side dominant
      type = spikePE > 0 ? 'bull' : 'bear';  // PE buildup = bull, PE unwinding = bear
      val  = spikePE;
    }

    signals.push({ sym, type, val, strength: Math.max(absCE, absPE) });
  }

  // Strength ke hisaab se sort karo
  signals.sort((a, b) => b.strength - a.strength);
  return signals;
}

function fmtSigVal(v) {
  const a = Math.abs(v);
  if (a >= 10000000) return (v/10000000).toFixed(1) + 'Cr';
  if (a >= 100000)   return (v/100000).toFixed(1) + 'L';
  if (a >= 1000)     return (v/1000).toFixed(1) + 'K';
  return String(v);
}

let tickerInterval = null;

async function updateTicker() {
  const track = document.getElementById('sig-track');
  if (!track) return;

  const signals = await computeSignals();

  if (!signals.length) {
    track.innerHTML = '';
    track.className = 'static';
    return;
  }

  // Chips banao
  const makeChips = () => signals.map(s => {
    const arrow = s.type === 'bull' ? '▲' : '▼';
    const label = s.type === 'bull' ? 'Bullish' : 'Bearish';
    return `<span class="sig-chip ${s.type}" data-sym="${s.sym}" title="${s.sym} ${label}">
      ${arrow} ${s.sym} <span class="sig-val">${fmtSigVal(s.val)}</span>
    </span>`;
  }).join('');

  if (signals.length <= 2) {
    // Static — scroll nahi
    track.innerHTML = makeChips();
    track.className = 'static';
  } else {
    // Scroll — duplicate chips for seamless loop
    track.innerHTML = makeChips() + makeChips();
    track.className = 'scrolling';
    // Speed: chips ki count pe depend karo
    const duration = Math.max(8, signals.length * 4);
    track.style.animationDuration = duration + 's';
  }

  // Click handler — us symbol pe jump karo
  track.querySelectorAll('.sig-chip').forEach(chip => {
    chip.onclick = () => {
      const sym  = chip.dataset.sym;
      const idx  = symList.indexOf(sym);
      if (idx < 0) return;
      symIdx = idx;
      const el = document.getElementById('sym-select');
      el.value = symIdx;
      render();
    };
  });
}

function autoRefresh() {
  // buildScanSel jaisa hi sort — latest key correctly nikalo
  function getLatestKey(data) {
    if (!data) return '';
    const all = [];
    for (const d of (data.dates || []))
      for (const h of (data.scans[d] || [])) all.push({d, h});
    all.sort((a, b) => (b.d + b.h).localeCompare(a.d + a.h));
    return all.length ? `${all[0].d}|${all[0].h}` : '';
  }

  setInterval(async () => {
    const n = new Date(), h = n.getHours(), m = n.getMinutes();
    if (!((h > 9 || (h === 9 && m >= 15)) && (h < 15 || (h === 15 && m <= 30)))) return;
    try {
      const prevKey = getLatestKey(indexData);
      await loadIndex();
      const newKey = getLatestKey(indexData);
      if (newKey && newKey !== prevKey) {
        buildScanSel();
        const sel = document.getElementById('scan-sel');
        if (!sel.options.length) return;
        const topKey = sel.options[0].value;
        const [nd, nh] = topKey.split('|');
        await loadScan(nd, nh);
        curKey = topKey;
        sel.value = curKey;
        await render();
        await updateTicker();
      }
    } catch(e) { console.warn('autoRefresh error:', e); }
  }, 10 * 1000);
}

    if (!curKey) { showErr('No scan data yet. Run OI_SCANNER.py first.'); return; }
    setMsg('Loading scan…');
    const [d, h] = curKey.split('|');
    const scan = await loadScan(d, h);
    buildSymSel(scan);
    hideLoad();
    render();
    updateTicker();
    fetchVIX();
    autoRefresh();
  } catch(e) {
    showErr('Error: ' + e.message);
    console.error(e);
  }
})();
</script>
</body>
</html>
