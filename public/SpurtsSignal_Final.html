<!DOCTYPE html>
<html lang="en" data-theme="blue">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpikeScanner · NSE F&O</title>
<style>

/* ══════════════════════════════════
   DARK TEAL THEME (1st dark)
══════════════════════════════════ */
[data-theme="blue"] {
  --bg:       #012B2B;
  --bg1:      #011e1e;
  --bg2:      #022424;
  --card:     #011818;
  --border:   #024040;
  --ink:      #e8f8f8;
  --ink2:     #a0d4d6;
  --ink3:     #5aacaf;
  --shadow:   rgba(0,0,0,.5);
  --bull:     #2edc8a;
  --bull-bg:  rgba(46,220,138,.12);
  --bull-bd:  rgba(46,220,138,.35);
  --bear:     #ff4d6a;
  --bear-bg:  rgba(255,77,106,.12);
  --bear-bd:  rgba(255,77,106,.35);
  --accent:   #00d0d8;
  --acc-bg:   rgba(0,208,216,.12);
  --acc-bd:   rgba(0,208,216,.35);
  --gold:     #ffc233;
}

/* ══════════════════════════════════
   DARK GREY THEME (2nd dark)
══════════════════════════════════ */
[data-theme="purple"] {
  --bg:       #3a3a3c;
  --bg1:      #2c2c2e;
  --bg2:      #3a3a3c;
  --card:     #1c1c1e;
  --border:   #545458;
  --ink:      #f5f5f7;
  --ink2:     #aeaeb2;
  --ink3:     #8e8e93;
  --shadow:   rgba(0,0,0,.5);
  --bull:     #2edc8a;
  --bull-bg:  rgba(46,220,138,.12);
  --bull-bd:  rgba(46,220,138,.35);
  --bear:     #ff4d6a;
  --bear-bg:  rgba(255,77,106,.12);
  --bear-bd:  rgba(255,77,106,.35);
  --accent:   #0a84ff;
  --acc-bg:   rgba(10,132,255,.12);
  --acc-bd:   rgba(10,132,255,.35);
  --gold:     #ffd60a;
}

/* ══════════════════════════════════
   WHITE THEME (clean light)
══════════════════════════════════ */
[data-theme="white"] {
  --bg:       #f0f4f8;
  --bg1:      #ffffff;
  --bg2:      #e8eef5;
  --card:     #ffffff;
  --border:   #d0daea;
  --ink:      #1a2540;
  --ink2:     #4a6080;
  --ink3:     #8a9ab0;
  --shadow:   rgba(0,0,0,.08);
  --bull:     #0a9a5a;
  --bull-bg:  rgba(10,154,90,.08);
  --bull-bd:  rgba(10,154,90,.25);
  --bear:     #d42a48;
  --bear-bg:  rgba(212,42,72,.08);
  --bear-bd:  rgba(212,42,72,.25);
  --accent:   #2563eb;
  --acc-bg:   rgba(37,99,235,.08);
  --acc-bd:   rgba(37,99,235,.3);
  --gold:     #d97706;
}

/* ══════════════════════════════════
   BASE
══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  transition: background .25s, color .25s;
}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
header {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; color: #fff;
}
.brand-title { font-weight: 700; font-size: 15px; color: var(--ink); }
.brand-title span { color: var(--accent); }

.hdr-right { display: flex; align-items: center; gap: 8px; }
.badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px;
  background: var(--bg2); color: var(--ink3);
  border: 1px solid var(--border);
}
.badge.live  { background: var(--bull-bg); color: var(--bull); border-color: var(--bull-bd); }
.badge.err   { background: var(--bear-bg); color: var(--bear); border-color: var(--bear-bd); }
.badge.file  { background: var(--acc-bg);  color: var(--accent); border-color: var(--acc-bd); }
.scan-time { font-size: 11px; color: var(--ink3); }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  height: 34px; padding: 0 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--bg2); color: var(--ink2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn:hover { background: var(--bg); color: var(--ink); }
.btn.primary { background: var(--acc-bg); color: var(--accent); border-color: var(--acc-bd); }
.btn.primary:hover { background: var(--acc-bd); }
.btn.loading { opacity: .5; pointer-events: none; }
.btn.sq { width: 34px; padding: 0; justify-content: center; }
#file-input { display: none; }
.spin {
  width: 12px; height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════
   MAIN
══════════════════════════════════ */
main { padding: 16px 20px 60px; max-width: 1400px; margin: 0 auto; }

/* ══════════════════════════════════
   EMPTY STATE
══════════════════════════════════ */
#empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 65vh; gap: 16px; text-align: center;
  padding: 20px;
}
.es-icon { font-size: 48px; }
.es-title { font-size: 18px; font-weight: 700; color: var(--ink); }
.es-sub { font-size: 13px; color: var(--ink2); max-width: 280px; line-height: 1.7; }
.es-cards {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  margin-top: 8px;
}
.es-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: left; min-width: 140px;
}
.es-card-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--acc-bg); color: var(--accent);
  font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 6px;
}
.es-card-title { font-size: 13px; font-weight: 600; }
.es-card-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
#dashboard { display: none; }

/* ── Bias Bar ── */
.bias-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.bias-label { font-size: 11px; color: var(--ink3); font-weight: 600; text-transform: uppercase; flex-shrink: 0; }
.bias-track {
  flex: 1; min-width: 100px;
  height: 8px; border-radius: 4px;
  background: var(--border);
  overflow: hidden; position: relative;
}
.bias-bull { height: 100%; background: var(--bull); border-radius: 4px 0 0 4px; transition: width .4s; }
.bias-nums { display: flex; gap: 6px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.bias-verdict {
  font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}
.bias-verdict.bull { background: var(--bull-bg); color: var(--bull); }
.bias-verdict.bear { background: var(--bear-bg); color: var(--bear); }
.bias-verdict.mix  { background: var(--bg2); color: var(--ink3); }



/* ══════════════════════════════════
   SECTION LABEL
══════════════════════════════════ */
.section-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; color: var(--ink3);
  margin: 18px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.section-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

/* ══════════════════════════════════
   SIGNAL CARDS
══════════════════════════════════ */
.cards-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}

.sig-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px 10px;
  cursor: pointer;
  transition: box-shadow .15s, border-color .15s, transform .1s;
  position: relative;
  overflow: hidden;
}
.sig-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 12px 12px 0 0;
}
.sig-card.bull::before { background: var(--bull); }
.sig-card.bear::before { background: var(--bear); }
.sig-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
.sig-card.active.bull { border-color: var(--bull); box-shadow: 0 0 0 2px var(--bull-bd); }
.sig-card.active.bear { border-color: var(--bear); box-shadow: 0 0 0 2px var(--bear-bd); }

.sc-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.sc-tag {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase;
}
.sc-tag.bull { background: var(--bull-bg); color: var(--bull); }
.sc-tag.bear { background: var(--bear-bg); color: var(--bear); }

.sc-count { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
.sc-count.bull { color: var(--bull); }
.sc-count.bear { color: var(--bear); }

.sc-desc {
  font-size: 10px; color: var(--ink3); margin-bottom: 3px; line-height: 1.4;
}
.sc-signals { font-size: 11px; color: var(--ink2); }

/* ══════════════════════════════════
   INDEX CARD (single, full width)
══════════════════════════════════ */
.index-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 4px;
}
.index-card-hdr {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.index-card-title { font-size: 13px; font-weight: 700; }
.index-card-sub { font-size: 11px; color: var(--ink3); margin-top: 1px; }

.idx-row {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.idx-row:last-child { border-bottom: none; }
.idx-row:hover { background: var(--bg2); }

.idx-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 7px;
}
.idx-sym { font-size: 14px; font-weight: 700; }
.idx-verdict {
  font-size: 11px; font-weight: 700;
  padding: 2px 10px; border-radius: 20px;
}
.idx-verdict.bull { background: var(--bull-bg); color: var(--bull); }
.idx-verdict.bear { background: var(--bear-bg); color: var(--bear); }
.idx-verdict.mix  { background: var(--bg2); color: var(--ink3); }

.idx-track-wrap {
  display: flex; align-items: center; gap: 8px;
}
.idx-track {
  flex: 1; height: 6px; border-radius: 3px;
  background: var(--border); overflow: hidden; position: relative;
}
.idx-fill-bull {
  height: 100%; border-radius: 3px 0 0 3px;
  background: var(--bull); position: absolute; left: 0;
  transition: width .4s;
}
.idx-fill-bear {
  height: 100%; border-radius: 0 3px 3px 0;
  background: var(--bear); position: absolute; right: 0;
  transition: width .4s;
}
.idx-nums { font-size: 11px; font-weight: 600; display: flex; gap: 6px; flex-shrink: 0; }

/* ── Index detail expand ── */
.idx-detail { display: none; border-top: 1px solid var(--border); background: var(--bg); }
.idx-detail.open { display: block; }
.idx-detail-hdr {
  padding: 8px 14px;
  font-size: 11px; font-weight: 600; color: var(--ink3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

/* ══════════════════════════════════
   SIGNAL TABLE
══════════════════════════════════ */
.table-wrap {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  animation: fadeIn .2s ease;
}
.table-wrap.open { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

.table-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.table-hdr.bull { background: var(--bull-bg); border-left: 3px solid var(--bull); }
.table-hdr.bear { background: var(--bear-bg); border-left: 3px solid var(--bear); }
.th-title { font-size: 12px; font-weight: 700; }
.th-title.bull { color: var(--bull); }
.th-title.bear { color: var(--bear); }
.th-sub { font-size: 11px; color: var(--ink2); margin-top: 1px; }
.th-cnt {
  font-size: 12px; font-weight: 700;
  padding: 2px 10px; border-radius: 20px;
}
.th-cnt.bull { background: var(--bull-bg); color: var(--bull); border: 1px solid var(--bull-bd); }
.th-cnt.bear { background: var(--bear-bg); color: var(--bear); border: 1px solid var(--bear-bd); }

.tscroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--bg);
  color: var(--ink3);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  padding: 7px 12px; text-align: left; white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
thead th.r { text-align: right; }
thead th.c { text-align: center; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg2); }
td { padding: 8px 12px; font-size: 12px; white-space: nowrap; color: var(--ink); }
td.sym { font-weight: 700; font-size: 13px; }
td.r { text-align: right; }
td.c { text-align: center; }
td.dim { color: var(--ink2); }
td.bull-c { color: var(--bull); font-weight: 700; }
td.bear-c { color: var(--bear); font-weight: 700; }
td.gold-c { color: var(--gold); }
.no-data td {
  text-align: center; padding: 20px;
  color: var(--ink3); font-size: 12px; font-style: italic;
}

/* Signal pill */
.pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  white-space: nowrap;
}
.pill.bull { background: var(--bull-bg); color: var(--bull); border: 1px solid var(--bull-bd); }
.pill.bear { background: var(--bear-bg); color: var(--bear); border: 1px solid var(--bear-bd); }

/* Type badge */
.tbadge {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.tbadge.ce  { background: rgba(59,130,246,.12); color: #3b82f6; }
.tbadge.pe  { background: rgba(245,166,35,.12); color: var(--gold); }
.tbadge.fut { background: rgba(168,85,247,.12); color: #a855f7; }

/* Strength dots */
.str-dots { display: inline-flex; gap: 3px; align-items: center; }
.str-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border);
}
.str-dot.on-hi  { background: var(--gold); }
.str-dot.on-mid { background: var(--accent); }
.str-dot.on-lo  { background: var(--bull); }



/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media (max-width: 600px) {
  .header-inner { padding: 0 12px; }
  .brand-title { font-size: 14px; }
  .btn-lbl { display: none; }
  .scan-time { display: none; }
  main { padding: 12px 12px 50px; }
  .bias-bar { gap: 6px; flex-wrap: wrap; }
  .bias-track { min-width: 80px; }
}
@media (max-width: 480px) {
  .cards-row { grid-template-columns: 1fr 1fr; gap: 8px; } /* 2x2 on mobile */
  .sc-count { font-size: 24px; }
  .sc-desc { font-size: 10px; }
  .idx-row { padding: 10px 12px; }
  table { min-width: 380px; }
  .section-label { font-size: 10px; }
}
@media (max-width: 360px) {
  .cards-row { gap: 6px; }
  .sig-card { padding: 10px; }
  .sc-count { font-size: 20px; }
  .hdr-right { gap: 5px; }
}
/* ══════════════════════════════════
   SNAPSHOT SUB-BAR
══════════════════════════════════ */
.snapshot-bar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 52px;
  z-index: 99;
  box-shadow: 0 2px 8px var(--shadow);
}
.snapshot-bar-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 6px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.snapshot-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink3);
  white-space: nowrap;
}
.snapshot-select {
  height: 30px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--ink);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  flex: 1;
  min-width: 0;
}
.snapshot-fetch-btn {
  background: var(--acc-bg) !important;
  color: var(--accent) !important;
  border-color: var(--acc-bd) !important;
  font-weight: 700 !important;
  height: 30px !important;
  font-size: 12px !important;
  white-space: nowrap;
  flex-shrink: 0;
}
.snapshot-fetch-btn:hover {
  background: var(--acc-bd) !important;
}
@media (max-width: 600px) {
  .snapshot-bar-inner { padding: 6px 12px; gap: 8px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">OI</div>
      <div class="brand-title"><span>Spike</span>Scanner</div>
    </div>
    <div class="hdr-right">
      <span class="badge" id="scan-badge">READY</span>
      <span class="scan-time" id="scan-time"></span>
      <button class="btn sq" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
      <button class="btn primary" id="fetch-btn" onclick="fetchLive()">
        <span class="spin" style="display:none" id="fetch-spin"></span>
        <span id="fetch-label">⬇ Live</span>
      </button>
      <label class="btn" for="file-input" title="Upload CSV files">📂 <span class="btn-lbl">CSV</span></label>
      <input type="file" id="file-input" accept=".csv" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</header>

<!-- Snapshot Sub-bar -->
<div class="snapshot-bar">
  <div class="snapshot-bar-inner">
    <span class="snapshot-label">🕐 Snapshot</span>
    <select id="snapshot-select" class="snapshot-select">
      <option value="" disabled selected>-- No snapshots --</option>
    </select>
    <button class="btn snapshot-fetch-btn" id="fetch-old-btn" onclick="fetchOld()">Fetch Old</button>
  </div>
</div>

<main>

  <!-- Empty State -->
  <div id="empty-state">
    <div class="es-icon">📊</div>
    <div class="es-title">SpikeScanner</div>
    <div class="es-sub">NSE F&O mein kaun sa stock bullish hai aur kaun sa bearish — ek nazar mein dekhein.</div>
    <div class="es-cards">
      <div class="es-card">
        <div class="es-card-num">1</div>
        <div class="es-card-title">Live Data</div>
        <div class="es-card-sub">Click "⬇ Live" to fetch NSE data</div>
      </div>
      <div class="es-card">
        <div class="es-card-num">2</div>
        <div class="es-card-title">CSV Upload</div>
        <div class="es-card-sub">Upload 4 OI Spurts CSV files from NSE</div>
      </div>
      <div class="es-card">
        <div class="es-card-num">3</div>
        <div class="es-card-title">Signals</div>
        <div class="es-card-sub">Bull &amp; Bear signals appear instantly</div>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">

    <!-- Bias Bar -->
    <div class="bias-bar">
      <span class="bias-label">Market</span>
      <div class="bias-track">
        <div class="bias-bull" id="bias-fill" style="width:50%"></div>
      </div>
      <div class="bias-nums">
        <span style="color:var(--bull)" id="bias-bull-n">—</span>
        <span style="color:var(--ink3)">vs</span>
        <span style="color:var(--bear)" id="bias-bear-n">—</span>
      </div>
      <div class="bias-verdict mix" id="bias-verdict">—</div>
    </div>



    <!-- Cards injected here -->

let _active = null;


// Card descriptions for new users

// ── CSV Parsing ───────────────────────────────────────────
function parseCSVLine(line){
  const out=[]; let cur=''; let q=false;
  for(const ch of line){
    if(ch==='"') q=!q;
    else if(ch===','&&!q){ out.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  out.push(cur.trim());
  return out;
}
const FILE_DIRS=[
  {oiDir:'UP',  priceDir:'UP'},
  {oiDir:'UP',  priceDir:'DOWN'},
  {oiDir:'DOWN',priceDir:'UP'},
  {oiDir:'DOWN',priceDir:'DOWN'},
];
function parseCSVText(text, fileIndex){
  text = text.replace(/^\uFEFF/,'');
  const lines = text.trim().split('\n').filter(Boolean);
  const {oiDir,priceDir} = FILE_DIRS[fileIndex]||FILE_DIRS[0];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const f = parseCSVLine(lines[i]);
    if(f.length<12) continue;
    const optType = f[4].replace(/"/g,'').trim();
    const inst    = f[1].replace(/"/g,'').trim();
    const isFut   = optType==='-'||optType===''||inst.toLowerCase().includes('futures');
    rows.push({
      symbol:    f[0].replace(/"/g,'').trim(),
      instrument:inst,
      expiry:    f[2].replace(/"/g,'').trim(),
      strike:    parseFloat(f[3])||0,
      optType, isFut,
      oiRecent:  parseFloat(f[5])||0,
      oiPrev:    parseFloat(f[6])||0,
      chngOI:    parseFloat(f[7])||0,
      chngOIPct: parseFloat(f[8])||0,
      ltp:       parseFloat(f[9])||0,
      prevClose: parseFloat(f[10])||0,
      ltpChngPct:parseFloat(f[11])||0,
      oiDir, priceDir,
    });
  }
  return rows;
}

// ── Direction (FIXED) ─────────────────────────────────────
// CE price↑ = underlying↑ = BULL  |  CE price↓ = BEAR
// PE price↑ = underlying↓ = BEAR  |  PE price↓ = BULL
// OI direction only tells signal TYPE, not direction.
function getDirection(oiDir, priceDir, optType, isFut){
  const priceUp = priceDir==='UP';
  if(isFut) return priceUp?'BULL':'BEAR';
  const isCall = optType==='CE'||optType==='Call';
  const isPut  = optType==='PE'||optType==='Put';
  if(isCall) return priceUp?'BULL':'BEAR';
  if(isPut)  return priceUp?'BEAR':'BULL';
  return 'NEUTRAL';
}
function getSignalType(oiDir, priceDir, isFut, optType){
  const oiUp=oiDir==='UP', priceUp=priceDir==='UP';
  if(isFut){
    if( oiUp&& priceUp) return 'Long Buildup';
    if( oiUp&&!priceUp) return 'Short Buildup';
    if(!oiUp&& priceUp) return 'Short Covering';
    return 'Long Unwinding';
  }
  const isCall=optType==='CE'||optType==='Call';
  const isPut =optType==='PE'||optType==='Put';
  if(isCall){
    if( oiUp&& priceUp) return 'CE Buildup';
    if( oiUp&&!priceUp) return 'CE Writing';
    if(!oiUp&& priceUp) return 'CE Short Covering';
    return 'CE Long Unwinding';
  }
  if(isPut){
    if( oiUp&& priceUp) return 'PE Buying';
    if( oiUp&&!priceUp) return 'PE Writing';
    if(!oiUp&& priceUp) return 'PE Short Covering';
    return 'PE Long Unwinding';
  }
  return '—';
}

// ── Expiry ────────────────────────────────────────────────
function expiryMs(s){
  const [d,m,y]=s.split('-');
  return new Date(+y,MON[m],+d).getTime();
}
function tradingDaysLeft(ms){
  const today=new Date(); today.setHours(0,0,0,0);
  let d=new Date(today),n=0;
  while(d.getTime()<=ms){ if(d.getDay()!==0&&d.getDay()!==6) n++; d.setDate(d.getDate()+1); }
  return Math.max(n-1,0);
}
function nearExpiryFilter(rows){
  const minExp={};
  for(const r of rows){
    const ms=expiryMs(r.expiry);
    if(!minExp[r.symbol]||ms<minExp[r.symbol]) minExp[r.symbol]=ms;
  }
  return rows.filter(r=>expiryMs(r.expiry)===minExp[r.symbol]);
}
function calcStrength(r){
  const oi=Math.abs(r.chngOIPct)||(r.oiPrev>0?Math.abs(r.chngOI/r.oiPrev*100):0);
  if(r.isFut) return oi>=15?3:oi>=8?2:oi>=4?1:0;
  const tf=tradingDaysLeft(expiryMs(r.expiry))>7?1:.5;
  return Math.round((oi>=20?2:oi>=10?1:0)*tf*10)/10;
}

// ── Process rows ──────────────────────────────────────────
function processRows(allRows){
  const rows = nearExpiryFilter(allRows);
  const res = {
    stockFut: {bull:[],bear:[]},
    stockOpt: {bull:[],bear:[]},
    indexAll: {bull:[],bear:[]},
  };
  for(const r of rows){
    const dir = getDirection(r.oiDir,r.priceDir,r.optType,r.isFut);
    if(dir==='NEUTRAL') continue;
    const normType = r.isFut?'FUT':(r.optType==='Call'||r.optType==='CE')?'CE':
                    (r.optType==='Put'||r.optType==='PE')?'PE':r.optType;
    const sig = {
      symbol:     r.symbol,
      expiry:     r.expiry,
      type:       normType,
      strike:     r.isFut?null:r.strike,
      signalType: getSignalType(r.oiDir,r.priceDir,r.isFut,r.optType),
      strength:   calcStrength(r),
      oiChngPct:  r.chngOIPct,
      ltpChngPct: r.ltpChngPct,
      ltp:        r.ltp,
    };
    const bucket = dir==='BULL'?'bull':'bear';
    const isIdx  = INDEX_SYMS.has(r.symbol);
    if(isIdx)         res.indexAll[bucket].push(sig);
    else if(r.isFut)  res.stockFut[bucket].push(sig);
    else              res.stockOpt[bucket].push(sig);
  }
  const byStr=(a,b)=>b.strength-a.strength;
  for(const cat of Object.values(res)){
    cat.bull.sort(byStr); cat.bear.sort(byStr);
  }
  return res;
}

// ── Render helpers ────────────────────────────────────────
function fmtPct(v){
  const n=+v;
  const cls=n>0?'bull-c':n<0?'bear-c':'dim';
  return `<span class="${cls}">${n>0?'+':''}${n.toFixed(2)}%</span>`;
}
function pill(txt,dir){ return `<span class="pill ${dir}">${txt}</span>`; }
function tbadge(t){ const c=t==='CE'?'ce':t==='PE'?'pe':'fut'; return `<span class="tbadge ${c}">${t}</span>`; }
function strDots(s,max=3){
  let h='<span class="str-dots">';
  for(let i=1;i<=max;i++){
    const on=Math.round(s)>=i;
    const cls=on?(i===3?'on-hi':i===2?'on-mid':'on-lo'):'';
    h+=`<span class="str-dot${cls?' '+cls:''}"></span>`;
  }
  return h+'</span>';
}

function renderTable(sigs, dir, isFut){

      <td class="dim">${s.expiry}</td>

    return `<thead><tr>
      <th>Symbol</th><th>Signal</th><th class="c">Str</th>

      <th>Symbol</th><th class="r">Strike</th><th class="c">Type</th>
      <th>Signal</th><th class="c">Str</th>
      <th class="r">OI%</th><th class="r">LTP%</th>

  }
}

    rerender();
    setBadge('file', '🕐 ' + time);
    setScanTime(data.savedAt);
  } catch(e){
    alert('Fetch Old failed: ' + e.message);
  }
  btn.textContent = 'Fetch Old'; btn.style.pointerEvents = 'auto';
}

// Load snapshot list on page load
window.addEventListener('DOMContentLoaded', loadSnapshotList);

// ── Fetch Live ────────────────────────────────────────────
async function fetchLive(){
  const btn=document.getElementById('fetch-btn');
  btn.classList.add('loading');
  document.getElementById('fetch-spin').style.display='inline-block';
  document.getElementById('fetch-label').textContent='...';
  setBadge('','Loading');
  try{
    const res=await fetch(WORKER+'?mode=signals');
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'Worker error');
    _data=processRows_fromWorker(data);
    rerender();
    setBadge('live','● Live');
    setScanTime(data.scanTime);
  } catch(e){
    setBadge('err','Error');
    alert('Fetch failed: '+e.message);
  }
  btn.classList.remove('loading');
  document.getElementById('fetch-spin').style.display='none';
  document.getElementById('fetch-label').textContent='⬇ Live';
}

function processRows_fromWorker(data){
  const stockFut={bull:[],bear:[]},stockOpt={bull:[],bear:[]},indexAll={bull:[],bear:[]};
  const proc=(sigs,bucket)=>{
    for(const s of sigs){
      const isIdx=INDEX_SYMS.has(s.symbol);
      if(isIdx)            indexAll[bucket].push(s);
      else if(s.type==='FUT') stockFut[bucket].push(s);
      else                 stockOpt[bucket].push(s);
    }
  };
  proc(data.futures?.bull||[],'bull');
  proc(data.futures?.bear||[],'bear');
  proc(data.options?.bull||[],'bull');
  proc(data.options?.bear||[],'bear');
  return {stockFut,stockOpt,indexAll};
}

// ── CSV Upload ────────────────────────────────────────────
function detectFileIndex(filename){
  const f=filename.toLowerCase();
  if(f.includes('rise-in-oi')&&f.includes('rise-in-price'))  return 0;
  if(f.includes('rise-in-oi')&&f.includes('slide-in-price')) return 1;
  if(f.includes('slide-in-oi')&&f.includes('rise-in-price')) return 2;
  if(f.includes('slide-in-oi')&&f.includes('slide-in-price'))return 3;
  return -1;
}
async function handleFiles(files){
  if(!files||!files.length) return;
  setBadge('','Parsing');
  const allRows=[]; let assigned=[false,false,false,false];
  for(const file of files){
    let idx=detectFileIndex(file.name);
    if(idx===-1) idx=assigned.indexOf(false);
    if(idx===-1) continue;
    assigned[idx]=true;
    try{ allRows.push(...parseCSVText(await file.text(),idx)); }
    catch(e){ console.error(file.name,e); }
  }
  if(!allRows.length){ setBadge('err','Error'); alert('No data found in uploaded files.'); return; }
  _data=processRows(allRows);
  rerender();
  setBadge('file',`📂 ${files.length} files`);
  setScanTime(new Date().toISOString());
  document.getElementById('file-input').value='';
}
</script>
