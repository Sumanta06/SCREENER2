<!DOCTYPE html>
<html lang="en" data-theme="blue">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptionTrade · NSE F&O</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════ THEMES */
[data-theme="blue"]{
  --bg:#000000;
  --bg1:#080808;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --card:#0d0d0d;
  --border:#1f1f1f;
  --border2:#2a2a2a;
  --ink:#f0f0f0;
  --ink2:#888888;
  --ink3:#555555;
  --shadow:rgba(0,0,0,.7);
  --bull:#00e676;
  --bull-bg:rgba(0,230,118,.1);
  --bull-bd:rgba(0,230,118,.3);
  --bear:#ff1744;
  --bear-bg:rgba(255,23,68,.1);
  --bear-bd:rgba(255,23,68,.3);
  --accent:#e040fb;
  --acc-bg:rgba(224,64,251,.1);
  --acc-bd:rgba(224,64,251,.3);
  --gold:#ffd600;
  --gold-dim:rgba(255,214,0,.1);
  --gold-mid:rgba(255,214,0,.25);
  --orange:#f97316;
  --orange-dim:rgba(249,115,22,.1);
  --orange-mid:rgba(249,115,22,.25);
  --orange-text:#fb923c;
  --thead:#000000;
  --modal-bg:rgba(0,0,0,.95);
}
[data-theme="white"]{
  --bg:#f0f4f8; --bg1:#ffffff; --bg2:#e8eef5; --bg3:#dde4ed;
  --card:#ffffff; --border:#d0daea; --border2:#bfcfdf;
  --ink:#1a2540; --ink2:#4a6080; --ink3:#8a9ab0;
  --shadow:rgba(0,0,0,.08);
  --bull:#0a9a5a; --bull-bg:rgba(10,154,90,.08); --bull-bd:rgba(10,154,90,.25);
  --bear:#d42a48; --bear-bg:rgba(212,42,72,.08); --bear-bd:rgba(212,42,72,.25);
  --accent:#2563eb; --acc-bg:rgba(37,99,235,.08); --acc-bd:rgba(37,99,235,.3);
  --gold:#d97706; --gold-dim:rgba(217,119,6,.1); --gold-mid:rgba(217,119,6,.25);
  --orange:#ea580c; --orange-dim:rgba(234,88,12,.1); --orange-mid:rgba(234,88,12,.25); --orange-text:#c2410c;
  --thead:#f0f4f8; --modal-bg:rgba(240,244,248,.92);
}

/* ══════════════════════════════════ RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:13px; line-height:1.5; min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .25s, color .25s;
}

/* ══════════════════════════════════ HEADER */
header{
  background:var(--card); border-bottom:1px solid var(--border);
  height:52px; position:sticky; top:0; z-index:200;
  box-shadow:0 2px 12px var(--shadow);
}
.hdr-inner{
  max-width:1400px; margin:0 auto; padding:0 20px;
  height:100%; display:flex; align-items:center;
  justify-content:space-between; gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{
  width:32px;height:32px;background:var(--accent);
  border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:12px;color:#fff;
}
.brand-title{font-weight:700;font-size:15px;color:var(--ink);}
.brand-title span{color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.badge{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
  background:var(--bg2);color:var(--ink3);border:1px solid var(--border);
}
.badge.live{background:var(--bull-bg);color:var(--bull);border-color:var(--bull-bd);}
.badge.err {background:var(--bear-bg);color:var(--bear);border-color:var(--bear-bd);}
.scan-time{font-size:11px;color:var(--ink3);}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  height:34px;padding:0 14px;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  border:1px solid var(--border);background:var(--bg2);color:var(--ink2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--bg3);color:var(--ink);}
.btn.primary{background:var(--acc-bg);color:var(--accent);border-color:var(--acc-bd);}
.btn.primary:hover{background:var(--acc-bd);}
.btn.dayv{background:rgba(168,85,247,.1);color:#c084fc;border-color:rgba(168,85,247,.3);}
.btn.dayv:hover{background:rgba(168,85,247,.2);}
.btn.loading{opacity:.5;pointer-events:none;}
.btn.sq{width:34px;padding:0;justify-content:center;}
.spin{
  width:12px;height:12px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .6s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg);}}
#file-input{display:none;}

/* ══════════════════════════════════ MAIN */
main{padding:16px 20px 60px;max-width:1400px;margin:0 auto;}

/* ══════════════════════════════════ EMPTY */
#empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:65vh;gap:16px;
  text-align:center;padding:20px;
}
.es-icon{font-size:48px;}
.es-title{font-size:18px;font-weight:700;}
.es-sub{font-size:13px;color:var(--ink2);max-width:300px;line-height:1.7;}
.es-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.es-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 18px;text-align:left;min-width:130px;
}
.es-card-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--acc-bg);color:var(--accent);
  font-size:11px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:6px;
}
.es-card-title{font-size:13px;font-weight:600;}
.es-card-sub{font-size:11px;color:var(--ink3);margin-top:2px;}

/* ══════════════════════════════════ DASHBOARD */
#dashboard{display:none;}
.bias-bar{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.bias-label{font-size:11px;color:var(--ink3);font-weight:600;text-transform:uppercase;flex-shrink:0;}
.bias-track{flex:1;min-width:100px;height:8px;border-radius:4px;background:var(--border);overflow:hidden;position:relative;}
.bias-bull{height:100%;background:var(--bull);border-radius:4px 0 0 4px;transition:width .4s;}
.bias-nums{display:flex;gap:6px;font-size:12px;font-weight:700;flex-shrink:0;}
.bias-verdict{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.bias-verdict.bull{background:var(--bull-bg);color:var(--bull);}
.bias-verdict.bear{background:var(--bear-bg);color:var(--bear);}
.bias-verdict.mix{background:var(--bg2);color:var(--ink3);}
.section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink3);
  margin:18px 0 8px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.section-dot{width:6px;height:6px;border-radius:50%;}

/* Signal Cards */
.cards-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:4px;}
.sig-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px 10px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .1s;
  position:relative;overflow:hidden;
}
.sig-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;
}
.sig-card.bull::before{background:var(--bull);}
.sig-card.bear::before{background:var(--bear);}
.sig-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow);}
.sig-card.active.bull{border-color:var(--bull);box-shadow:0 0 0 2px var(--bull-bd);}
.sig-card.active.bear{border-color:var(--bear);box-shadow:0 0 0 2px var(--bear-bd);}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.sc-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.sc-tag.bull{background:var(--bull-bg);color:var(--bull);}
.sc-tag.bear{background:var(--bear-bg);color:var(--bear);}
.sc-count{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
.sc-count.bull{color:var(--bull);}
.sc-count.bear{color:var(--bear);}
.sc-desc{font-size:10px;color:var(--ink3);margin-bottom:3px;line-height:1.4;}
.sc-signals{font-size:11px;color:var(--ink2);}

/* Index card */
.index-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:4px;}
.index-card-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.index-card-title{font-size:13px;font-weight:700;}
.index-card-sub{font-size:11px;color:var(--ink3);margin-top:1px;}
.idx-row{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.idx-row:last-child{border-bottom:none;}
.idx-row:hover{background:var(--bg2);}
.idx-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.idx-sym{font-size:14px;font-weight:700;}
.idx-verdict{font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;}
.idx-verdict.bull{background:var(--bull-bg);color:var(--bull);}
.idx-verdict.bear{background:var(--bear-bg);color:var(--bear);}
.idx-verdict.mix{background:var(--bg2);color:var(--ink3);}
.idx-track-wrap{display:flex;align-items:center;gap:8px;}
.idx-track{flex:1;height:6px;border-radius:3px;background:var(--border);overflow:hidden;position:relative;}
.idx-fill-bull{height:100%;border-radius:3px 0 0 3px;background:var(--bull);position:absolute;left:0;transition:width .4s;}
.idx-fill-bear{height:100%;border-radius:0 3px 3px 0;background:var(--bear);position:absolute;right:0;transition:width .4s;}
.idx-nums{font-size:11px;font-weight:600;display:flex;gap:6px;flex-shrink:0;}
.idx-detail{display:none;border-top:1px solid var(--border);background:var(--bg);}
.idx-detail.open{display:block;}
.idx-detail-hdr{padding:8px 14px;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;border-bottom:1px solid var(--border);}

/* Signal Table */
.table-wrap{
  display:none;background:var(--card);border:1px solid var(--border);
  border-radius:12px;margin-bottom:10px;overflow:hidden;
  animation:fadeIn .2s ease;
}
.table-wrap.open{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.table-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.table-hdr.bull{background:var(--bull-bg);border-left:3px solid var(--bull);}
.table-hdr.bear{background:var(--bear-bg);border-left:3px solid var(--bear);}
.th-title{font-size:12px;font-weight:700;}
.th-title.bull{color:var(--bull);}
.th-title.bear{color:var(--bear);}
.th-sub{font-size:11px;color:var(--ink2);margin-top:1px;}
.th-cnt{font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px;}
.th-cnt.bull{background:var(--bull-bg);color:var(--bull);border:1px solid var(--bull-bd);}
.th-cnt.bear{background:var(--bear-bg);color:var(--bear);border:1px solid var(--bear-bd);}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
thead th{
  background:var(--thead);color:var(--ink3);font-family:'Inter',sans-serif;
  font-size:11px;font-weight:600;text-transform:uppercase;
  padding:7px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);
}
thead th.r{text-align:right;}
thead th.c{text-align:center;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg2);}
td{padding:8px 12px;font-size:12px;white-space:nowrap;color:var(--ink);}
td.sym{font-weight:700;font-size:13px;}
td.r{text-align:right;}
td.c{text-align:center;}
td.dim{color:var(--ink2);}
td.bull-c{color:var(--bull);font-weight:700;}
td.bear-c{color:var(--bear);font-weight:700;}
td.gold-c{color:var(--gold);}
.no-data td{text-align:center;padding:20px;color:var(--ink3);font-size:12px;font-style:italic;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.pill.bull{background:var(--bull-bg);color:var(--bull);border:1px solid var(--bull-bd);}
.pill.bear{background:var(--bear-bg);color:var(--bear);border:1px solid var(--bear-bd);}
.tbadge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.tbadge.ce {background:rgba(59,130,246,.12);color:#3b82f6;}
.tbadge.pe {background:rgba(245,166,35,.12);color:var(--gold);}
.tbadge.fut{background:rgba(168,85,247,.12);color:#a855f7;}
.str-dots{display:inline-flex;gap:3px;align-items:center;}
.str-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
.str-dot.on-hi{background:var(--gold);}
.str-dot.on-mid{background:var(--accent);}
.str-dot.on-lo{background:var(--bull);}

/* ══════════════════════════════════ DAY VIEW MODAL */
#dv-modal{
  display:none;position:fixed;inset:0;z-index:998;
  background:var(--modal-bg);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  flex-direction:column;overflow:hidden;
}
#dv-modal.open{display:flex;}
.dv-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;
}
.dv-title{font-size:.95rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;}
.dv-subtitle{font-size:.7rem;color:var(--ink3);margin-top:2px;}
.dv-close{
  width:30px;height:30px;min-width:30px;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--ink2);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  flex-shrink:0;margin-left:12px;line-height:1;padding:0;
}
.dv-close:hover{background:var(--bg3);color:var(--ink);}
.dv-body{flex:1;overflow-y:auto;padding:14px 16px 40px;}
.dv-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--ink3);font-size:.8rem;}
.dv-spin{
  width:18px;height:18px;border:2px solid var(--border2);
  border-top-color:#a855f7;border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
.dv-empty{text-align:center;padding:48px 20px;color:var(--ink3);font-size:.82rem;}
.dv-sec-label{
  font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1.1px;color:var(--ink3);margin:16px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.dv-sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* Timeline rows */
.dv-tl-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:9px;margin-bottom:6px;overflow:hidden;
  cursor:pointer;transition:border-color .15s;
}
.dv-tl-item:hover{border-color:#a855f7;}
.dv-tl-item.expanded{border-color:#a855f7;}
.dv-tl-item.bull-dom{border-left:3px solid var(--bull);}
.dv-tl-item.bear-dom{border-left:3px solid var(--bear);}
.dv-tl-item.mixed   {border-left:3px solid var(--border2);}
.dv-tl-item.dimmed{opacity:.32;filter:brightness(.65);transition:opacity .2s,filter .2s;}

.dv-tl-item:nth-child(odd) {background:var(--card);}
.dv-tl-item:nth-child(even){background:var(--bg2);}

.dv-tl-head{padding:10px 14px;}
.dv-tl-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.dv-tl-time{font-size:.82rem;font-weight:700;color:var(--ink);}
.dv-tl-strong{display:flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;color:var(--gold);}

/* Chip overflow */
.chip-overflow-wrap{display:flex;flex-wrap:nowrap;overflow:hidden;gap:5px;padding:5px 0 4px;align-items:center;position:relative;}
.chip-overflow-wrap.expanded{flex-wrap:wrap;}
.chip-more-btn{
  flex-shrink:0;cursor:pointer;font-size:.65rem;font-weight:700;
  padding:3px 8px;border-radius:5px;background:var(--bg3);color:var(--ink2);
  border:1px solid var(--border2);white-space:nowrap;transition:background .12s;
}
.chip-more-btn:hover{background:var(--border2);color:var(--ink);}

/* Signal chips */
.dv-chip-bull{
  display:inline-flex;align-items:center;gap:3px;
  font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:5px;
  background:var(--bull-bg);color:var(--bull);border:1px solid var(--bull-bd);
  white-space:nowrap;
}
.dv-chip-bear{
  display:inline-flex;align-items:center;gap:3px;
  font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:5px;
  background:var(--bear-bg);color:var(--bear);border:1px solid var(--bear-bd);
  white-space:nowrap;
}

/* Expanded detail */
.dv-detail{display:none;border-top:1px solid var(--border);overflow-x:auto;}
.dv-detail.open{display:block;}

/* Flat table */
.dv-flat-table-wrap{overflow-x:auto;}
.dv-flat-table-wrap table{width:100%;border-collapse:collapse;min-width:540px;}
.dv-flat-table-wrap thead tr{background:var(--thead);}
.dv-flat-table-wrap th{
  font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--ink3);padding:7px 10px;text-align:left;white-space:nowrap;
}
.dv-flat-table-wrap td{padding:7px 10px;font-size:.72rem;border-top:1px solid var(--border);vertical-align:middle;color:var(--ink);}
.dv-flat-table-wrap .sym-col{font-weight:700;font-size:.75rem;white-space:nowrap;color:var(--ink);}
.dv-flat-table-wrap td:last-child{white-space:nowrap;overflow:visible;}

/* Staleness badges */
.stale-tag{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:5px;white-space:nowrap;margin-right:4px;flex-shrink:0;}
.stale-fresh{background:#003d20;color:#00ff88 !important;border:1.5px solid #00cc6a;}
.stale-watch{background:#4a3800;color:#ffd666 !important;border:1.5px solid #cc9900;}
.stale-vold {background:#4a0010;color:#ff8899 !important;border:1.5px solid #cc0033;}

/* STRONG / CAUTION badges */
.dv-strong-badge{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:5px;flex-shrink:0;background:#4a3800;color:#ffd666 !important;border:1.5px solid #cc9900;}
.dv-caution-badge{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:5px;flex-shrink:0;background:#4a2200;color:#ffaa66 !important;border:1.5px solid #cc5500;}

/* Leaderboard */
.dv-lb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;}
.dv-lb-rank{font-size:.7rem;font-weight:700;color:var(--ink3);width:18px;text-align:center;flex-shrink:0;}
.dv-lb-sym{font-size:.82rem;font-weight:700;flex:1;}
.dv-lb-bar-wrap{flex:2;display:flex;align-items:center;gap:8px;}
.dv-lb-bar-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.dv-lb-bar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s ease;}
.dv-lb-count{font-size:.75rem;font-weight:700;color:var(--gold);min-width:24px;text-align:right;}

/* Type pill for flat table */
.type-fut{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(168,85,247,.12);color:#a855f7;}
.type-ce {display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(59,130,246,.12);color:#3b82f6;}
.type-pe {display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(245,166,35,.12);color:var(--gold);}

/* Invert expanded card — Blue/AMOLED theme: light bg */

<script>
'use strict';
const WORKER = 'https://spurts.sumantasahoo.workers.dev/';
const WORKER_OLD = 'https://spurt-b.21aoips3531a1zi.workers.dev/';
const INDEX_SYMS = new Set(['NIFTY','BANKNIFTY','FINNIFTY','MIDCPNIFTY','SENSEX','BANKEX','NIFTYNXT50']);

let _data   = null;
let _active = null;

/* ── Theme ── */
(function(){
  const t = localStorage.getItem('ot_theme') || 'blue';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'blue' ? '☀️' : '🌙';
})();
function toggleTheme(){
  const cur  = document.documentElement.getAttribute('data-theme');
  const next = cur === 'blue' ? 'white' : 'blue';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'blue' ? '☀️' : '🌙';
  localStorage.setItem('ot_theme', next);
}

/* ── Badge ── */
function setBadge(cls, txt){
  const e = document.getElementById('scan-badge');
  e.className = 'badge ' + cls;
  e.textContent = txt;
}
function setScanTime(iso){
  if(!iso) return;
  document.getElementById('scan-time').textContent =
    new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function showDash(){
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';
}

/* ── CSV Parsing ── */
function parseCSVLine(line){
  const out=[]; let cur=''; let q=false;
  for(const ch of line){
    if(ch==='"') q=!q;
    else if(ch===','&&!q){ out.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  out.push(cur.trim());
  return out;
}
const FILE_DIRS=[
  {oiDir:'UP',  priceDir:'UP'},
  {oiDir:'UP',  priceDir:'DOWN'},
  {oiDir:'DOWN',priceDir:'UP'},
  {oiDir:'DOWN',priceDir:'DOWN'},
];
function parseCSVText(text, fileIndex){
  text = text.replace(/^\uFEFF/,'');
  const lines = text.trim().split('\n').filter(Boolean);
  const {oiDir,priceDir} = FILE_DIRS[fileIndex]||FILE_DIRS[0];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const f = parseCSVLine(lines[i]);
    if(f.length<12) continue;
    const optType = f[4].replace(/"/g,'').trim();
    const inst    = f[1].replace(/"/g,'').trim();
    const isFut   = optType==='-'||optType===''||inst.toLowerCase().includes('futures');
    rows.push({
      symbol:f[0].replace(/"/g,'').trim(), instrument:inst,
      expiry:f[2].replace(/"/g,'').trim(), strike:parseFloat(f[3])||0,
      optType, isFut,
      oiRecent:parseFloat(f[5])||0, oiPrev:parseFloat(f[6])||0,
      chngOI:parseFloat(f[7])||0, chngOIPct:parseFloat(f[8])||0,
      ltp:parseFloat(f[9])||0, prevClose:parseFloat(f[10])||0,
      ltpChngPct:parseFloat(f[11])||0,
      oiDir, priceDir,
    });
  }
  return rows;
}

/* ── Signal logic ── */
const MON = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function expiryMs(s){ const [d,m,y]=s.split('-'); return new Date(+y,MON[m],+d).getTime(); }
function tradingDaysLeft(ms){
  const today=new Date(); today.setHours(0,0,0,0);
  let d=new Date(today),n=0;
  while(d.getTime()<=ms){ if(d.getDay()!==0&&d.getDay()!==6) n++; d.setDate(d.getDate()+1); }
  return Math.max(n-1,0);
}
function nearExpiryFilter(rows){
  const minExp={};
  for(const r of rows){ const ms=expiryMs(r.expiry); if(!minExp[r.symbol]||ms<minExp[r.symbol]) minExp[r.symbol]=ms; }
  return rows.filter(r=>expiryMs(r.expiry)===minExp[r.symbol]);
}
function calcStrength(r){
  const oi=Math.abs(r.chngOIPct)||(r.oiPrev>0?Math.abs(r.chngOI/r.oiPrev*100):0);
  if(r.isFut) return oi>=15?3:oi>=8?2:oi>=4?1:0;
  const tf=tradingDaysLeft(expiryMs(r.expiry))>7?1:.5;
  return Math.round((oi>=20?2:oi>=10?1:0)*tf*10)/10;
}
function getDirection(oiDir,priceDir,optType,isFut){
  const priceUp=priceDir==='UP';
  if(isFut) return priceUp?'BULL':'BEAR';
  const isCall=optType==='CE'||optType==='Call';
  const isPut =optType==='PE'||optType==='Put';
  if(isCall) return priceUp?'BULL':'BEAR';
  if(isPut)  return priceUp?'BEAR':'BULL';
  return 'NEUTRAL';
}
function getSignalType(oiDir,priceDir,isFut,optType){
  const oiUp=oiDir==='UP',priceUp=priceDir==='UP';
  if(isFut){
    if( oiUp&& priceUp) return 'Long Buildup';
    if( oiUp&&!priceUp) return 'Short Buildup';
    if(!oiUp&& priceUp) return 'Short Covering';
    return 'Long Unwinding';
  }
  const isCall=optType==='CE'||optType==='Call';
  const isPut =optType==='PE'||optType==='Put';
  if(isCall){
    if( oiUp&& priceUp) return 'CE Buildup';
    if( oiUp&&!priceUp) return 'CE Writing';
    if(!oiUp&& priceUp) return 'CE Short Covering';
    return 'CE Long Unwinding';
  }
  if(isPut){
    if( oiUp&& priceUp) return 'PE Buying';
    if( oiUp&&!priceUp) return 'PE Writing';
    if(!oiUp&& priceUp) return 'PE Short Covering';
    return 'PE Long Unwinding';
  }
  return '—';
}
function processRows(allRows){
  const rows=nearExpiryFilter(allRows);
  const res={stockFut:{bull:[],bear:[]},stockOpt:{bull:[],bear:[]},indexAll:{bull:[],bear:[]}};
  for(const r of rows){
    const dir=getDirection(r.oiDir,r.priceDir,r.optType,r.isFut);
    if(dir==='NEUTRAL') continue;
    const normType=r.isFut?'FUT':(r.optType==='Call'||r.optType==='CE')?'CE':(r.optType==='Put'||r.optType==='PE')?'PE':r.optType;
    const sig={
      symbol:r.symbol,expiry:r.expiry,type:normType,
      strike:r.isFut?null:r.strike,
      signalType:getSignalType(r.oiDir,r.priceDir,r.isFut,r.optType),
      strength:calcStrength(r),oiChngPct:r.chngOIPct,ltpChngPct:r.ltpChngPct,ltp:r.ltp,
    };
    const bucket=dir==='BULL'?'bull':'bear';
    const isIdx=INDEX_SYMS.has(r.symbol);
    if(isIdx) res.indexAll[bucket].push(sig);
    else if(r.isFut) res.stockFut[bucket].push(sig);
    else res.stockOpt[bucket].push(sig);
  }
  const byStr=(a,b)=>b.strength-a.strength;
  for(const cat of Object.values(res)){ cat.bull.sort(byStr); cat.bear.sort(byStr); }
  return res;
}

/* ── Render helpers ── */
function fmtPct(v){
  const n=+v;
  return `<span class="${n>0?'bull-c':n<0?'bear-c':'dim'}">${n>0?'+':''}${n.toFixed(2)}%</span>`;
}
function pill(txt,dir){ return `<span class="pill ${dir}">${txt}</span>`; }
function tbadge(t){ const c=t==='CE'?'ce':t==='PE'?'pe':'fut'; return `<span class="tbadge ${c}">${t}</span>`; }
function strDots(s,max=3){
  let h='<span class="str-dots">';
  for(let i=1;i<=max;i++){
    const on=Math.round(s)>=i;
    const cls=on?(i===3?'on-hi':i===2?'on-mid':'on-lo'):'';
    h+=`<span class="str-dot${cls?' '+cls:''}"></span>`;
  }
  return h+'</span>';
}

function renderTable(sigs, dir, isFut){
  if(!sigs.length) return `<tbody><tr class="no-data"><td colspan="7">No signals found</td></tr></tbody>`;
  if(isFut){
    const rows=sigs.map(s=>`<tr>
      <td class="sym">${s.symbol}</td>
      <td>${pill(s.signalType,dir)}</td>
      <td class="c">${strDots(s.strength,3)}</td>
      <td class="r ${s.oiChngPct>0?'bull-c':'bear-c'}">${s.oiChngPct>0?'+':''}${(+s.oiChngPct).toFixed(1)}%</td>
      <td class="r">${fmtPct(s.ltpChngPct)}</td>
      <td class="dim">${s.expiry}</td>
    </tr>`).join('');
    return `<thead><tr><th>Symbol</th><th>Signal</th><th class="c">Str</th><th class="r">OI%</th><th class="r">LTP%</th><th>Expiry</th></tr></thead><tbody>${rows}</tbody>`;
  } else {
    const rows=sigs.map(s=>`<tr>
      <td class="sym">${s.symbol}</td>
      <td class="r gold-c">${s.strike?s.strike.toLocaleString('en-IN'):'—'}</td>
      <td>${tbadge(s.type)}</td>
      <td>${pill(s.signalType,dir)}</td>
      <td class="c">${strDots(s.strength,2)}</td>
      <td class="r ${s.oiChngPct>0?'bull-c':'bear-c'}">${s.oiChngPct>0?'+':''}${(+s.oiChngPct).toFixed(1)}%</td>
      <td class="r">${fmtPct(s.ltpChngPct)}</td>
    </tr>`).join('');
    return `<thead><tr><th>Symbol</th><th class="r">Strike</th><th class="c">Type</th><th>Signal</th><th class="c">Str</th><th class="r">OI%</th><th class="r">LTP%</th></tr></thead><tbody>${rows}</tbody>`;
  }
}

function renderIndexCard(indexAll){
  const syms={};
  for(const s of indexAll.bull){ if(!syms[s.symbol]) syms[s.symbol]={bull:[],bear:[]}; syms[s.symbol].bull.push(s); }
  for(const s of indexAll.bear){ if(!syms[s.symbol]) syms[s.symbol]={bull:[],bear:[]}; syms[s.symbol].bear.push(s); }
  if(!Object.keys(syms).length) return `<div style="padding:16px;text-align:center;font-size:12px;color:var(--ink3)">Koi index signal nahi</div>`;
  let rows='';
  for(const [sym,{bull,bear}] of Object.entries(syms)){
    const total=bull.length+bear.length;
    const bullPct=total?Math.round(bull.length/total*100):50;
    const net=bull.length>bear.length*1.3?'bull':bear.length>bull.length*1.3?'bear':'mix';
    const netLabel=net==='bull'?'▲ Bullish':net==='bear'?'▼ Bearish':'↔ Mixed';
    rows+=`<div class="idx-row" onclick="toggleIdxDetail('${sym}')">
      <div class="idx-top"><div class="idx-sym">${sym}</div><div class="idx-verdict ${net}">${netLabel}</div></div>
      <div class="idx-track-wrap">
        <div class="idx-track">
          <div class="idx-fill-bull" style="width:${bullPct}%"></div>
          <div class="idx-fill-bear" style="width:${100-bullPct}%"></div>
        </div>
        <div class="idx-nums">
          <span style="color:var(--bull)">▲${bull.length}</span>
          <span style="color:var(--bear)">▼${bear.length}</span>
        </div>
      </div>
    </div>
    <div class="idx-detail" id="idx-detail-${sym}">
      <div class="idx-detail-hdr">${sym} — Top Signals</div>
      <div class="tscroll"><table>
        <thead><tr><th>Strike</th><th class="c">Type</th><th>Signal</th><th class="c">Dir</th><th class="r">OI%</th><th class="r">LTP%</th></tr></thead>
        <tbody>
          ${[...bull.slice(0,5).map(s=>`<tr><td class="gold-c">${s.strike||'—'}</td><td class="c">${tbadge(s.type)}</td><td>${pill(s.signalType,'bull')}</td><td class="c" style="color:var(--bull)">▲</td><td class="r bull-c">+${(+s.oiChngPct).toFixed(1)}%</td><td class="r">${fmtPct(s.ltpChngPct)}</td></tr>`),
          ...bear.slice(0,5).map(s=>`<tr><td class="gold-c">${s.strike||'—'}</td><td class="c">${tbadge(s.type)}</td><td>${pill(s.signalType,'bear')}</td><td class="c" style="color:var(--bear)">▼</td><td class="r bear-c">${(+s.oiChngPct).toFixed(1)}%</td><td class="r">${fmtPct(s.ltpChngPct)}</td></tr>`)].join('')}
        </tbody>
      </table></div>
    </div>`;
  }
  return rows;
}
function toggleIdxDetail(sym){ document.getElementById('idx-detail-'+sym)?.classList.toggle('open'); }

function showSection(cardId){
  const allIds=['tbl-sfut-bull','tbl-sfut-bear','tbl-sopt-bull','tbl-sopt-bear'];
  const allCards=document.querySelectorAll('.sig-card');
  if(_active===cardId){
    allCards.forEach(c=>c.classList.remove('active'));
    allIds.forEach(id=>document.getElementById(id)?.classList.remove('open'));
    _active=null; return;
  }
  allCards.forEach(c=>c.classList.remove('active'));
  allIds.forEach(id=>document.getElementById(id)?.classList.remove('open'));
  document.getElementById('card-'+cardId)?.classList.add('active');
  _active=cardId;
  const tbl=document.getElementById('tbl-'+cardId);
  if(tbl){ tbl.classList.add('open'); setTimeout(()=>tbl.scrollIntoView({behavior:'smooth',block:'nearest'}),50); }
}

function rerender(){
  if(!_data) return;
  const {stockFut,stockOpt,indexAll}=_data;
  const totalBull=stockFut.bull.length+stockOpt.bull.length+indexAll.bull.length;
  const totalBear=stockFut.bear.length+stockOpt.bear.length+indexAll.bear.length;
  const total=totalBull+totalBear||1;
  document.getElementById('bias-fill').style.width=Math.round(totalBull/total*100)+'%';
  document.getElementById('bias-bull-n').textContent=totalBull+' Bull';
  document.getElementById('bias-bear-n').textContent=totalBear+' Bear';
  const verdict=document.getElementById('bias-verdict');
  if(totalBull>totalBear*1.3){ verdict.textContent='▲ Bullish'; verdict.className='bias-verdict bull'; }
  else if(totalBear>totalBull*1.3){ verdict.textContent='▼ Bearish'; verdict.className='bias-verdict bear'; }
  else { verdict.textContent='↔ Mixed'; verdict.className='bias-verdict mix'; }

  const sfBull=stockFut.bull, sfBear=stockFut.bear;
  const soBull=stockOpt.bull, soBear=stockOpt.bear;
  const sfBullSig=sfBull.slice(0,2).map(s=>s.signalType).filter((v,i,a)=>a.indexOf(v)===i).join(', ')||'—';
  const sfBearSig=sfBear.slice(0,2).map(s=>s.signalType).filter((v,i,a)=>a.indexOf(v)===i).join(', ')||'—';
  const soBullSig=soBull.slice(0,2).map(s=>s.signalType).filter((v,i,a)=>a.indexOf(v)===i).join(', ')||'—';
  const soBearSig=soBear.slice(0,2).map(s=>s.signalType).filter((v,i,a)=>a.indexOf(v)===i).join(', ')||'—';

  document.getElementById('sections').innerHTML=`
  <div class="section-label"><span class="section-dot" style="background:var(--bull)"></span>Index — NIFTY &amp; BANKNIFTY</div>
  <div class="index-card" style="margin-bottom:4px">
    <div class="index-card-hdr"><div><div class="index-card-title">Index Mood</div><div class="index-card-sub">Tap a row to see detailed signals</div></div></div>
    ${renderIndexCard(indexAll)}
  </div>
  <div class="section-label"><span class="section-dot" style="background:var(--accent)"></span>Stocks — Futures &amp; Options</div>
  <div class="cards-row">
    <div class="sig-card bull" id="card-sfut-bull" onclick="showSection('sfut-bull')">
      <div class="sc-top"><span class="sc-tag bull">▲ Fut Long</span></div>
      <div class="sc-count bull">${sfBull.length}</div>

/* ── Fetch Live ── */
async function fetchLive(){
  const btn=document.getElementById('fetch-btn');
  btn.classList.add('loading');
  document.getElementById('fetch-spin').style.display='inline-block';
  document.getElementById('fetch-label').textContent='...';
  setBadge('','Loading');
  try{
    const res=await fetch(WORKER+'signals');
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'Worker error');
    _data = processRows_fromWorker(data);
    rerender();
    setBadge('live','● Live');
    setScanTime(data.scanTime);
  } catch(e){ setBadge('err','Error'); alert('Fetch failed: '+e.message); }
  btn.classList.remove('loading');
  document.getElementById('fetch-spin').style.display='none';
  document.getElementById('fetch-label').textContent='⬇ Live';
}

function processRows_fromWorker(data){
  const stockFut={bull:[],bear:[]},stockOpt={bull:[],bear:[]},indexAll={bull:[],bear:[]};
  const proc=(sigs,bucket)=>{
    for(const s of sigs){
      const isIdx=INDEX_SYMS.has(s.symbol);
      if(isIdx) indexAll[bucket].push(s);
      else if(s.type==='FUT') stockFut[bucket].push(s);
      else stockOpt[bucket].push(s);
    }
  };
  proc(data.futures?.bull||[],'bull');
  proc(data.futures?.bear||[],'bear');
  proc(data.options?.bull||[],'bull');
  proc(data.options?.bear||[],'bear');
  return {stockFut,stockOpt,indexAll};
}

/* ── CSV Upload ── */
function detectFileIndex(filename){
  const f=filename.toLowerCase();
  if(f.includes('rise-in-oi')&&f.includes('rise-in-price'))  return 0;
  if(f.includes('rise-in-oi')&&f.includes('slide-in-price')) return 1;
  if(f.includes('slide-in-oi')&&f.includes('rise-in-price')) return 2;
  if(f.includes('slide-in-oi')&&f.includes('slide-in-price'))return 3;
  return -1;
}
async function handleFiles(files){
  if(!files||!files.length) return;
  setBadge('','Parsing');
  const allRows=[]; let assigned=[false,false,false,false];
  for(const file of files){
    let idx=detectFileIndex(file.name);
    if(idx===-1) idx=assigned.indexOf(false);
    if(idx===-1) continue;
    assigned[idx]=true;
    try{ allRows.push(...parseCSVText(await file.text(),idx)); }
    catch(e){ console.error(file.name,e); }
  }
  if(!allRows.length){ setBadge('err','Error'); alert('No data found in uploaded files.'); return; }
  _data=processRows(allRows);
  rerender();
  setBadge('live','📂 CSV');
  setScanTime(new Date().toISOString());
  document.getElementById('file-input').value='';
}

/* ── staleConfig ── */
function staleConfig(gapMins){
  if(gapMins <  20) return { icon:'●', label:'Fresh',   cls:'stale-fresh', opacity:1.0  };
  if(gapMins <  40) return { icon:'◐', label:'Watch',   cls:'stale-watch', opacity:0.85 };

}

/* ── Chip overflow ── */
function setupChipOverflow(container){
  const wraps=(container||document).querySelectorAll('.chip-overflow-wrap');
  wraps.forEach(wrap=>{
    const uid=wrap.dataset.uid;
    const moreBtn=document.getElementById(uid+'_more');
    const chips=[...wrap.querySelectorAll('[data-chip]')];
    if(!chips.length||!moreBtn) return;
    chips.forEach(c=>{ c.style.display=''; });
    moreBtn.style.display='none';
    const wrapWidth=wrap.offsetWidth-60;
    let usedWidth=0, hiddenCount=0;
    const gap=5;
    chips.forEach(chip=>{
      const cw=chip.offsetWidth+gap;
      if(usedWidth+cw<=wrapWidth){ usedWidth+=cw; chip.style.display=''; }
      else{ chip.style.display='none'; hiddenCount++; }
    });
    if(hiddenCount>0){ moreBtn.style.display=''; moreBtn.textContent='▼ +'+hiddenCount; }
  });
}
function chipShowAll(uid,e){
  if(e) e.stopPropagation();
  const wrap=document.querySelector(`.chip-overflow-wrap[data-uid="${uid}"]`);
  const moreBtn=document.getElementById(uid+'_more');
  if(!wrap) return;
  wrap.classList.add('expanded');
  [...wrap.querySelectorAll('[data-chip]')].forEach(c=>{ c.style.display=''; });
  if(moreBtn) moreBtn.style.display='none';
}

/* ── buildDvDetail ── */
function buildDvDetail(r){
  const comparisons=r.comparisons||[];
  if(!comparisons.length)
    return '<div style="padding:12px;color:var(--ink3);font-size:.75rem;text-align:center;">No comparison data</div>';

  const strongMap={};
  (r.strong||[]).forEach(s=>{
    const [sym,dir,signalType,type,strength,cnt]=s.split(':');
    strongMap[sym]={dir,signalType,type,strength:strength||'STRONG',confirmCount:parseInt(cnt)||2};
  });

  const isDark = document.documentElement.getAttribute('data-theme') !== 'white';
  const C = isDark ? {
    wrap:'#f5f5f5', wrapText:'#1a1a1a',
    stickyBg:'#e8e8e8', stickyText:'#666',
    cardIdx:'#eaf4f4', cardIdxBorder:'#b0d8db', cardIdxLeft:'#00d0d8', cardIdxHdr:'#d4f0f2', cardIdxHdrText:'#007a8a',
    cardFut:'#ede8f5', cardFutBorder:'#c4b0e8', cardFutLeft:'#a855f7', cardFutHdr:'#e4d8f8', cardFutHdrText:'#7e22ce',
    cardOpt:'#faf6e8', cardOptBorder:'#e0cc88', cardOptLeft:'#cc9900', cardOptHdr:'#f5efc0', cardOptHdrText:'#1a1a1a', cardOptExpiry:'#8a6000',
    ceHdr:'#efefef', ceHdrText:'#888', tableText:'#1a1a1a', tableBg:'#f5f5f5', thBg:'#e0e0e0', thText:'#555', tdBorder:'#ddd',
  } : {
    wrap:'#111c2e', wrapText:'#e8f0fa',
    stickyBg:'#0f1928', stickyText:'#7a9ab8',
    cardIdx:'#0d2030', cardIdxBorder:'#1a3848', cardIdxLeft:'#00d0d8', cardIdxHdr:'#0a1828', cardIdxHdrText:'#00d0d8',
    cardFut:'#160d2e', cardFutBorder:'#2a1848', cardFutLeft:'#a855f7', cardFutHdr:'#0f0a28', cardFutHdrText:'#c084fc',
    cardOpt:'#1a1500', cardOptBorder:'#3a3000', cardOptLeft:'#cc9900', cardOptHdr:'#141000', cardOptHdrText:'#e8f0fa', cardOptExpiry:'#ffc233',
    ceHdr:'#1a2540', ceHdrText:'#7a9ab8', tableText:'#e8f0fa', tableBg:'#111c2e', thBg:'#0f1928', thText:'#7a9ab8', tdBorder:'#2a3a58',
  };

  const scanMs=r.savedAt?new Date(r.savedAt).getTime():Date.now();
  const MON_FE={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function expiryMsFE(s){
    if(!s) return Infinity;
    const [d,m,y]=s.split('-');
    return new Date(+y,MON_FE[m],+d).getTime();
  }

  const allRows=[];
  comparisons.forEach((comp,cidx)=>{
    const signals=comp.signals||[];
    if(!signals.length) return;
    let gapMins=(cidx+1)*10;
    if(comp.baseTimeStr){
      try{
        const [hhmm,ap]=comp.baseTimeStr.split(' ');
        let [hh,mm]=hhmm.split(':').map(Number);
        if(ap==='PM'&&hh!==12) hh+=12;
        if(ap==='AM'&&hh===12) hh=0;
        const baseMs=new Date(new Date(scanMs).toDateString()+' '+hh+':'+mm).getTime();
        gapMins=Math.round((scanMs-baseMs)/60000);
        if(gapMins<0) gapMins=0;
      } catch(e){ gapMins=(cidx+1)*10; }
    }
    signals.forEach(s=>{
      const parts=s.split('|');
      const sym=parts[0],type=parts[1],signalType=parts[2];
      const ltpChngPct=parseFloat(parts[3])||0;
      const oiChngPct=parseFloat(parts[4])||0;
      const ltp=parseFloat(parts[5])||0;
      const strike=parseFloat(parts[6])||0;
      const expiry=parts[7]||'';
      const underlying=parseFloat(parts[8])||0;
      const dir=parts[9]||'BULL';
      allRows.push({sym,type,signalType,ltpChngPct,oiChngPct,ltp,strike,dir,expiry,underlying,baseTimeStr:comp.baseTimeStr,gapMins});
    });
  });

  if(!allRows.length)
    return '<div style="padding:12px;color:var(--ink3);font-size:.75rem;text-align:center;">No signals</div>';

  const nearestExp={};
  for(const row of allRows){
    const key=row.sym+'|'+row.type;
    if(!nearestExp[key]||expiryMsFE(row.expiry)<expiryMsFE(nearestExp[key]))
      nearestExp[key]=row.expiry;
  }

  const ATM_INTERVALS={'NIFTY':50,'BANKNIFTY':100,'FINNIFTY':50};
  const ATM_RANGE=5;
  const groupMap={};
  for(const row of allRows){
    const key=row.sym+'|'+row.type;
    if(row.expiry&&row.expiry!==nearestExp[key]) continue;
    const interval=ATM_INTERVALS[row.sym];
    if(interval&&row.strike&&row.underlying){
      if(Math.abs(row.strike-row.underlying)>interval*ATM_RANGE) continue;
    }
    const gkey=row.sym+'|'+row.strike+'|'+row.type+'|'+row.dir;
    if(!groupMap[gkey]){
      groupMap[gkey]={sym:row.sym,type:row.type,strike:row.strike,signalType:row.signalType,expiry:row.expiry,dir:row.dir,ltpChngPct:row.ltpChngPct,oiChngPct:row.oiChngPct,ltp:row.ltp,seenAt:new Set()};
    }
    if(row.baseTimeStr) groupMap[gkey].seenAt.add(row.baseTimeStr);
  }

  const grouped=Object.values(groupMap);
  if(!grouped.length)
    return '<div style="padding:12px;color:var(--ink3);font-size:.75rem;text-align:center;">No signals after filter</div>';

  const idxOpt=[], stockFut=[], stockOpt=[];
  for(const p of grouped){
    if(INDEX_SYMS.has(p.sym)) idxOpt.push(p);
    else if(p.type==='FUT') stockFut.push(p);
    else stockOpt.push(p);
  }

  function makeSeenChips(p){
    const isBull=p.dir==='BULL';
    return [...p.seenAt].sort().map(t=>`<span style="font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:4px;background:${isBull?'rgba(46,220,138,.15)':'rgba(255,77,106,.15)'};color:${isBull?'var(--bull)':'var(--bear)'};border:1px solid ${isBull?'var(--bull-bd)':'var(--bear-bd)'};white-space:nowrap;">&#10003; ${t}</span>`).join('');
  }
  function makeStrengthBadge(sym){
    const sInfo=strongMap[sym];
    if(!sInfo) return '';
    return sInfo.strength==='CAUTION'?`<span class="dv-caution-badge">&#9888;&#65039; CAUTION</span>`:`<span class="dv-strong-badge">&#128293; STRONG</span>`;
  }
  function seenBadge(p){
    const n=p.seenAt.size;
    const c=n>=3?'#ffd666':n>=2?'#00d0d8':'var(--ink3)';
    const bg=n>=3?'#4a3800':n>=2?'rgba(0,208,216,.12)':'var(--bg2)';
    return `<span style="font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:4px;background:${bg};color:${c};border:1px solid ${c};white-space:nowrap;margin-right:4px;">${n}x</span>`;
  }
  function makeOptRows(optRows,optType,sym){
    if(!optRows.length) return '';
    optRows.sort((a,b)=>b.seenAt.size-a.seenAt.size||Math.abs(b.ltpChngPct)-Math.abs(a.ltpChngPct));
    const typeCls=optType==='CE'?'type-ce':'type-pe';
    const expiry=optRows[0]?.expiry||'';
    let h=`<div style="padding:5px 12px;border-bottom:1px solid ${C.tdBorder};background:${C.ceHdr};cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;" onclick="(function(el){var t=el.nextElementSibling;var open=t.style.display!=='none';t.style.display=open?'none':'';el.querySelector('.dv-toggle-icon').textContent=open?'▶':'▼';})(this)">
      <span class="${typeCls}">${optType}</span>
      <span style="font-size:.6rem;color:${C.ceHdrText};">${optRows.length} signals</span>
      ${expiry?`<span style="font-size:.6rem;color:${C.cardOptExpiry};font-family:'JetBrains Mono',monospace;">${expiry}</span>`:''}
      <span class="dv-toggle-icon" style="font-size:.6rem;color:${C.ceHdrText};margin-left:auto;">▶</span>
    </div>
    <div style="display:none;background:${C.tableBg};">
    <div class="dv-flat-table-wrap" style="margin:0;">
    <table style="table-layout:fixed;width:100%;min-width:620px;background:${C.tableBg};">
      <colgroup><col style="width:80px;"><col style="width:100px;"><col style="width:155px;"><col style="width:80px;"><col style="width:80px;"><col style="width:80px;"><col></colgroup>
      <thead><tr style="background:${C.thBg};">
        <th style="color:${C.thText};">Strike</th><th style="color:${C.thText};">Expiry</th><th style="color:${C.thText};">Signal</th>
        <th style="text-align:right;color:${C.thText};">LTP%</th><th style="text-align:right;color:${C.thText};">OI%</th>
        <th style="text-align:right;color:${C.thText};">LTP</th><th style="color:${C.thText};">Seen In</th>
      </tr></thead><tbody>`;
    for(const p of optRows){
      const isBull=p.dir==='BULL';
      const pCls=p.ltpChngPct>=0?'bull-c':'bear-c';
      const oiCls=p.oiChngPct>=0?'bull-c':'bear-c';
      h+=`<tr style="background:${C.tableBg};">
        <td style="font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--gold);border-color:${C.tdBorder};">${p.strike||'&mdash;'}</td>
        <td style="font-size:.65rem;color:${C.tableText};font-family:'JetBrains Mono',monospace;border-color:${C.tdBorder};">${p.expiry||'&mdash;'}</td>
        <td style="border-color:${C.tdBorder};"><span class="pill ${isBull?'bull':'bear'}" style="font-size:.6rem;">${p.signalType}</span></td>
        <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:.72rem;border-color:${C.tdBorder};"><span class="${pCls}">${p.ltpChngPct>=0?'+':''}${p.ltpChngPct.toFixed(2)}%</span></td>
        <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:.72rem;border-color:${C.tdBorder};"><span class="${oiCls}">${p.oiChngPct>=0?'+':''}${p.oiChngPct.toFixed(2)}%</span></td>
        <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:${C.tableText};border-color:${C.tdBorder};">&#8377;${p.ltp.toFixed(2)}</td>
        <td style="white-space:nowrap;border-color:${C.tdBorder};">${seenBadge(p)}<span style="display:inline-flex;gap:3px;flex-wrap:wrap;">${makeSeenChips(p)}</span>${makeStrengthBadge(p.sym)}</td>
      </tr>`;
    }
    return h+'</tbody></table></div></div>';
  }

  function buildIndexSection(rows){
    if(!rows.length) return '';
    const bySym={};
    for(const p of rows){ if(!bySym[p.sym]) bySym[p.sym]={CE:[],PE:[]}; if(p.type==='CE') bySym[p.sym].CE.push(p); else if(p.type==='PE') bySym[p.sym].PE.push(p); }
    let h=`<div class="dv-sec-label" style="margin:10px 0 6px;">&#128202; Index Options</div>`;
    for(const [sym,{CE,PE}] of Object.entries(bySym)){
      h+=`<div style="background:${C.cardIdx};border:1px solid ${C.cardIdxBorder};border-left:4px solid ${C.cardIdxLeft};border-radius:8px;margin-bottom:8px;overflow:hidden;">
        <div style="padding:8px 12px;font-weight:700;font-size:.85rem;border-bottom:1px solid ${C.cardIdxBorder};color:${C.cardIdxHdrText};background:${C.cardIdxHdr};letter-spacing:.5px;">&#128208; ${sym}</div>
        ${makeOptRows(CE,'CE',sym)}${makeOptRows(PE,'PE',sym)}
      </div>`;
    }
    return h;
  }

  function buildFutSection(rows){
    if(!rows.length) return '';
    rows.sort((a,b)=>b.seenAt.size-a.seenAt.size||Math.abs(b.ltpChngPct)-Math.abs(a.ltpChngPct));
    let h=`<div class="dv-sec-label" style="margin:10px 0 6px;color:${C.ceHdrText};">&#128200; Stock Futures</div>
    <div style="background:${C.cardFut};border:1px solid ${C.cardFutBorder};border-left:4px solid ${C.cardFutLeft};border-radius:8px;margin-bottom:8px;overflow:hidden;">
      <div style="padding:7px 12px;font-weight:700;font-size:.78rem;border-bottom:1px solid ${C.cardFutBorder};color:${C.cardFutHdrText};background:${C.cardFutHdr};cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;" onclick="(function(el){var t=el.nextElementSibling;var open=t.style.display!=='none';t.style.display=open?'none':'';el.querySelector('.dv-toggle-icon').textContent=open?'▶':'▼';})(this)">
        <span>&#9654; Futures</span>
        <span style="font-size:.6rem;color:${C.ceHdrText};">${rows.length} symbols</span>
        <span class="dv-toggle-icon" style="font-size:.6rem;color:${C.ceHdrText};margin-left:auto;">▶</span>
      </div>
      <div style="display:none;background:${C.tableBg};">
      <div class="dv-flat-table-wrap"><table style="table-layout:fixed;width:100%;min-width:600px;background:${C.tableBg};">
      <colgroup><col style="width:110px;"><col style="width:110px;"><col style="width:150px;"><col style="width:80px;"><col style="width:80px;"><col style="width:80px;"><col></colgroup>
      <thead><tr style="background:${C.thBg};">
        <th style="color:${C.thText};">Symbol</th><th style="color:${C.thText};">Expiry</th><th style="color:${C.thText};">Signal</th>
        <th style="text-align:right;color:${C.thText};">LTP%</th><th style="text-align:right;color:${C.thText};">OI%</th>
        <th style="text-align:right;color:${C.thText};">LTP</th><th style="color:${C.thText};">Seen In</th>
      </tr></thead><tbody>`;
    for(const p of rows){
      const isStrong=!!strongMap[p.sym];
      const isBull=p.dir==='BULL';
      const pCls=p.ltpChngPct>=0?'bull-c':'bear-c';
      const oiCls=p.oiChngPct>=0?'bull-c':'bear-c';
      h+=`<tr style="background:${C.tableBg};"><td style="font-weight:700;font-size:.75rem;white-space:nowrap;color:${C.tableText};border-color:${C.tdBorder};">${p.sym}${isStrong?'<span class="strong-fire"> &#128293;</span>':''}</td><td style="font-size:.65rem;color:var(--gold);font-family:'JetBrains Mono',monospace;border-color:${C.tdBorder};">${p.expiry||'&mdash;'}</td><td style="border-color:${C.tdBorder};"><span class="pill ${isBull?'bull':'bear'}" style="font-size:.6rem;">${p.signalType}</span></td><td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:.72rem;border-color:${C.tdBorder};"><span class="${pCls}">${p.ltpChngPct>=0?'+':''}${p.ltpChngPct.toFixed(2)}%</span></td><td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:.72rem;border-color:${C.tdBorder};"><span class="${oiCls}">${p.oiChngPct>=0?'+':''}${p.oiChngPct.toFixed(2)}%</span></td><td style="text-align:right;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:${C.tableText};border-color:${C.tdBorder};">&#8377;${p.ltp.toFixed(2)}</td><td style="white-space:nowrap;border-color:${C.tdBorder};">${seenBadge(p)}<span style="display:inline-flex;gap:3px;flex-wrap:wrap;">${makeSeenChips(p)}</span>${makeStrengthBadge(p.sym)}</td></tr>`;
    }
    return h+'</tbody></table></div></div></div>';
  }

  function buildStockOptSection(rows){
    if(!rows.length) return '';
    const bySym={};
    for(const p of rows){ if(!bySym[p.sym]) bySym[p.sym]={CE:[],PE:[]}; if(p.type==='CE') bySym[p.sym].CE.push(p); else if(p.type==='PE') bySym[p.sym].PE.push(p); }
    const symCount=Object.keys(bySym).length;
    let inner='';
    for(const [sym,{CE,PE}] of Object.entries(bySym)){
      const isStrong=!!strongMap[sym];
      const expiry=CE[0]?.expiry||PE[0]?.expiry||'';
      inner+=`<div style="background:${C.cardOpt};border:1px solid ${C.cardOptBorder};border-left:4px solid ${C.cardOptLeft};border-radius:8px;margin-bottom:8px;overflow:hidden;">
        <div class="dv-stock-opt-header" style="padding:7px 12px;font-weight:700;font-size:.78rem;border-bottom:1px solid ${C.cardOptBorder};color:${C.cardOptHdrText};background:${C.cardOptHdr};">
          ${sym}${isStrong?'<span class="strong-fire"> &#128293;</span>':''}${makeStrengthBadge(sym)}
          ${expiry?`<span style="font-size:.62rem;color:${C.cardOptExpiry};font-weight:500;margin-left:8px;font-family:'JetBrains Mono',monospace;">${expiry}</span>`:''}
        </div>
        ${makeOptRows(CE,'CE',sym)}${makeOptRows(PE,'PE',sym)}
      </div>`;
    }
    return `<div class="dv-sec-label" style="margin:10px 0 6px;">&#128203; Stock Options</div>
    <div style="background:${C.cardOpt};border:1px solid ${C.cardOptBorder};border-left:4px solid ${C.cardOptLeft};border-radius:8px;margin-bottom:8px;overflow:hidden;">
      <div style="padding:7px 12px;font-weight:700;font-size:.78rem;border-bottom:1px solid ${C.cardOptBorder};color:${C.cardOptHdrText};background:${C.cardOptHdr};cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;" onclick="(function(el){var t=el.nextElementSibling;var open=t.style.display!=='none';t.style.display=open?'none':'';el.querySelector('.dv-toggle-icon').textContent=open?'▶':'▼';})(this)">
        <span>&#9654; Stock Options</span>
        <span style="font-size:.6rem;color:${C.ceHdrText};">${symCount} symbols</span>
        <span class="dv-toggle-icon" style="font-size:.6rem;color:${C.ceHdrText};margin-left:auto;">▶</span>
      </div>
      <div style="display:none;background:${C.tableBg};padding:8px;">
        ${inner}
      </div>
    </div>`;
  }

  return `<div style="padding:0;background:${C.wrap};color:${C.wrapText};">
    <div style="position:sticky;top:0;z-index:10;background:${C.stickyBg};border-bottom:2px solid #a855f7;padding:7px 14px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:.75rem;font-weight:700;color:#a855f7;">🕐 ${r.timeStr12||''}</span>
      <span style="font-size:.65rem;color:${C.stickyText};">${r.savedAt?new Date(r.savedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):''}</span>
      <span style="font-size:.62rem;color:${C.stickyText};margin-left:4px;">· ${r.bullCount||0} Bull · ${r.bearCount||0} Bear</span>
    </div>
    <div style="padding:10px 12px;background:${C.wrap};">${buildIndexSection(idxOpt)}${buildFutSection(stockFut)}${buildStockOptSection(stockOpt)}</div>
  </div>`;
}

/* ── dvToggle ── */
function dvToggle(uid){
  const item=document.getElementById(uid);
  const det=document.getElementById(uid+'_det');
  const lbWrap=document.getElementById('dv-leaderboard');
  const isOpen=det.classList.contains('open');
  document.querySelectorAll('.dv-detail.open').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.dv-tl-item.expanded').forEach(el=>el.classList.remove('expanded'));
  document.querySelectorAll('.dv-tl-item.dimmed').forEach(el=>el.classList.remove('dimmed'));
  if(lbWrap) lbWrap.classList.remove('section-dimmed');
  if(!isOpen){
    det.classList.add('open');
    item.classList.add('expanded');
    document.querySelectorAll('.dv-tl-item').forEach(el=>{ if(el.id!==uid) el.classList.add('dimmed'); });
    if(lbWrap) lbWrap.classList.add('section-dimmed');
    setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
  }
}

/* ════════════════════════════════════════
   SNAPSHOT LIST + FETCH OLD
════════════════════════════════════════ */
async function loadSnapshotList(){
  try{
    const res  = await fetch(WORKER_OLD + 'list');
    const data = await res.json();
    const sel  = document.getElementById('snapshot-select');
    if(!data.ok || !data.snapshots || !data.snapshots.length){
      sel.innerHTML = '<option value="" disabled selected>-- No snapshots --</option>';
      return;
    }
    const sorted = data.snapshots.slice().sort((a,b) => b.localeCompare(a));
    sel.innerHTML = '<option value="" disabled selected>-- Select time --</option>' +
      sorted.map((t,i) => {
        const [hh,mm] = t.split(':').map(Number);
        const ap = hh>=12?'PM':'AM';
        const h  = hh%12||12;
        const label = `${h}:${String(mm).padStart(2,'0')} ${ap}`;
        return `<option value="${t}">${label}${i===0?' (Latest)':''}</option>`;
      }).join('');
  } catch(e){
    console.warn('Snapshot list load failed:', e.message);
  }
}

async function fetchOld(){
  const sel  = document.getElementById('snapshot-select');
  const time = sel.value;
  if(!time) return;
  const btn = document.getElementById('fetch-old-btn');
  btn.textContent = '...'; btn.style.pointerEvents = 'none';
  setBadge('', 'Loading...');
  try{
    const res  = await fetch(WORKER_OLD + 'get?time=' + encodeURIComponent(time));
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Fetch error');
    _data = processRows_fromWorker(data.payload);
    rerender();
    const [hh2,mm2] = time.split(':').map(Number);
    const ap2 = hh2>=12?'PM':'AM';
    const h2  = hh2%12||12;
    const label2 = `${h2}:${String(mm2).padStart(2,'0')} ${ap2}`;
    setBadge('live', '🕐 ' + label2);
    setScanTime(data.savedAt);
  } catch(e){
    setBadge('err', 'Error');
    alert('Fetch Old failed: ' + e.message);
  }
  btn.textContent = 'Fetch Old'; btn.style.pointerEvents = 'auto';
}

window.addEventListener('DOMContentLoaded', loadSnapshotList);
setInterval(loadSnapshotList, 5 * 60 * 1000);
</script>
