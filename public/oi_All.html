<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   THEMES
═══════════════════════════════════════ */
[data-theme="dark"] {
  --bg:         #0d0d0f;
  --bg2:        #111115;
  --bg3:        #18181e;
  --bg4:        #1e1e26;
  --bg5:        #242430;
  --border:     #232330;
  --border2:    #272740;
  --text:       #d8d8e8;
  --text2:      #60609a;
  --text3:      #30304a;
  --strike:     #c0c0d8;
  --ce:         #00ee7a;
  --ce-bar:     rgba(0,238,122,.44);
  --ce-edge:    #00ee7a;
  --ce-dim:     rgba(0,238,122,.17);
  --ce-txt:     #00ee7a;
  --pe:         #ff2550;
  --pe-bar:     rgba(255,37,80,.42);
  --pe-edge:    #ff2550;
  --pe-dim:     rgba(255,37,80,.16);
  --pe-txt:     #ff2550;
  --atm-bg:     rgba(255,165,0,.11);
  --atm-line:   rgba(255,165,0,.68);
  --atm-txt:    #ffa000;
  --acc:        #4f8bff;
  --cline:      #272740;
}
[data-theme="darkblue"] {
  --bg:         #010d22;
  --bg2:        #041330;
  --bg3:        #081a3c;
  --bg4:        #0d2248;
  --bg5:        #122855;
  --border:     #152040;
  --border2:    #1c2f55;
  --text:       #b8d0f5;
  --text2:      #3a5890;
  --text3:      #1a2845;
  --strike:     #90b8e0;
  --ce:         #00f5ff;
  --ce-bar:     rgba(0,240,255,.32);
  --ce-edge:    #00f5ff;
  --ce-dim:     rgba(0,245,255,.12);
  --ce-txt:     #00f5ff;
  --pe:         #ff3888;
  --pe-bar:     rgba(255,55,140,.30);
  --pe-edge:    #ff3888;
  --pe-dim:     rgba(255,55,140,.12);
  --pe-txt:     #ff3888;
  --atm-bg:     rgba(80,180,255,.07);
  --atm-line:   rgba(80,180,255,.45);
  --atm-txt:    #50b4ff;
  --acc:        #4d9eff;
  --cline:      #1c2f55;
}
[data-theme="light"] {
  --bg:         #f2f4fa;
  --bg2:        #ffffff;
  --bg3:        #ebedf5;
  --bg4:        #e0e3ee;
  --bg5:        #d5d8e8;
  --border:     #d0d4e8;
  --border2:    #b8bdd8;
  --text:       #151525;
  --text2:      #4a4a78;
  --text3:      #9898c0;
  --strike:     #202040;
  --ce:         #005528;
  --ce-bar:     rgba(0,120,50,.65);
  --ce-edge:    #005528;
  --ce-dim:     rgba(0,120,50,.25);
  --ce-txt:     #005528;
  --pe:         #990018;
  --pe-bar:     rgba(185,0,20,.65);
  --pe-edge:    #990018;
  --pe-dim:     rgba(185,0,20,.25);
  --pe-txt:     #990018;
  --atm-bg:     rgba(160,80,0,.13);
  --atm-line:   rgba(160,80,0,.65);
  --atm-txt:    #8a4800;
  --acc:        #2060e0;
  --cline:      #9090b8;
}

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
select, button, input { outline: none; font-family: inherit; }

/* ═══════════════════════════════════════
   LOADING
═══════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity .3s;
}
#loading.gone { opacity: 0; pointer-events: none; }
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text2);
}

/* ═══════════════════════════════════════
   TOPBAR  (matches screenshots exactly)
═══════════════════════════════════════ */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  gap: 6px; padding: 0 12px; height: 38px;
  flex-wrap: nowrap; overflow-x: auto;
}
#topbar::-webkit-scrollbar { height: 0; }

.nav-btn {
  width: 24px; height: 24px;
  background: var(--bg3); color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer;
  font-size: 14px; display: flex;
  align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.nav-btn:hover { color: var(--text); border-color: var(--acc); }

#sym-select {
  background: transparent; color: var(--text);
  border: none;
  font-size: 14px; font-weight: 600;
  cursor: pointer; min-width: 110px;
  padding: 0 6px;
}

.exp-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text2);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 6px;
  white-space: nowrap; flex-shrink: 0;
}

.tb-div { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.flex1 { flex: 1; }

/* Button groups */
.bg {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  background: var(--bg3);
  flex-shrink: 0;
}
.bg button {
  background: transparent;
  color: var(--text2);
  border: none;
  padding: 3px 9px;
  font-size: 11.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
}
.bg button:hover { color: var(--text); }
.bg button.on { background: var(--bg5); color: var(--text); }
.bg.ce button.on { color: var(--ce-txt); }
.bg.acc button.on { color: var(--acc); }

#from-time {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 7px;
  font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace;
  height: 26px; flex-shrink: 0;
}
#from-time:disabled { opacity: .3; cursor: not-allowed; }
#from-time::-webkit-calendar-picker-indicator { filter: invert(.5); cursor: pointer; }

.tv-btn {
  background: var(--bg3); color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 7px;
  height: 26px; cursor: pointer;
  font-size: 13px; display: flex;
  align-items: center; flex-shrink: 0;
  transition: all .12s;
}
.tv-btn:hover { color: var(--text); border-color: var(--acc); }

/* ═══════════════════════════════════════
   INFOBAR
═══════════════════════════════════════ */
#infobar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  gap: 0; padding: 0 12px; height: 32px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; overflow-x: auto;
  white-space: nowrap;
}
#infobar::-webkit-scrollbar { height: 0; }
.ii { display: flex; align-items: center; gap: 5px; padding: 0 10px; border-right: 1px solid var(--border); height: 100%; }
.ii:first-child { padding-left: 0; }
.il { color: var(--text3); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; }
.iv { color: var(--text); font-weight: 600; }
.iv.ce { color: var(--ce-txt); }
.iv.pe { color: var(--pe-txt); }
.iv.sp { color: var(--atm-txt); }
.iv.bull { color: var(--ce-txt); }
.iv.bear { color: var(--pe-txt); }
#scan-sel {
  background: transparent; color: var(--text2);
  border: none; font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
}

/* ═══════════════════════════════════════
   CHAIN HEADER
═══════════════════════════════════════ */
#chain-hdr {
  display: grid;
  grid-template-columns: 50px 1fr 72px 1fr 56px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  position: sticky; top: 70px; z-index: 50;
  height: 28px;
}
#chain-hdr > div {
  display: flex; align-items: center;
  padding: 0 8px;
  font-size: 9px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
}
.hce { color: var(--ce-txt); justify-content: flex-end; opacity: .7; }
.hst { color: var(--text3); justify-content: center; border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); }
.hpe { color: var(--pe-txt); opacity: .7; }
.hoi { color: var(--text3); justify-content: flex-end; opacity: .6; padding-right: 12px; }
.hchg { color: var(--text3); opacity: .6; padding-left: 12px; }

/* ═══════════════════════════════════════
   STRIKE GROUPS
   Each group = 2 rows (CE top, PE bottom)
   Cols: [OI-val | OI-bar | Strike | CHG-bar | CHG-val]
═══════════════════════════════════════ */
#chain-body { width: 100%; }

.sg {
  display: grid;
  grid-template-columns: 50px 1fr 72px 1fr 56px;
  grid-template-rows: 22px 22px;
  border-bottom: 1px solid var(--border);
  transition: background .08s;
}
.sg:hover { background: rgba(255,255,255,.018); }

/* ATM */
.sg.atm {
  background: var(--atm-bg) !important;
  border-top: 1px dashed var(--atm-line) !important;
  border-bottom: 1px dashed var(--atm-line) !important;
}

/* ── Strike cell: spans 2 rows ── */
.sc {
  grid-column: 3; grid-row: 1 / 3;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600;
  color: var(--strike);
  border-left: 1px solid var(--border2);
  border-right: 1px solid var(--border2);
  letter-spacing: -.3px;
  user-select: none;
  position: relative; z-index: 2;
}
.sg.atm .sc {
  color: var(--atm-txt);
  font-size: 12.5px;
}
.atm-star { font-size: 7px; vertical-align: super; margin-left: 1px; opacity: .8; }

/* ── OI Value (col 1) ── */
.v-oi {
  display: flex; align-items: center;
  justify-content: flex-end;
  padding: 0 6px 0 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 500;
  white-space: nowrap;
  position: relative; z-index: 2;
}
.v-ce { grid-column: 1; grid-row: 1; color: var(--ce-txt); }
.v-pe { grid-column: 1; grid-row: 2; color: var(--pe-txt); }

/* ── OI Bar (col 2): RIGHT-anchored, extends LEFT ── */
.b-oi {
  grid-column: 2;
  position: relative; overflow: hidden;
}
.b-ce { grid-row: 1; }
.b-pe { grid-row: 2; }

.oi-bar {
  position: absolute;
  right: 0; top: 3px; bottom: 3px;
  transition: width .45s cubic-bezier(.25,.46,.45,.94);
  border-radius: 1px 0 0 1px;
}
/* OI addition (chg ≥ 0) = solid/deep */
/* ALL OI bars solid - no hollow distinction */
.oi-add-ce, .oi-red-ce { background: var(--ce-bar); border-left: 2px solid var(--ce-edge); }
.oi-add-pe, .oi-red-pe { background: var(--pe-bar); border-left: 2px solid var(--pe-edge); }

/* Max OI brightness boost */
.sg.mx-ce .b-ce .oi-bar { filter: brightness(1.25); }
.sg.mx-pe .b-pe .oi-bar { filter: brightness(1.25); }

/* ── CHG Bar (col 4): CENTER-anchored ── */
.b-chg {
  grid-column: 4;
  position: relative; overflow: hidden;
}
.bc-ce { grid-row: 1; }
.bc-pe { grid-row: 2; }

/* center divider */
.b-chg::before {
  content: '';
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; background: var(--cline); z-index: 0;
}

.chg-bar {
  position: absolute;
  top: 3px; bottom: 3px;
  transition: width .45s cubic-bezier(.25,.46,.45,.94);
  z-index: 1;
  border-radius: 1px;
}
/* positive: right from center */
.chg-p-ce { left: 50%; background: var(--ce-bar); border-right: 2px solid var(--ce-edge); }
.chg-p-pe { left: 50%; background: var(--pe-bar); border-right: 2px solid var(--pe-edge); }
/* negative: left from center */
.chg-n-ce { right: 50%; background: var(--ce-dim); border-left: 2px solid var(--ce-edge); }
.chg-n-pe { right: 50%; background: var(--pe-dim); border-left: 2px solid var(--pe-edge); }

/* ── CHG Value (col 5) ── */
.v-chg {
  display: flex; align-items: center;
  justify-content: flex-start;
  padding: 0 4px 0 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  white-space: nowrap;
  position: relative; z-index: 2;
}
.vc-ce { grid-column: 5; grid-row: 1; }
.vc-pe { grid-column: 5; grid-row: 2; }
.cp { color: var(--ce-txt); }
.cn { color: var(--pe-txt); }
.cz { color: var(--text3); }

/* ═══════════════════════════════════════
   PCR VIEW
═══════════════════════════════════════ */
.pcr-sg {
  display: grid;
  grid-template-columns: 50px 1fr 72px 1fr 56px;
  grid-template-rows: 22px 22px;
  border-bottom: 1px solid var(--border);
  transition: background .08s;
}
.pcr-sg:hover { background: rgba(255,255,255,.018); }
.pcr-sg.atm { background: var(--atm-bg) !important; border-top: 1px dashed var(--atm-line) !important; border-bottom: 1px dashed var(--atm-line) !important; }
.pcr-track {
  position: relative; overflow: hidden;
}
.pcr-fill { position: absolute; top: 3px; bottom: 3px; border-radius: 1px; transition: width .4s; }

/* ═══════════════════════════════════════
   EMPTY / ERROR
═══════════════════════════════════════ */
.empty-msg {
  padding: 80px 20px; text-align: center;
  color: var(--text3); font-size: 12px; line-height: 2;
}
.err { color: var(--pe-txt) !important; }

/* ═══════════════════════════════════════
   TV MODAL
═══════════════════════════════════════ */
#tv-modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.75);
  align-items: center; justify-content: center;
}
#tv-modal.open { display: flex; }
#tv-inner {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
  width: 94vw; max-width: 1100px; height: 84vh;
  position: relative;
}
#tv-x {
  position: absolute; top: 8px; right: 10px; z-index: 10;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text2); cursor: pointer;
  width: 26px; height: 26px; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
#tv-frame { width: 100%; height: 100%; border: none; }

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media (max-width: 560px) {
  .sg, #chain-hdr, .pcr-sg {
    grid-template-columns: 36px 1fr 60px 1fr 44px;
  }
  .sc, .v-oi { font-size: 10px; }
  .v-chg { font-size: 9px; }
  #from-time { display: none; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <span id="load-msg">Connecting to R2…</span>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <button class="nav-btn" id="prev-sym">‹</button>
  <select id="sym-select"></select>
  <button class="nav-btn" id="next-sym">›</button>
  <span class="exp-badge" id="exp-tag">—</span>

  <div class="tb-div"></div>

  <div class="bg ce" id="side-grp">
    <button data-v="both" class="on">Both</button>
    <button data-v="call">Call</button>
    <button data-v="put">Put</button>
  </div>

  <div class="bg" id="view-grp">
    <button data-v="oi" class="on">OI</button>
    <button data-v="pcr">Strike PCR</button>
  </div>

  <div class="flex1"></div>

  <div class="bg acc" id="disp-grp">
    <button data-v="recent" class="on">Recent</button>
    <button data-v="avg">Avg Range</button>
    <button data-v="compare">Compare</button>
  </div>

  <input type="datetime-local" id="from-time" disabled>

  <button class="tv-btn" id="tv-btn" title="TradingView Chart">📈</button>

  <div class="bg" id="theme-grp">
    <button data-v="dark" class="on">Dark</button>
    <button data-v="darkblue">Blue</button>
    <button data-v="light">Light</button>
  </div>
</div>

<!-- INFOBAR -->
<div id="infobar">
  <div class="ii"><span class="il">Scan</span><select id="scan-sel"></select></div>
  <div class="ii"><span class="il">Spot</span><span class="iv sp" id="iv-spot">—</span></div>
  <div class="ii"><span class="il">CE OI</span><span class="iv ce" id="iv-ce">—</span></div>
  <div class="ii"><span class="il">PE OI</span><span class="iv pe" id="iv-pe">—</span></div>
  <div class="ii"><span class="il">PCR</span><span class="iv" id="iv-pcr">—</span></div>
  <div class="ii"><span class="il">Max CE @</span><span class="iv ce" id="iv-mce">—</span></div>
  <div class="ii"><span class="il">Max PE @</span><span class="iv pe" id="iv-mpe">—</span></div>
</div>

<!-- HEADER -->
<div id="chain-hdr">
  <div class="hce">OI</div>
  <div class="hoi">← Open Interest</div>
  <div class="hst">Strike</div>
  <div class="hchg">Change In OI →</div>
  <div class="hpe">Chg</div>
</div>

<!-- BODY -->
<div id="chain-body"></div>

<!-- TV MODAL -->
<div id="tv-modal">
  <div id="tv-inner">
    <button id="tv-x">✕</button>
    <iframe id="tv-frame" src="" frameborder="0"></iframe>
  </div>
</div>

<script>
'use strict';

const R2 = 'https://pub-0c01bff233cf4a249679f7d8fa4d6296.r2.dev/oi-scanner';
const TV_MAP = { NIFTY:'NSE:NIFTY', BANKNIFTY:'NSE:BANKNIFTY', FINNIFTY:'NSE:CNXFINANCE', SENSEX:'BSE:SENSEX' };
const tvSym = s => TV_MAP[s] || `NSE:${s}`;

let indexData = null, scanCache = {}, symList = [], symIdx = 0, curKey = null;
let dispMode = localStorage.getItem('oi_disp') || 'recent';
let sideMode = 'both', viewMode = 'oi';
let theme = localStorage.getItem('oi_theme') || 'dark';
const curSym = () => symList[symIdx] || null;

// ── FORMAT ──
function fmtOI(v) {
  v = Math.abs(+v) || 0;
  if (v >= 1e7) return (v/1e7).toFixed(2)+'Cr';
  if (v >= 1e5) return (v/1e5).toFixed(1)+'L';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(Math.round(v));
}
function fmtChg(v) {
  v = +v;
  if (!v) return {t:'—', c:'cz'};
  return {t:(v>0?'+':'-')+fmtOI(Math.abs(v)), c:v>0?'cp':'cn'};
}
function fmtStr(v) {
  v = +v;
  return v >= 1000 ? v.toLocaleString('en-IN') : String(v);
}
function barPct(v, mx) { return mx ? Math.min(100, Math.abs(+v) / mx * 100).toFixed(2) : 0; }

// ── FETCH ──
async function getJSON(u) {
  const r = await fetch(u + '?t=' + Date.now());
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function loadIndex() { indexData = await getJSON(`${R2}/index.json`); }
async function loadScan(d, h) {
  const k = `${d}|${h}`;
  if (!scanCache[k]) scanCache[k] = await getJSON(`${R2}/${d}/scan_${h}.json`);
  return scanCache[k];
}
async function scansInRange(fromDt) {
  if (!indexData) return [];
  const out = [];
  for (const date of [...indexData.dates].reverse())
    for (const h of (indexData.scans[date] || [])) {
      const dt = new Date(`${date}T${h.slice(0,2)}:${h.slice(2)}:00`);
      if (dt >= fromDt) { try { out.push(await loadScan(date, h)); } catch {} }
    }
  return out;
}

// ── SELECTORS ──
function buildScanSel() {
  const el = document.getElementById('scan-sel');
  el.innerHTML = '';
  if (!indexData) return;
  const all = [];
  for (const d of indexData.dates)
    for (const h of (indexData.scans[d] || [])) all.push({d,h});
  all.reverse();
  all.forEach(({d,h}) => {
    const o = document.createElement('option');
    o.value = `${d}|${h}`;
    o.textContent = `${d}  ${h.slice(0,2)}:${h.slice(2)}`;
    el.appendChild(o);
  });
  if (all.length) { curKey = `${all[0].d}|${all[0].h}`; el.value = curKey; }
}

function buildSymSel(scan) {
  symList = scan ? Object.keys(scan.symbols || {}) : [];
  const el = document.getElementById('sym-select');
  el.innerHTML = '';
  symList.forEach((s,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = s; el.appendChild(o);
  });
  const saved = localStorage.getItem('oi_sym');
  const si = symList.indexOf(saved);
  symIdx = si >= 0 ? si : 0;
  el.value = symIdx;
}

// ── COMPUTE ──
async function computeDisplay(sym, base) {
  if (dispMode === 'recent') return base.map(s => ({...s}));
  const fromVal = document.getElementById('from-time').value;
  if (!fromVal) return base.map(s => ({...s}));
  const fromDt = new Date(fromVal);
  let scans;
  try { scans = await scansInRange(fromDt); } catch { scans = []; }
  if (!scans.length) return base.map(s => ({...s}));

  const hist = {};
  scans.forEach(scan => {
    const sd = scan.symbols?.[sym]; if (!sd) return;
    sd.strikes.forEach(s => {
      if (!hist[s.strike]) hist[s.strike] = {ce_oi:[],pe_oi:[],ce_chg:[],pe_chg:[]};
      hist[s.strike].ce_oi.push(s.ce_oi||0);
      hist[s.strike].pe_oi.push(s.pe_oi||0);
      hist[s.strike].ce_chg.push(s.ce_chg||0);
      hist[s.strike].pe_chg.push(s.pe_chg||0);
    });
  });
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;

  return base.map(s => {
    const h = hist[s.strike];
    if (!h) return {...s, ce_chg:0, pe_chg:0, is_new:true};
    if (dispMode === 'avg') return {
      ...s,
      ce_oi: Math.round(avg(h.ce_oi)), pe_oi: Math.round(avg(h.pe_oi)),
      ce_chg: Math.round(avg(h.ce_chg)), pe_chg: Math.round(avg(h.pe_chg)),
    };
    return {...s, ce_chg: Math.round(s.ce_oi - avg(h.ce_oi)), pe_chg: Math.round(s.pe_oi - avg(h.pe_oi))};
  });
}

// ── RENDER ──
async function render() {
  if (!curKey || !symList.length) return;
  const [date, hhmm] = curKey.split('|');
  let scan;
  try { scan = await loadScan(date, hhmm); }
  catch(e) { showErr('Failed to load: ' + e.message); return; }

  const sym = curSym();
  const sd = scan?.symbols?.[sym];
  const body = document.getElementById('chain-body');

  if (!sd) {
    body.innerHTML = `<div class="empty-msg">No data for ${sym}</div>`;
    return;
  }

  document.getElementById('exp-tag').textContent = sd.expiry || '—';
  document.getElementById('iv-spot').textContent = sd.spot ? sd.spot.toFixed(2) : '—';

  const disp = await computeDisplay(sym, sd.strikes);

  const totCE = disp.reduce((a,r) => a+(r.ce_oi||0), 0);
  const totPE = disp.reduce((a,r) => a+(r.pe_oi||0), 0);
  const pcr   = totCE > 0 ? totPE/totCE : 0;

  document.getElementById('iv-ce').textContent = fmtOI(totCE);
  document.getElementById('iv-pe').textContent = fmtOI(totPE);
  document.getElementById('iv-pcr').textContent = totCE > 0 ? pcr.toFixed(2) : '—';
  document.getElementById('iv-pcr').className = 'iv ' + (totCE > 0 ? (pcr >= 1 ? 'bull' : 'bear') : '');

  let maxCE = 0, maxPE = 0, maxCES = '—', maxPES = '—';
  disp.forEach(r => {
    if ((r.ce_oi||0) > maxCE) { maxCE = r.ce_oi; maxCES = fmtStr(r.strike); }
    if ((r.pe_oi||0) > maxPE) { maxPE = r.pe_oi; maxPES = fmtStr(r.strike); }
  });
  document.getElementById('iv-mce').textContent = `${maxCES} (${fmtOI(maxCE)})`;
  document.getElementById('iv-mpe').textContent = `${maxPES} (${fmtOI(maxPE)})`;

  const maxOI  = Math.max(maxCE, maxPE, 1);
  const maxChg = Math.max(...disp.map(r => Math.max(Math.abs(r.ce_chg||0), Math.abs(r.pe_chg||0))), 1);

  const showCE = sideMode !== 'put';
  const showPE = sideMode !== 'call';

  // ── PCR VIEW ──
  if (viewMode === 'pcr') {
    body.innerHTML = disp.map(row => {
      const ce = row.ce_oi||0, pe = row.pe_oi||0, tot = ce+pe||1;
      const cePct = (ce/tot*100).toFixed(1), pePct = (pe/tot*100).toFixed(1);
      const pcr   = ce > 0 ? pe/ce : Infinity;
      const atm   = row.is_atm ? ' atm' : '';
      return `<div class="pcr-sg${atm}">
        <div class="v-oi v-ce">${showCE ? cePct+'%' : ''}</div>
        <div class="b-oi b-ce pcr-track">
          ${showCE ? `<div class="pcr-fill oi-add-ce" style="right:0;width:${cePct}%"></div>` : ''}
        </div>
        <div class="sc">${fmtStr(row.strike)}${row.is_atm?'<span class="atm-star">★</span>':''}</div>
        <div class="b-oi b-pe pcr-track">
          ${showPE ? `<div class="pcr-fill oi-add-pe" style="right:0;width:${pePct}%"></div>` : ''}
        </div>
        <div class="v-chg vc-pe ${(pcr<1?'cp':'cn')}">${showPE ? (isFinite(pcr)?pcr.toFixed(2):'∞') : ''}</div>
        <div class="b-chg bc-ce"></div><div class="v-chg vc-ce"></div>
        <div class="b-chg bc-pe"></div>
      </div>`;
    }).join('');
    scrollATM(); return;
  }

  // ── OI VIEW ──
  body.innerHTML = disp.map(row => {
    const ceOIPct  = barPct(row.ce_oi, maxOI);
    const peOIPct  = barPct(row.pe_oi, maxOI);
    const ceChgPct = barPct(row.ce_chg, maxChg);
    const peChgPct = barPct(row.pe_chg, maxChg);

    const ceOICls  = (row.ce_chg||0) >= 0 ? 'oi-add-ce' : 'oi-red-ce';
    const peOICls  = (row.pe_chg||0) >= 0 ? 'oi-add-pe' : 'oi-red-pe';
    const ceChgCls = (row.ce_chg||0) >= 0 ? 'chg-p-ce' : 'chg-n-ce';
    const peChgCls = (row.pe_chg||0) >= 0 ? 'chg-p-pe' : 'chg-n-pe';

    const cef = fmtChg(row.ce_chg);
    const pef = fmtChg(row.pe_chg);

    const mce = (row.ce_oi||0) === maxCE ? ' mx-ce' : '';
    const mpe = (row.pe_oi||0) === maxPE ? ' mx-pe' : '';
    const atm = row.is_atm ? ' atm' : '';

    return `<div class="sg${atm}${mce}${mpe}">

      <div class="v-oi v-ce">${showCE ? fmtOI(row.ce_oi) : ''}</div>
      <div class="b-oi b-ce">
        ${showCE ? `<div class="oi-bar ${ceOICls}" style="width:${ceOIPct}%"></div>` : ''}
      </div>

      <div class="sc">${fmtStr(row.strike)}${row.is_atm?'<span class="atm-star">★</span>':''}</div>

      <div class="b-chg bc-ce">
        ${showCE ? `<div class="chg-bar ${ceChgCls}" style="width:${ceChgPct}%"></div>` : ''}
      </div>
      <div class="v-chg vc-ce ${cef.c}">${showCE ? cef.t : ''}</div>

      <div class="v-oi v-pe">${showPE ? fmtOI(row.pe_oi) : ''}</div>
      <div class="b-oi b-pe">
        ${showPE ? `<div class="oi-bar ${peOICls}" style="width:${peOIPct}%"></div>` : ''}
      </div>

      <div class="b-chg bc-pe">
        ${showPE ? `<div class="chg-bar ${peChgCls}" style="width:${peChgPct}%"></div>` : ''}
      </div>
      <div class="v-chg vc-pe ${pef.c}">${showPE ? pef.t : ''}</div>

    </div>`;
  }).join('');

  scrollATM();
}

function scrollATM() {
  const a = document.querySelector('.sg.atm, .pcr-sg.atm');
  if (a) setTimeout(() => a.scrollIntoView({block:'center', behavior:'smooth'}), 100);
}
function setMsg(m) {
  document.getElementById('load-msg').textContent = m;
  document.getElementById('loading').classList.remove('gone');
}
function hideLoad() { document.getElementById('loading').classList.add('gone'); }
function showErr(m) {
  hideLoad();
  document.getElementById('chain-body').innerHTML = `<div class="empty-msg err">${m}</div>`;
}

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('oi_theme', t);
  document.querySelectorAll('#theme-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === t));
}

function wire() {
  const $ = id => document.getElementById(id);

  $('prev-sym').onclick = () => {
    if (!symList.length) return;
    symIdx = (symIdx - 1 + symList.length) % symList.length;
    $('sym-select').value = symIdx;
    localStorage.setItem('oi_sym', curSym()); render();
  };
  $('next-sym').onclick = () => {
    if (!symList.length) return;
    symIdx = (symIdx + 1) % symList.length;
    $('sym-select').value = symIdx;
    localStorage.setItem('oi_sym', curSym()); render();
  };
  $('sym-select').onchange = e => {
    symIdx = +e.target.value;
    localStorage.setItem('oi_sym', curSym()); render();
  };
  $('scan-sel').onchange = e => { curKey = e.target.value; render(); };

  $('side-grp').onclick = e => {
    if (!e.target.dataset.v) return;
    sideMode = e.target.dataset.v;
    document.querySelectorAll('#side-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === sideMode));
    render();
  };
  $('view-grp').onclick = e => {
    if (!e.target.dataset.v) return;
    viewMode = e.target.dataset.v;
    document.querySelectorAll('#view-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === viewMode));
    render();
  };
  $('disp-grp').onclick = e => {
    if (!e.target.dataset.v) return;
    dispMode = e.target.dataset.v;
    localStorage.setItem('oi_disp', dispMode);
    document.querySelectorAll('#disp-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === dispMode));
    $('from-time').disabled = dispMode === 'recent';
    render();
  };
  $('from-time').onchange = () => { if (dispMode !== 'recent') render(); };
  $('theme-grp').onclick = e => { if (e.target.dataset.v) applyTheme(e.target.dataset.v); };

  $('tv-btn').onclick = () => {
    const s = curSym(); if (!s) return;
    $('tv-frame').src = `https://s.tradingview.com/widgetembed/?symbol=${tvSym(s)}&interval=5`
      + `&theme=${theme==='light'?'light':'dark'}&style=1&locale=en&withdateranges=1&hideideas=1`;
    $('tv-modal').classList.add('open');
  };
  $('tv-x').onclick = closeTv;
  $('tv-modal').onclick = e => { if (e.target === $('tv-modal')) closeTv(); };
  function closeTv() { $('tv-modal').classList.remove('open'); $('tv-frame').src = ''; }

  document.addEventListener('keydown', e => {
    const t = e.target.tagName;
    if (t === 'INPUT' || t === 'SELECT') return;
    if (e.key === 'ArrowLeft'  || e.key === 'a') $('prev-sym').click();
    if (e.key === 'ArrowRight' || e.key === 'd') $('next-sym').click();
    if (e.key === 'Escape') $('tv-modal').classList.remove('open');
  });
}

function autoRefresh() {
  setInterval(async () => {
    const n = new Date(), h = n.getHours(), m = n.getMinutes();
    if (!((h > 9 || (h === 9 && m >= 15)) && (h < 15 || (h === 15 && m <= 30)))) return;
    try {
      const prev = JSON.stringify(indexData?.scans);
      await loadIndex();
      if (JSON.stringify(indexData?.scans) !== prev) {
        buildScanSel();
        const sel = document.getElementById('scan-sel');
        if (sel.options.length) { curKey = sel.options[0].value; sel.value = curKey; render(); }
      }
    } catch {}
  }, 3 * 60 * 1000);
}

(async () => {
  applyTheme(theme);
  document.querySelectorAll('#disp-grp button').forEach(b => b.classList.toggle('on', b.dataset.v === dispMode));
  document.getElementById('from-time').disabled = dispMode === 'recent';

  const n = new Date(), pad = x => String(x).padStart(2,'0');
  document.getElementById('from-time').value =
    `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}T09:15`;

  wire();

  try {
    setMsg('Connecting to R2…');
    await loadIndex();
    buildScanSel();
    if (!curKey) { showErr('No scan data yet. Run OI_SCANNER.py first.'); return; }
    setMsg('Loading scan…');
    const [d, h] = curKey.split('|');
    const scan = await loadScan(d, h);
    buildSymSel(scan);
    hideLoad();
    render();
    autoRefresh();
  } catch(e) {
    showErr('Error: ' + e.message);
    console.error(e);
  }
})();
</script>
