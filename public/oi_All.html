<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OI Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════ THEMES ════════════════ */
[data-theme="dark"] {
  --bg:#0c0c11; --bg2:#131318; --bg3:#1a1a22; --bg4:#22222e;
  --border:#272730; --border2:#34344a;
  --text:#e2e2ee; --text2:#7070a0; --text3:#3a3a55;
  --ce:#00d27a; --ce2:rgba(0,210,122,.2); --ce3:rgba(0,210,122,.07);
  --pe:#ff4060; --pe2:rgba(255,64,96,.2); --pe3:rgba(255,64,96,.07);
  --atm:#ffaa00; --atm2:rgba(255,170,0,.09); --atm3:rgba(255,170,0,.45);
  --acc:#5b8def; --shadow:0 4px 24px rgba(0,0,0,.55);
}
[data-theme="darkblue"] {
  --bg:#010c1e; --bg2:#041228; --bg3:#071838; --bg4:#0d2045;
  --border:#132445; --border2:#1e3060;
  --text:#c8d8f5; --text2:#4a6890; --text3:#1e2e50;
  --ce:#00e5ff; --ce2:rgba(0,229,255,.16); --ce3:rgba(0,229,255,.06);
  --pe:#ff6baa; --pe2:rgba(255,107,170,.16); --pe3:rgba(255,107,170,.06);
  --atm:#64c8ff; --atm2:rgba(100,200,255,.08); --atm3:rgba(100,200,255,.45);
  --acc:#4d9eff; --shadow:0 4px 28px rgba(0,0,0,.7);
}
[data-theme="light"] {
  --bg:#eef0f7; --bg2:#fff; --bg3:#e8eaf2; --bg4:#dcdfe8;
  --border:#d0d3e2; --border2:#b8bcd0;
  --text:#18182e; --text2:#505278; --text3:#9496b8;
  --ce:#008f50; --ce2:rgba(0,143,80,.14); --ce3:rgba(0,143,80,.05);
  --pe:#cc1133; --pe2:rgba(204,17,51,.14); --pe3:rgba(204,17,51,.05);
  --atm:#c06000; --atm2:rgba(192,96,0,.07); --atm3:rgba(192,96,0,.4);
  --acc:#2563eb; --shadow:0 2px 12px rgba(0,0,0,.12);
}

/* ════════════════ BASE ════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:13px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
select,button,input{outline:none;font-family:inherit;}

/* ════════════════ LOADING ════════════════ */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .3s;}
#loading.gone{opacity:0;pointer-events:none;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#load-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);}

/* ════════════════ TOPBAR ════════════════ */
#topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:6px 12px;flex-wrap:wrap;}
.sym-nav{display:flex;align-items:center;gap:4px;}
.nav-btn{width:26px;height:26px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nav-btn:hover{color:var(--text);border-color:var(--acc);}
#sym-select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:14px;font-weight:600;cursor:pointer;min-width:120px;}
.exp-tag{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 7px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.tb-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.flex1{flex:1;}
.bgrp{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.bgrp button{background:transparent;color:var(--text2);border:none;padding:4px 10px;font-size:11.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
.bgrp button:hover{color:var(--text);}
.bgrp button.on{background:var(--bg4);color:var(--text);}
.bgrp.ce button.on{color:var(--ce);}
.bgrp.acc button.on{color:var(--acc);}
#from-time{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;height:26px;}
#from-time:disabled{opacity:.3;cursor:not-allowed;}
#from-time::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer;}
.icon-btn{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:3px 7px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;transition:all .15s;}
.icon-btn:hover{color:var(--text);border-color:var(--acc);}

/* ════════════════ INFOBAR ════════════════ */
#infobar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:5px 14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:11px;}
.ip{display:flex;align-items:center;gap:5px;}
.il{color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.08em;}
.iv{color:var(--text);font-weight:500;}
.iv.ce{color:var(--ce);} .iv.pe{color:var(--pe);} .iv.sp{color:var(--atm);}
.iv.pcr-bull{color:var(--ce);} .iv.pcr-bear{color:var(--pe);}
#scan-sel{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10.5px;font-family:'JetBrains Mono',monospace;cursor:pointer;}

/* ════════════════ CHAIN HEADER ════════════════ */
.chain-hdr{
  display:grid;
  grid-template-columns: 55px 1fr 78px 1fr 55px;
  background:var(--bg2);
  border-bottom:2px solid var(--border2);
  position:sticky; top:41px; z-index:50;
}
.chain-hdr>div{padding:5px 6px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}
.ch-r{text-align:right;} .ch-c{text-align:center;} .ch-l{text-align:left;}
.ch-ce{color:rgba(0,210,122,.5)!important;} .ch-pe{color:rgba(255,64,96,.5)!important;}
.ch-mid{border-left:1px solid var(--border);border-right:1px solid var(--border);}

/* ════════════════ STRIKE GROUP ════════════════ */
/*
  Layout per strike group (2 rows × 5 cols):
  col1=OI-val(CE/PE)  col2=OI-bar(CE/PE)  col3=Strike(span2)  col4=CHG-bar(CE/PE)  col5=CHG-val(CE/PE)
*/
.sg{
  display:grid;
  grid-template-columns: 55px 1fr 78px 1fr 55px;
  grid-template-rows: 18px 18px;
  border-bottom:1px solid var(--border);
  transition:background .08s;
}
.sg:hover{background:rgba(255,255,255,.022);}
.sg.atm{
  background:var(--atm2)!important;
  border-top:1px dashed var(--atm3);
  border-bottom:1px dashed var(--atm3);
}

/* ── Strike cell: spans 2 rows ── */
.sc{
  grid-column:3; grid-row:1/3;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;
  color:var(--text);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  cursor:default; user-select:none;
  position:relative; z-index:1;
}
.sg.atm .sc{color:var(--atm);text-shadow:0 0 10px rgba(255,170,0,.4);}
.atm-star{font-size:7px;vertical-align:super;margin-left:2px;opacity:.7;}

/* ── OI Value cells ── */
.cv-oi{
  display:flex;align-items:center;justify-content:flex-end;
  padding:0 5px;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  position:relative;z-index:1;
}
.cv-ce{grid-column:1;grid-row:1;color:var(--ce);}
.cv-pe{grid-column:1;grid-row:2;color:var(--pe);}

/* ── OI Bar cells: bar anchored to RIGHT, extends LEFT ── */
.ob{position:relative;overflow:hidden;}
.ob-ce{grid-column:2;grid-row:1;}
.ob-pe{grid-column:2;grid-row:2;}

.oi-bar{
  position:absolute;
  right:0; top:3px; bottom:3px;
  transition:width .4s ease;
}
/* Deep = addition (chg ≥ 0) */
.oi-bar.c-add{background:var(--ce2);border-left:2px solid var(--ce);}
.oi-bar.p-add{background:var(--pe2);border-left:2px solid var(--pe);}
/* Light/hollow = reduction (chg < 0) */
.oi-bar.c-red{background:var(--ce3);border-left:1px dashed rgba(0,210,122,.4);}
.oi-bar.p-red{background:var(--pe3);border-left:1px dashed rgba(255,64,96,.4);}

/* max OI row glow */
.sg.mx-ce .ob-ce{filter:brightness(1.2);}
.sg.mx-pe .ob-pe{filter:brightness(1.2);}

/* ── CHG Bar cells: from CENTER, right=plus, left=minus ── */
.cb{position:relative;overflow:hidden;}
.cb-ce{grid-column:4;grid-row:1;}
.cb-pe{grid-column:4;grid-row:2;}

/* center line */
.cb::before{
  content:'';position:absolute;
  left:50%;top:0;bottom:0;width:1px;
  background:var(--border2);z-index:0;
}
.chg-bar{
  position:absolute;top:3px;bottom:3px;
  z-index:1;transition:width .4s ease;
}
/* plus: extends RIGHT from 50% */
.chg-bar.c-pos{left:50%;background:var(--ce2);border-right:2px solid var(--ce);}
.chg-bar.p-pos{left:50%;background:var(--pe2);border-right:2px solid var(--pe);}
/* minus: extends LEFT from 50% */
.chg-bar.c-neg{right:50%;background:var(--ce3);border-left:2px solid rgba(0,210,122,.5);}
.chg-bar.p-neg{right:50%;background:var(--pe3);border-left:2px solid rgba(255,64,96,.5);}

/* ── CHG Value cells ── */
.cv-chg{
  display:flex;align-items:center;justify-content:flex-start;
  padding:0 5px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  position:relative;z-index:1;
}
.cv-ce-c{grid-column:5;grid-row:1;}
.cv-pe-c{grid-column:5;grid-row:2;}
.clr-p{color:var(--ce);} .clr-n{color:var(--pe);} .clr-z{color:var(--text3);}

/* ════════════════ EMPTY / ERROR ════════════════ */
.empty-msg{padding:60px 20px;text-align:center;color:var(--text3);font-size:12px;}
.err-msg{color:var(--pe)!important;}

/* ════════════════ TV MODAL ════════════════ */
#tv-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);align-items:center;justify-content:center;}
#tv-modal.open{display:flex;}
#tv-inner{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;width:92vw;max-width:1100px;height:82vh;position:relative;box-shadow:var(--shadow);}
#tv-close-btn{position:absolute;top:8px;right:10px;z-index:10;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;width:26px;height:26px;font-size:13px;display:flex;align-items:center;justify-content:center;}
#tv-frame{width:100%;height:100%;border:none;}

/* ════════════════ MOBILE ════════════════ */
@media(max-width:580px){
  .sg,.chain-hdr{grid-template-columns:38px 1fr 64px 1fr 38px;}
  .sc{font-size:10px;}
  .cv-oi,.cv-chg{font-size:9px;padding:0 3px;}
  #from-time,.tb-sep{display:none;}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <span id="load-msg">Connecting to R2…</span>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="sym-nav">
    <button class="nav-btn" id="prev-sym">‹</button>
    <select id="sym-select"></select>
    <button class="nav-btn" id="next-sym">›</button>
    <span class="exp-tag" id="exp-tag">—</span>
  </div>
  <div class="tb-sep"></div>
  <div class="bgrp ce" id="side-grp">
    <button data-v="both" class="on">Both</button>
    <button data-v="call">Call</button>
    <button data-v="put">Put</button>
  </div>
  <div class="bgrp" id="view-grp">
    <button data-v="oi" class="on">OI</button>
    <button data-v="pcr">Strike PCR</button>
  </div>
  <div class="flex1"></div>
  <div class="bgrp acc" id="disp-grp">
    <button data-v="recent" class="on">Recent</button>
    <button data-v="avg">Avg Range</button>
    <button data-v="compare">Compare</button>
  </div>
  <input type="datetime-local" id="from-time" disabled>
  <button class="icon-btn" id="tv-btn" title="TradingView Chart">📈</button>
  <div class="bgrp" id="theme-grp">
    <button data-v="dark" class="on">Dark</button>
    <button data-v="darkblue">Blue</button>
    <button data-v="light">Light</button>
  </div>
</div>

<!-- INFOBAR -->
<div id="infobar">
  <div class="ip"><span class="il">Scan</span><select id="scan-sel"></select></div>
  <div class="ip"><span class="il">Spot</span><span class="iv sp" id="iv-spot">—</span></div>
  <div class="ip"><span class="il">CE OI</span><span class="iv ce" id="iv-ce">—</span></div>
  <div class="ip"><span class="il">PE OI</span><span class="iv pe" id="iv-pe">—</span></div>
  <div class="ip"><span class="il">PCR</span><span class="iv" id="iv-pcr">—</span></div>
  <div class="ip"><span class="il">Max CE @</span><span class="iv ce" id="iv-mce">—</span></div>
  <div class="ip"><span class="il">Max PE @</span><span class="iv pe" id="iv-mpe">—</span></div>
</div>

<!-- HEADER -->
<div class="chain-hdr">
  <div class="ch-r ch-ce">OI</div>
  <div class="ch-r ch-ce" style="padding-right:12px">← Open Interest</div>
  <div class="ch-c ch-mid">Strike</div>
  <div class="ch-l ch-pe" style="padding-left:12px">Change In OI →</div>
  <div class="ch-l ch-pe">Chg</div>
</div>

<!-- BODY -->
<div id="chain-body"></div>

<!-- TV MODAL -->
<div id="tv-modal">
  <div id="tv-inner">
    <button id="tv-close-btn">✕</button>
    <iframe id="tv-frame" src="" frameborder="0" allowtransparency="true"></iframe>
  </div>
</div>

<script>
'use strict';
const R2='https://pub-0c01bff233cf4a249679f7d8fa4d6296.r2.dev/oi-scanner';
const TV_MAP={NIFTY:'NSE:NIFTY',BANKNIFTY:'NSE:BANKNIFTY',FINNIFTY:'NSE:CNXFINANCE',SENSEX:'BSE:SENSEX'};
const tvSym=s=>TV_MAP[s]||`NSE:${s}`;

let indexData=null, scanCache={}, symList=[], symIdx=0, curKey=null;
let dispMode=localStorage.getItem('oi_disp')||'recent';
let sideMode='both', viewMode='oi';
let theme=localStorage.getItem('oi_theme')||'dark';
const curSym=()=>symList[symIdx]||null;

// ── FORMAT ──
function fmtOI(v){
  v=Math.abs(Number(v))||0;
  if(v>=1e7)return(v/1e7).toFixed(2)+'Cr';
  if(v>=1e5)return(v/1e5).toFixed(1)+'L';
  if(v>=1e3)return(v/1e3).toFixed(0)+'K';
  return String(Math.round(v));
}
function fmtChg(v){
  v=Number(v);
  if(!v)return{t:'—',c:'clr-z'};
  return{t:(v>0?'+':'-')+fmtOI(Math.abs(v)),c:v>0?'clr-p':'clr-n'};
}
function fmtStr(v){v=Number(v);return v>=1000?v.toLocaleString('en-IN'):String(v);}
function pct(v,mx){return mx?Math.min(100,Math.abs(Number(v))/mx*100).toFixed(2):0;}

// ── FETCH ──
async function getJSON(u){const r=await fetch(u+'?_='+Date.now());if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();}
async function loadIndex(){indexData=await getJSON(`${R2}/index.json`);}
async function loadScan(d,h){const k=`${d}|${h}`;if(!scanCache[k])scanCache[k]=await getJSON(`${R2}/${d}/scan_${h}.json`);return scanCache[k];}
async function scansInRange(fromDt){
  if(!indexData)return[];
  const out=[];
  for(const date of[...indexData.dates].reverse()){
    for(const hhmm of(indexData.scans[date]||[])){
      const dt=new Date(`${date}T${hhmm.slice(0,2)}:${hhmm.slice(2)}:00`);
      if(dt>=fromDt){try{out.push(await loadScan(date,hhmm));}catch{}}
    }
  }
  return out;
}

// ── SELECTORS ──
function buildScanSel(){
  const el=document.getElementById('scan-sel');el.innerHTML='';
  if(!indexData)return;
  const all=[];
  for(const d of indexData.dates)for(const h of(indexData.scans[d]||[]))all.push({d,h});
  all.reverse();
  all.forEach(({d,h})=>{const o=document.createElement('option');o.value=`${d}|${h}`;o.textContent=`${d}  ${h.slice(0,2)}:${h.slice(2)}`;el.appendChild(o);});
  if(all.length){curKey=`${all[0].d}|${all[0].h}`;el.value=curKey;}
}
function buildSymSel(scan){
  symList=scan?Object.keys(scan.symbols||[]):[];
  const el=document.getElementById('sym-select');el.innerHTML='';
  symList.forEach((s,i)=>{const o=document.createElement('option');o.value=i;o.textContent=s;el.appendChild(o);});
  const saved=localStorage.getItem('oi_sym');
  const si=symList.indexOf(saved);
  symIdx=si>=0?si:0;el.value=symIdx;
}

// ── COMPUTE ──
async function computeDisplay(sym,base){
  if(dispMode==='recent')return base.map(s=>({...s}));
  const fromVal=document.getElementById('from-time').value;
  if(!fromVal)return base.map(s=>({...s}));
  const fromDt=new Date(fromVal);
  let scans;try{scans=await scansInRange(fromDt);}catch{scans=[];}
  if(!scans.length)return base.map(s=>({...s}));
  const hist={};
  scans.forEach(scan=>{
    const sd=scan.symbols?.[sym];if(!sd)return;
    sd.strikes.forEach(s=>{
      if(!hist[s.strike])hist[s.strike]={ce_oi:[],pe_oi:[],ce_chg:[],pe_chg:[]};
      hist[s.strike].ce_oi.push(s.ce_oi||0);hist[s.strike].pe_oi.push(s.pe_oi||0);
      hist[s.strike].ce_chg.push(s.ce_chg||0);hist[s.strike].pe_chg.push(s.pe_chg||0);
    });
  });
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
  return base.map(s=>{
    const h=hist[s.strike];
    if(!h)return{...s,ce_chg:0,pe_chg:0,is_new:true};
    if(dispMode==='avg')return{...s,ce_oi:Math.round(avg(h.ce_oi)),pe_oi:Math.round(avg(h.pe_oi)),ce_chg:Math.round(avg(h.ce_chg)),pe_chg:Math.round(avg(h.pe_chg))};
    return{...s,ce_chg:Math.round(s.ce_oi-avg(h.ce_oi)),pe_chg:Math.round(s.pe_oi-avg(h.pe_oi))};
  });
}

// ── RENDER ──
async function render(){
  if(!curKey||!symList.length)return;
  const[date,hhmm]=curKey.split('|');
  let scan;try{scan=await loadScan(date,hhmm);}catch(e){showErr('Load failed: '+e.message);return;}
  const sym=curSym(), sd=scan?.symbols?.[sym];
  const body=document.getElementById('chain-body');
  if(!sd){body.innerHTML=`<div class="empty-msg">No data for ${sym}</div>`;return;}

  document.getElementById('exp-tag').textContent=sd.expiry||'—';
  document.getElementById('iv-spot').textContent=sd.spot?sd.spot.toFixed(2):'—';

  const disp=await computeDisplay(sym,sd.strikes);
  const totCE=disp.reduce((a,r)=>a+(r.ce_oi||0),0);
  const totPE=disp.reduce((a,r)=>a+(r.pe_oi||0),0);
  const pcr=totCE>0?totPE/totCE:0;
  document.getElementById('iv-ce').textContent=fmtOI(totCE);
  document.getElementById('iv-pe').textContent=fmtOI(totPE);
  document.getElementById('iv-pcr').textContent=totCE>0?pcr.toFixed(2):'—';
  document.getElementById('iv-pcr').className='iv '+(totCE>0?(pcr>=1?'pcr-bull':'pcr-bear'):'');

  let maxCE=0,maxPE=0,maxCES='—',maxPES='—';
  disp.forEach(r=>{if((r.ce_oi||0)>maxCE){maxCE=r.ce_oi;maxCES=fmtStr(r.strike);}if((r.pe_oi||0)>maxPE){maxPE=r.pe_oi;maxPES=fmtStr(r.strike);}});
  document.getElementById('iv-mce').textContent=`${maxCES} (${fmtOI(maxCE)})`;
  document.getElementById('iv-mpe').textContent=`${maxPES} (${fmtOI(maxPE)})`;

  const maxOI=Math.max(maxCE,maxPE,1);
  const maxChg=Math.max(...disp.map(r=>Math.max(Math.abs(r.ce_chg||0),Math.abs(r.pe_chg||0))),1);
  const showCE=sideMode!=='put', showPE=sideMode!=='call';

  // PCR VIEW
  if(viewMode==='pcr'){
    body.innerHTML=disp.map(row=>{
      const ce=row.ce_oi||0,pe=row.pe_oi||0,tot=ce+pe||1;
      const cePct=(ce/tot*100).toFixed(1),pePct=(pe/tot*100).toFixed(1);
      const pcr=ce>0?pe/ce:Infinity;
      const atm=row.is_atm?' atm':'';
      return`<div class="sg${atm}">
        <div class="cv-oi cv-ce">${showCE?cePct+'%':''}</div>
        <div class="ob ob-ce">${showCE?`<div class="oi-bar c-add" style="width:${cePct}%"></div>`:''}</div>
        <div class="sc">${fmtStr(row.strike)}${row.is_atm?'<span class="atm-star">★</span>':''}</div>
        <div class="ob ob-pe">${showPE?`<div class="oi-bar p-add" style="width:${pePct}%"></div>`:''}</div>
        <div class="cv-oi cv-pe" style="font-size:10px">${showPE?(isFinite(pcr)?pcr.toFixed(2):'∞'):''}</div>
        <div class="cb cb-ce"></div><div class="cb cb-pe"></div>
        <div class="cv-chg cv-ce-c"></div><div class="cv-chg cv-pe-c"></div>
      </div>`;
    }).join('');
    scrollATM();return;
  }

  // OI VIEW
  body.innerHTML=disp.map(row=>{
    const ceOIPct=pct(row.ce_oi,maxOI), peOIPct=pct(row.pe_oi,maxOI);
    const ceChgPct=pct(row.ce_chg,maxChg), peChgPct=pct(row.pe_chg,maxChg);
    const ceOICls=(row.ce_chg||0)>=0?'c-add':'c-red';
    const peOICls=(row.pe_chg||0)>=0?'p-add':'p-red';
    const ceChgCls=(row.ce_chg||0)>=0?'c-pos':'c-neg';
    const peChgCls=(row.pe_chg||0)>=0?'p-pos':'p-neg';
    const cef=fmtChg(row.ce_chg), pef=fmtChg(row.pe_chg);
    const mce=(row.ce_oi||0)===maxCE?' mx-ce':'', mpe=(row.pe_oi||0)===maxPE?' mx-pe':'';
    const atm=row.is_atm?' atm':'';

    return`<div class="sg${atm}${mce}${mpe}">
      <div class="cv-oi cv-ce">${showCE?fmtOI(row.ce_oi):''}</div>
      <div class="ob ob-ce">${showCE?`<div class="oi-bar ${ceOICls}" style="width:${ceOIPct}%"></div>`:''}</div>
      <div class="sc">${fmtStr(row.strike)}${row.is_atm?'<span class="atm-star">★</span>':''}</div>
      <div class="cb cb-ce">${showCE?`<div class="chg-bar ${ceChgCls}" style="width:${ceChgPct}%"></div>`:''}</div>
      <div class="cv-chg cv-ce-c ${cef.c}">${showCE?cef.t:''}</div>
      <div class="cv-oi cv-pe">${showPE?fmtOI(row.pe_oi):''}</div>
      <div class="ob ob-pe">${showPE?`<div class="oi-bar ${peOICls}" style="width:${peOIPct}%"></div>`:''}</div>
      <div class="cb cb-pe">${showPE?`<div class="chg-bar ${peChgCls}" style="width:${peChgPct}%"></div>`:''}</div>
      <div class="cv-chg cv-pe-c ${pef.c}">${showPE?pef.t:''}</div>
    </div>`;
  }).join('');
  scrollATM();
}

function scrollATM(){const a=document.querySelector('.sg.atm');if(a)setTimeout(()=>a.scrollIntoView({block:'center',behavior:'smooth'}),80);}
function setMsg(m){document.getElementById('load-msg').textContent=m;document.getElementById('loading').classList.remove('gone');}
function hideLoad(){document.getElementById('loading').classList.add('gone');}
function showErr(m){hideLoad();document.getElementById('chain-body').innerHTML=`<div class="empty-msg err-msg">${m}</div>`;}

function applyTheme(t){
  theme=t;document.documentElement.setAttribute('data-theme',t);localStorage.setItem('oi_theme',t);
  document.querySelectorAll('#theme-grp button').forEach(b=>b.classList.toggle('on',b.dataset.v===t));
}

function wire(){
  document.getElementById('prev-sym').onclick=()=>{if(!symList.length)return;symIdx=(symIdx-1+symList.length)%symList.length;document.getElementById('sym-select').value=symIdx;localStorage.setItem('oi_sym',curSym());render();};
  document.getElementById('next-sym').onclick=()=>{if(!symList.length)return;symIdx=(symIdx+1)%symList.length;document.getElementById('sym-select').value=symIdx;localStorage.setItem('oi_sym',curSym());render();};
  document.getElementById('sym-select').onchange=e=>{symIdx=+e.target.value;localStorage.setItem('oi_sym',curSym());render();};
  document.getElementById('scan-sel').onchange=e=>{curKey=e.target.value;render();};
  document.getElementById('side-grp').onclick=e=>{if(!e.target.dataset.v)return;sideMode=e.target.dataset.v;document.querySelectorAll('#side-grp button').forEach(b=>b.classList.toggle('on',b.dataset.v===sideMode));render();};
  document.getElementById('view-grp').onclick=e=>{if(!e.target.dataset.v)return;viewMode=e.target.dataset.v;document.querySelectorAll('#view-grp button').forEach(b=>b.classList.toggle('on',b.dataset.v===viewMode));render();};
  document.getElementById('disp-grp').onclick=e=>{
    if(!e.target.dataset.v)return;
    dispMode=e.target.dataset.v;localStorage.setItem('oi_disp',dispMode);
    document.querySelectorAll('#disp-grp button').forEach(b=>b.classList.toggle('on',b.dataset.v===dispMode));
    document.getElementById('from-time').disabled=dispMode==='recent';
    render();
  };
  document.getElementById('from-time').onchange=()=>{if(dispMode!=='recent')render();};
  document.getElementById('theme-grp').onclick=e=>{if(e.target.dataset.v)applyTheme(e.target.dataset.v);};
  document.getElementById('tv-btn').onclick=()=>{
    const s=curSym();if(!s)return;
    document.getElementById('tv-frame').src=`https://s.tradingview.com/widgetembed/?symbol=${tvSym(s)}&interval=5&theme=${theme==='light'?'light':'dark'}&style=1&locale=en&withdateranges=1&hideideas=1`;
    document.getElementById('tv-modal').classList.add('open');
  };
  document.getElementById('tv-close-btn').onclick=closeTv;
  document.getElementById('tv-modal').onclick=e=>{if(e.target===document.getElementById('tv-modal'))closeTv();};
  function closeTv(){document.getElementById('tv-modal').classList.remove('open');document.getElementById('tv-frame').src='';}
  document.addEventListener('keydown',e=>{
    const t=e.target.tagName;if(t==='INPUT'||t==='SELECT')return;
    if(e.key==='ArrowLeft'||e.key==='a')document.getElementById('prev-sym').click();
    if(e.key==='ArrowRight'||e.key==='d')document.getElementById('next-sym').click();
    if(e.key==='Escape')document.getElementById('tv-modal').classList.remove('open');
  });
}

function autoRefresh(){
  setInterval(async()=>{
    const n=new Date(),h=n.getHours(),m=n.getMinutes();
    if(!((h>9||(h===9&&m>=15))&&(h<15||(h===15&&m<=30))))return;
    try{
      const prev=JSON.stringify(indexData?.scans);await loadIndex();
      if(JSON.stringify(indexData?.scans)!==prev){
        buildScanSel();
        const sel=document.getElementById('scan-sel');
        if(sel.options.length){curKey=sel.options[0].value;sel.value=curKey;render();}
      }
    }catch{}
  },3*60*1000);
}

(async()=>{
  applyTheme(theme);
  document.querySelectorAll('#disp-grp button').forEach(b=>b.classList.toggle('on',b.dataset.v===dispMode));
  document.getElementById('from-time').disabled=dispMode==='recent';
  const n=new Date(),pad=x=>String(x).padStart(2,'0');
  document.getElementById('from-time').value=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}T09:15`;
  wire();
  try{
    setMsg('Connecting to R2…');await loadIndex();buildScanSel();
    if(!curKey){showErr('No scan data yet. Run OI_SCANNER.py first.');return;}
    setMsg('Loading scan…');
    const[d,h]=curKey.split('|');const scan=await loadScan(d,h);
    buildSymSel(scan);hideLoad();render();autoRefresh();
  }catch(e){showErr('Error: '+e.message);console.error(e);}
})();
</script>
</body>
</html>
