<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 SENSEX Options Radar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg: #f8fafc;
    --bg2: #ffffff;
    --bg3: #f1f5f9;
    --border: #e2e8f0;
    --border2: #cbd5e1;
    --blue: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --yellow: #d97706;
    --text: #0f172a;
    --muted: #64748b;
    --glass: rgba(255, 255, 255, 0.85);
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(37,99,235,0.06) 0%, transparent 70%); pointer-events:none; }

  /* HEADER */
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px;
    background:var(--glass); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); backdrop-filter:blur(16px);
    position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; font-size:1.1rem; font-weight:700; letter-spacing:.5px; }
  .logo span { color:var(--blue); }
  .live-badge { background:rgba(22,163,74,0.1); border:1px solid rgba(22,163,74,0.25);
    color:var(--green); padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600;
    animation: pulse-green 2s infinite; }
  @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:.5} }
  .header-right { display:flex; align-items:center; gap:14px; }
  #clock { font-family:'JetBrains Mono'; font-size:.85rem; color:var(--muted); font-weight:500; }
  #market-status { padding:4px 12px; border-radius:20px; font-size:.75rem; font-weight:600; }
  .status-open  { background:rgba(22,163,74,0.1); border:1px solid rgba(22,163,74,0.25); color:var(--green); }
  .status-closed{ background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.25); color:var(--red); }
  #refresh-btn  { background:var(--bg2); border:1px solid var(--border); color:var(--blue);
    padding:5px 14px; border-radius:8px; font-size:.78rem; font-weight:500; cursor:pointer; transition:.2s; box-shadow:var(--shadow-sm); }
  #refresh-btn:hover { background:var(--bg3); border-color:var(--border2); }
  #last-updated { font-size:.72rem; color:var(--muted); }

  /* METRICS BAR */
  .metrics-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:1px; background:var(--border); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); z-index:90; position:relative; }
  .metric { background:var(--bg2); padding:12px 18px; text-align:center; }
  .metric-label { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; font-weight:600; }
  .metric-value { font-size:1.15rem; font-weight:700; font-family:'JetBrains Mono'; }
  .metric-sub   { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .bullish { color:var(--green); } .bearish { color:var(--red); } .neutral { color:var(--yellow); }

  /* MAIN LAYOUT */
  .main { display:flex; flex-direction:column; height:calc(100vh - 120px); }
  @media(max-width:900px){ .main{ height:auto; } .signals-panel{ flex-direction:column; } .analytics-grid{ width:100%; border-left:none; border-top:1px solid var(--border); } }

  /* OPTION CHAIN */
  .chain-panel { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; background:var(--bg2); }
  .panel-header { padding:12px 18px; background:var(--bg3); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .panel-title { font-size:.85rem; font-weight:600; display:flex; align-items:center; gap:8px; color:var(--text); }
  .expiry-toggle { display:flex; gap:6px; }
  .exp-btn { padding:4px 12px; border-radius:6px; font-size:.73rem; font-weight:500; cursor:pointer; border:1px solid var(--border);
    background:var(--bg2); color:var(--muted); transition:.2s; box-shadow:var(--shadow-sm); }
  .exp-btn.active { background:rgba(37,99,235,0.08); border-color:var(--blue); color:var(--blue); box-shadow:none; }

  .chain-table-wrap { overflow-y:auto; flex:1; }
  table { width:100%; border-collapse:collapse; font-size:.78rem; }
  thead th { position:sticky; top:0; background:var(--bg3); padding:10px 6px; text-align:center;
    font-size:.68rem; text-transform:uppercase; font-weight:600; letter-spacing:.6px; color:var(--muted);
    border-bottom:1px solid var(--border); box-shadow:0 1px 0 var(--border); z-index:10; }
  tbody tr { border-bottom:1px solid rgba(15,23,42,0.04); transition:.15s; }
  tbody tr:hover { background:rgba(15,23,42,0.02); }
  tbody tr.atm { background:rgba(37,99,235,0.04); box-shadow:inset 0 0 0 1px rgba(37,99,235,0.2); }
  tbody tr.atm td { font-weight:600; color:var(--text); }
  td { padding:8px 6px; text-align:center; font-family:'JetBrains Mono'; font-size:.76rem; }
  td.call-side { color:#1e40af; }
  td.put-side  { color:#991b1b; }
  td.strike    { color:var(--text); font-weight:600; background:rgba(15,23,42,0.02);
    border-left:1px solid var(--border); border-right:1px solid var(--border); }
  .oi-bar { height:4px; border-radius:2px; margin-top:3px; }
  .oi-call { background:linear-gradient(90deg,transparent,rgba(37,99,235,0.4)); }
  .oi-put  { background:linear-gradient(90deg,rgba(220,38,38,0.4),transparent); }

  /* SIGNALS PANEL (AT TOP) */
  .signals-panel { display:flex; flex-direction:row; background:var(--bg); border-bottom:1px solid var(--border); flex-shrink:0; }
  .signals-header { padding:16px 24px; border-right:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; background:var(--bg3); width:180px; flex-shrink:0; }
  .signals-title { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; color:var(--text); margin-bottom:8px; }
  .signals-list  { flex:1; padding:16px; display:flex; justify-content:center; align-items:center; overflow-x:auto; }
  
  .signal-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    padding:12px 24px; position:relative; overflow:hidden; animation: slide-in .5s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow:var(--shadow-sm); transition:transform .3s, box-shadow .3s; width:100%; max-width:650px; display:flex; justify-content:space-between; align-items:center; }
  .signal-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
  @keyframes slide-in { from{opacity:0;transform:translateY(10px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
  .signal-card.bullish { border-left:6px solid var(--green); border-top:1px solid var(--border); }
  .signal-card.bearish { border-left:6px solid var(--red); border-top:1px solid var(--border); }
  
  .sig-left { display:flex; flex-direction:column; gap:6px; }
  .sig-time   { font-family:'JetBrains Mono'; font-size:0.85rem; color:var(--muted); font-weight:600; }
  .sig-type   { font-size:0.85rem; font-weight:800; padding:4px 12px; border-radius:6px; letter-spacing:0.5px; text-transform:uppercase; width:fit-content; }
  .bullish .sig-type { background:rgba(22,163,74,0.1); color:var(--green); }
  .bearish .sig-type { background:rgba(220,38,38,0.1); color:var(--red); }
  
  .sig-mid { display:flex; flex-direction:column; align-items:center; justify-content:center; border-left:1px solid var(--border); border-right:1px solid var(--border); padding:0 24px; }
  .sig-strike { font-weight:800; font-family:'JetBrains Mono'; font-size:2rem; color:var(--text); letter-spacing:-1px; }
  .sig-opt    { font-size:0.9rem; padding:2px 8px; border-radius:4px; background:rgba(37,99,235,0.1); color:var(--blue); font-weight:700; margin-left:8px; }
  
  .sig-right { display:flex; gap:16px; }
  .sig-stat   { background:var(--bg3); padding:8px 16px; border-radius:8px; border:1px solid var(--border); text-align:center; min-width:90px; }
  .sig-label  { color:var(--muted); font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; display:block; }
  .sig-val    { font-family:'JetBrains Mono'; font-size:1.1rem; font-weight:700; color:var(--text); }
  .no-signals { text-align:center; color:var(--muted); padding:20px; font-size:0.9rem; font-weight:500; }

  /* ANALYTICS MINI */
  .analytics-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:16px; background:var(--bg2); border-left:1px solid var(--border); width:320px; flex-shrink:0; }
  .ana-card { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
  .ana-label{ font-size:.66rem; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; font-weight:600; }
  .ana-val  { font-size:1.05rem; font-weight:700; font-family:'JetBrains Mono'; margin-top:4px; }

  .ltp-up   { color: #16a34a !important; font-weight:600; }
  .ltp-down { color: #dc2626 !important; font-weight:600; }
  @keyframes flash-up   { 0%{background:rgba(22,163,74,0.15)} 100%{background:transparent} }
  @keyframes flash-down { 0%{background:rgba(220,38,38,0.15)} 100%{background:transparent} }
  .flash-up   { animation: flash-up   0.8s ease; }
  .flash-down { animation: flash-down 0.8s ease; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; } 
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); }

  /* LOADING */
  .loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:12px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--blue);
    border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<header>
  <div class="logo">📡 <span>SENSEX</span> Options Radar</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div id="market-status" class="status-closed">MARKET CLOSED</div>
    <button id="refresh-btn" onclick="fetchData()">↻ Refresh</button>
  </div>
</header>

<div class="metrics-bar" id="metrics-bar">
  <div class="metric"><div class="metric-label">Weekly PCR</div><div class="metric-value neutral" id="m-wpcr">--</div><div class="metric-sub" id="m-wpcr-s">Neutral</div></div>
  <div class="metric"><div class="metric-label">Monthly PCR</div><div class="metric-value neutral" id="m-mpcr">--</div><div class="metric-sub" id="m-mpcr-s">Neutral</div></div>
  <div class="metric"><div class="metric-label">Max Pain (W)</div><div class="metric-value" id="m-pain" style="color:var(--yellow)">--</div><div class="metric-sub">Weekly</div></div>
  <div class="metric"><div class="metric-label">Support S1</div><div class="metric-value bullish" id="m-s1">--</div><div class="metric-sub">Max Put OI</div></div>
  <div class="metric"><div class="metric-label">Resistance R1</div><div class="metric-value bearish" id="m-r1">--</div><div class="metric-sub">Max Call OI</div></div>
  <div class="metric"><div class="metric-label">Weekly Expiry</div><div class="metric-value" id="m-wexp" style="color:var(--blue);font-size:.85rem">--</div></div>
  <div class="metric"><div class="metric-label">Last Updated</div><div class="metric-value" id="m-updated" style="color:var(--muted);font-size:.75rem;font-family:'JetBrains Mono'">--</div></div>
</div>

<div class="main">
  <!-- SIGNALS (AT TOP) -->
  <div class="signals-panel">
    <div class="signals-header">
      <div class="signals-title">🔔 Live Signals</div>
      <span class="live-badge" style="width:fit-content;">LIVE</span>
    </div>
    <div class="signals-list" id="signals-list">
      <div class="loading" style="height:auto; padding:20px;"><div class="spinner" style="width:24px;height:24px;"></div><span style="color:var(--muted);font-size:.85rem;margin-top:8px;">Waiting for signals...</span></div>
    </div>
    <div class="analytics-grid" id="analytics-grid"></div>
  </div>

  <!-- OPTION CHAIN (BELOW) -->
  <div class="chain-panel">
    <div class="panel-header">
      <div class="panel-title">📊 Option Chain</div>
      <div class="expiry-toggle">
        <button class="exp-btn active" id="btn-weekly"  onclick="showChain('weekly')">Weekly</button>
        <button class="exp-btn"        id="btn-monthly" onclick="showChain('monthly')">Monthly</button>
      </div>
    </div>
    <div class="chain-table-wrap" id="chain-table-wrap">
      <div class="loading"><div class="spinner"></div><span style="color:var(--muted);font-size:.85rem">Loading option chain...</span></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const R2_URL = "https://pub-beab7a6397a7478c853251902952970e.r2.dev/signals/sensex_option_signals.json";
const REFRESH_MS = 60000; // 1 minute
// ────────────────────────────────────────────────────────────────

let state = { data: null, activeChain: 'weekly', seenSignals: new Set(), prevLtp: {} };

// Clock
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN',{hour12:false,timeZone:'Asia/Kolkata'});
}, 1000);

async function fetchData() {
  try {
    const res = await fetch(R2_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.data = await res.json();
    renderAll();
  } catch(e) {
    console.error('Fetch error:', e);
    document.getElementById('m-updated').textContent = 'Fetch error';
  }
}

function renderAll() {
  const d = state.data;
  if (!d) return;

  // Market status
  const ms = document.getElementById('market-status');
  ms.textContent = d.market_status || 'UNKNOWN';
  ms.className = d.market_status === 'OPEN' ? 'status-open' : 'status-closed';

  // Metrics
  const wa = d.analytics?.weekly || {};
  const ma = d.analytics?.monthly || {};
  const wpcr = wa.pcr_oi || 0;
  const mpcr = ma.pcr_oi || 0;
  const pcrClass = (v) => v > 1.25 ? 'bullish' : v < 0.70 ? 'bearish' : 'neutral';
  const pcrLabel = (v) => v > 1.25 ? '🟢 Bullish' : v < 0.70 ? '🔴 Bearish' : '⚡ Neutral';

  setMetric('m-wpcr', wpcr.toFixed(2), pcrClass(wpcr));
  document.getElementById('m-wpcr-s').textContent = pcrLabel(wpcr);
  setMetric('m-mpcr', mpcr.toFixed(2), pcrClass(mpcr));
  document.getElementById('m-mpcr-s').textContent = pcrLabel(mpcr);
  setMetric('m-pain', numFmt(wa.max_pain), 'neutral');
  setMetric('m-s1',   numFmt(wa.support_s1), 'bullish');
  setMetric('m-r1',   numFmt(wa.resistance_r1), 'bearish');
  document.getElementById('m-wexp').textContent = d.weekly_expiry || '--';
  document.getElementById('m-updated').textContent = (d.last_updated||'').slice(11,19);

  // Analytics cards
  renderAnalytics(wa, ma);

  // Chain
  renderChain(state.activeChain);

  // Signals
  renderSignals(d.signals || []);
}

function setMetric(id, val, cls) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'metric-value ' + cls;
}

function numFmt(v) { return v ? Number(v).toLocaleString('en-IN') : '--'; }

function renderAnalytics(wa, ma) {
  const g = document.getElementById('analytics-grid');
  const row = (label,val,cls) => `<div class="ana-card"><div class="ana-label">${label}</div><div class="ana-val ${cls}">${val}</div></div>`;
  g.innerHTML =
    row('W Max Pain', numFmt(wa.max_pain), 'neutral') +
    row('M Max Pain', numFmt(ma.max_pain), 'neutral') +
    row('W Vol PCR',  (wa.pcr_vol||0).toFixed(2), (wa.pcr_vol||0)>1?'bullish':'bearish') +
    row('M Vol PCR',  (ma.pcr_vol||0).toFixed(2), (ma.pcr_vol||0)>1?'bullish':'bearish');
}

function showChain(type) {
  state.activeChain = type;
  document.getElementById('btn-weekly').className  = 'exp-btn' + (type==='weekly'?' active':'');
  document.getElementById('btn-monthly').className = 'exp-btn' + (type==='monthly'?' active':'');
  renderChain(type);
}

function renderChain(type) {
  const wrap = document.getElementById('chain-table-wrap');
  const chains = state.data?.option_chains || {};
  const rows = chains[type] || [];

  if (!rows.length) {
    wrap.innerHTML = '<div class="loading"><span style="color:var(--muted);font-size:.85rem">No data for this expiry</span></div>';
    return;
  }

  // Find ATM (middle strike index)
  const strikes = rows.map(r=>r.strike);
  const mid = strikes[Math.floor(strikes.length/2)];
  const maxCallOI = Math.max(...rows.map(r=>r.call_oi));
  const maxPutOI  = Math.max(...rows.map(r=>r.put_oi));

  // Render centered around ATM ±15 strikes
  const atmIdx = rows.findIndex(r=>r.strike===mid) || Math.floor(rows.length/2);
  const start = Math.max(0, atmIdx-18);
  const end   = Math.min(rows.length, atmIdx+19);
  const visible = rows.slice(start, end);

  let html = `<table>
    <thead><tr>
      <th title="Delta (Hover for Gamma, Theta, Vega)">C Delta</th><th>C IV</th><th>Call OI</th><th>Call Vol</th><th>Call LTP</th>
      <th style="min-width:80px">STRIKE</th>
      <th>Put LTP</th><th>Put Vol</th><th>Put OI</th><th>P IV</th><th title="Delta (Hover for Gamma, Theta, Vega)">P Delta</th>
    </tr></thead><tbody>`;

  for (const r of visible) {
    const isAtm = r.strike === mid;
    const callBar = Math.round((r.call_oi/maxCallOI)*60);
    const putBar  = Math.round((r.put_oi/maxPutOI)*60);

    // LTP color comparison
    const cKey = type + '_c_' + r.strike;
    const pKey = type + '_p_' + r.strike;
    const prevCallLtp = state.prevLtp[cKey];
    const prevPutLtp  = state.prevLtp[pKey];
    const callCls = prevCallLtp == null ? 'call-side' : r.call_ltp > prevCallLtp ? 'call-side ltp-up flash-up' : r.call_ltp < prevCallLtp ? 'call-side ltp-down flash-down' : 'call-side';
    const putCls  = prevPutLtp  == null ? 'put-side'  : r.put_ltp  > prevPutLtp  ? 'put-side ltp-up flash-up'   : r.put_ltp  < prevPutLtp  ? 'put-side ltp-down flash-down'  : 'put-side';
    state.prevLtp[cKey] = r.call_ltp;
    state.prevLtp[pKey] = r.put_ltp;

    html += `<tr class="${isAtm?'atm':''}">
      <td class="call-side" style="color:var(--muted)" title="Gamma: ${r.call_gamma}&#10;Theta: ${r.call_theta}&#10;Vega: ${r.call_vega}">${r.call_delta?.toFixed(2) || '0.00'}</td>
      <td class="call-side" style="color:var(--muted)">${r.call_iv?.toFixed(1) || '0.0'}%</td>
      <td class="call-side"><div>${numFmt(r.call_oi)}</div><div class="oi-bar oi-call" style="width:${callBar}%"></div></td>
      <td class="call-side">${numFmt(r.call_vol)}</td>
      <td class="${callCls}">${r.call_ltp.toFixed(2)}</td>
      <td class="strike">${numFmt(r.strike)}${isAtm?' ◆':''}</td>
      <td class="${putCls}">${r.put_ltp.toFixed(2)}</td>
      <td class="put-side">${numFmt(r.put_vol)}</td>
      <td class="put-side"><div>${numFmt(r.put_oi)}</div><div class="oi-bar oi-put" style="width:${putBar}%"></div></td>
      <td class="put-side" style="color:var(--muted)">${r.put_iv?.toFixed(1) || '0.0'}%</td>
      <td class="put-side" style="color:var(--muted)" title="Gamma: ${r.put_gamma}&#10;Theta: ${r.put_theta}&#10;Vega: ${r.put_vega}">${r.put_delta?.toFixed(2) || '0.00'}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderSignals(signals) {
  const list = document.getElementById('signals-list');
  if (!signals || !signals.length) {
    list.innerHTML = '<div class="no-signals">⏳ Waiting for high-accuracy setup...<br><span style="font-size:0.8rem; margin-top:8px; display:inline-block">Scanning ATM ±3 strikes</span></div>';
    return;
  }

  const sig = signals[0];
  const isNew = !state.seenSignals.has(sig.timestamp+sig.strike+sig.option_type);
  const cls   = sig.sentiment === 'BULLISH' ? 'bullish' : 'bearish';
  const emoji = sig.sentiment === 'BULLISH' ? '🟢' : '🔴';
  const oiChg = sig.oi_change > 0 ? `+${numFmt(sig.oi_change)}` : numFmt(sig.oi_change);
  
  const isStrong = sig.signal_type.includes('STRONG');
  const strengthColor = isStrong ? (sig.sentiment === 'BULLISH' ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
  const strengthBg = isStrong ? (sig.sentiment === 'BULLISH' ? 'rgba(22,163,74,0.1)' : 'rgba(220,38,38,0.1)') : 'var(--bg3)';
  const strengthStyle = `padding:4px 8px; border-radius:6px; background:${strengthBg}; color:${strengthColor}; font-weight:800; font-size:0.8rem; display:inline-block; margin-bottom:4px; border:1px solid ${isStrong ? strengthColor : 'var(--border)'};`;
  
  const html = `<div class="signal-card ${cls}${isNew?' new':''}">
    <div class="sig-left">
      <span class="sig-type">${emoji} ${sig.sentiment}</span>
      <span class="sig-time">${sig.timestamp} <span style="font-size:0.75rem; color:var(--muted); margin-left:4px;">${sig.expiry}</span></span>
    </div>
    <div class="sig-mid">
      <div style="${strengthStyle}">${sig.signal_type}</div>
      <div style="display:flex; align-items:center;">
        <span class="sig-strike">${numFmt(sig.strike)}</span>
        <span class="sig-opt">${sig.option_type}</span>
      </div>
    </div>
    <div class="sig-right">
      <div class="sig-stat">
        <span class="sig-label">OI Change</span>
        <span class="sig-val">${oiChg}</span>
      </div>
      <div class="sig-stat">
        <span class="sig-label">LTP</span>
        <span class="sig-val">${sig.ltp}</span>
      </div>
    </div>
  </div>`;
  
  state.seenSignals.add(sig.timestamp+sig.strike+sig.option_type);
  list.innerHTML = html;
}

// Auto-refresh
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
