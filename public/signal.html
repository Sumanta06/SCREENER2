function render() {
  const main = document.getElementById('main-content');
  let contentHtml = "";
  
  for(let sym in dashboardData) {
    const d = dashboardData[sym];
    
    let rows = "";
    if(d.signals.length > 0) {
        for(let s of d.signals) {
            let color = s.direction==="BUY" ? "#22c55e" : "#ef4444";
            let arrow = s.direction==="BUY" ? "▲ BUY" : "▼ SELL";
            let side  = s.direction==="BUY" ? "CE" : "PE";
            let resHtml = "";
            let pnlHtml = `<span style="color:#64748b">—</span>`;
            
            if(s.result==="WIN") resHtml = `<span style="color:#22c55e;font-weight:900">✅ WIN (${s.pts > 0 ? '+'+s.pts : s.pts}pts)</span>`;
            else if(s.result==="FAIL") resHtml = `<span style="color:#ef4444;font-weight:900">❌ FAIL (${s.pts > 0 ? '+'+s.pts : s.pts}pts)</span>`;
            else resHtml = `<span style="color:#eab308;font-weight:900">⏳ PENDING</span>`;
            
            if(s.opt_pnl_rs !== undefined) {
                let pcolor = s.opt_pnl_rs > 0 ? "#22c55e" : "#ef4444";
                let sign   = s.opt_pnl_rs > 0 ? "+" : "";
                pnlHtml = `<div style="color:${pcolor};font-weight:900">₹${sign}${s.opt_pnl_rs.toLocaleString('en-IN')}</div>
                           <div style="font-size:10px;color:${pcolor}">(${sign}${s.opt_pnl_pts}pts)</div>`;
            }
            
            rows += `
            <tr>
              <td style="font-weight:900">${s.time}</td>
              <td style="color:${color};font-weight:900">${arrow}</td>
              <td>${s.spot.toLocaleString('en-IN')}</td>
              <td>${s.strike}</td>
              <td><span style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-size:10px;border:1px solid #e2e8f0;color:${side==="CE"?"#22c55e":"#ef4444"}">${side}</span></td>
              <td>${s.ce_ltp || s.pe_ltp || '-'}</td>
              <td>${s.opt_exit_ltp || '-'}</td>
              <td>${resHtml}</td>
              <td>${pnlHtml}</td>
              <td style="font-size:10px;color:#64748b">${s.reason}</td>
            </tr>`;
        }
    } else {
        rows = `<tr><td colspan="10" style="text-align:center;padding:30px;color:#64748b">No signals generated today</td></tr>`;
    }
    let chgColor = (d.last_spot - d.first_spot) >= 0 ? "#22c55e" : "#ef4444";
    let chgSign = (d.last_spot - d.first_spot) >= 0 ? "+" : "";
    let chgPts = (d.last_spot - d.first_spot).toFixed(2);
    let chgPct = d.first_spot ? ((d.last_spot - d.first_spot)/d.first_spot*100).toFixed(2) : "0.00";
    
    let buyCount = d.signals.filter(s=>s.direction==="BUY").length;
    let sellCount = d.signals.filter(s=>s.direction==="SELL").length;
    
    contentHtml += `
    <div class="symbol-card" id="card-${sym}">
      <div class="symbol-header">${sym} Overview</div>
      <div class="stats">
        <div class="stat"><div class="lbl">Last Spot</div><div class="val" style="color:#0284c7">${d.last_spot.toLocaleString('en-IN')}</div></div>
        <div class="stat"><div class="lbl">Day Change</div><div class="val" style="color:${chgColor}">${chgSign}${chgPts} (${chgSign}${chgPct}%)</div></div>
        <div class="stat"><div class="lbl">Buy Signals</div><div class="val" style="color:#22c55e">${buyCount}</div></div>
        <div class="stat"><div class="lbl">Sell Signals</div><div class="val" style="color:#ef4444">${sellCount}</div></div>
        <div class="stat"><div class="lbl">Total Signals</div><div class="val">${d.signals.length}</div></div>
      </div>
      <div class="chart-wrap"><canvas id="chart-${sym}"></canvas></div>
      <div class="section-title">SIGNAL LOG</div>
      <div class="table-container">
        <table>
          <thead>
            <tr><th>Time</th><th>Signal</th><th>Spot</th><th>Strike</th><th>Side</th><th>Entry LTP</th><th>Exit LTP</th><th>Result</th><th>Option P&L</th><th>Reason</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }
  main.innerHTML = contentHtml;
  
  for(let sym in dashboardData) { renderChart(sym, dashboardData[sym]); }
}

function renderChart(sym, d) {
    const ctx = document.getElementById('chart-'+sym).getContext('2d');
    const buyPts = d.signals.filter(s=>s.direction==="BUY").map(s=>({x: s.time, y: s.spot, strike: s.strike, reason: s.reason}));
    const sellPts = d.signals.filter(s=>s.direction==="SELL").map(s=>({x: s.time, y: s.spot, strike: s.strike, reason: s.reason}));
    
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: d.labels,
        datasets: [
          { label: sym + ' Spot', data: d.prices, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.08)', borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: 0.3, fill: true, order: 3 },
          { label: 'BUY Signal', data: buyPts, backgroundColor: '#22c55e', borderColor: '#16a34a', borderWidth: 2, pointRadius: 10, pointStyle: 'triangle', pointHoverRadius: 14, showLine: false, order: 1,
            tooltip: { callbacks: { label: (ctx) => { const p = buyPts[ctx.dataIndex]; return [`▲ BUY @ ${p.y.toLocaleString('en-IN')}`, `Strike: ${p.strike}`, p.reason]; } } } },
          { label: 'SELL Signal', data: sellPts, backgroundColor: '#ef4444', borderColor: '#dc2626', borderWidth: 2, pointRadius: 10, pointStyle: 'triangle', rotation: 180, pointHoverRadius: 14, showLine: false, order: 2,
            tooltip: { callbacks: { label: (ctx) => { const p = sellPts[ctx.dataIndex]; return [`▼ SELL @ ${p.y.toLocaleString('en-IN')}`, `Strike: ${p.strike}`, p.reason]; } } } }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#475569', font: { size: 11, weight: 'bold' }, padding: 20 } },
          tooltip: { backgroundColor: '#ffffff', titleColor: '#0f172a', bodyColor: '#475569', borderColor: '#e2e8f0', borderWidth: 1 }
        },
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 20, maxRotation: 45 }, grid: { color: '#f1f5f9' } },
          y: { ticks: { color: '#64748b', font: { size: 10 }, callback: v => v.toLocaleString('en-IN') }, grid: { color: '#e2e8f0', lineWidth: 0.5 } }
        }
      }
    });
}

window.onload = render;
